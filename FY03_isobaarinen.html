<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Isobaarinen muutos</title>
<style>
  :root {
    --text: #3F3D39;
    --line: #222222;
    --blue: #2E86A6;
    --red: #D84A62;
    --orange: #F28C28;
    --yellow: #FFD95A;
    --pale-blue: #E7F4F5;
  }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #FFFFFF;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
  }

  body {
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  .slide {
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
    aspect-ratio: 16 / 9;
    position: relative;
    background: #FFFFFF;
  }

  svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  text {
    fill: var(--text);
    font-size: 21px;
    font-weight: 520;
  }

  .small {
    font-size: 17px;
  }

  .sketch {
    stroke: var(--line);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }

  .thin {
    stroke-width: 2.4;
  }

  .gas-fill {
    fill: var(--pale-blue);
    opacity: 0.45;
  }

  #heat {
    transition: opacity 220ms ease;
  }

  .controls {
    position: absolute;
    left: 74px;
    right: 74px;
    bottom: 22px;
    display: grid;
    grid-template-columns: auto 1fr auto auto auto auto;
    align-items: center;
    gap: 18px;
    color: var(--text);
    font-size: clamp(15px, 2.2vw, 22px);
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--line);
  }

  button {
    border: 2px solid var(--line);
    background: #FFFFFF;
    color: var(--text);
    border-radius: 999px;
    padding: 7px 16px;
    font: inherit;
    cursor: pointer;
  }

  button:active {
    transform: translateY(1px);
  }

  .value {
    min-width: 105px;
    font-weight: 620;
    white-space: nowrap;
  }

  @media (max-width: 760px) {
    .controls {
      left: 34px;
      right: 34px;
      gap: 10px;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: auto auto;
    }

    .value {
      min-width: auto;
      font-size: 15px;
    }

    button {
      padding: 6px 12px;
    }
  }
</style>
</head>
<body>
  <main class="slide" aria-label="Isobaarisen muutoksen simulaatio">
    <svg viewBox="0 0 960 540" role="img" aria-label="Kaasusäiliö, liikkuva mäntä, painemittari ja tilavuus-lämpötilakuvaaja">
      <defs>
        <pattern id="hatch" patternUnits="userSpaceOnUse" width="12" height="12" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="12" stroke="#222222" stroke-width="1.2" opacity="0.18"/>
        </pattern>

        <clipPath id="gasClip">
          <rect id="gasClipRect" x="138" y="145" width="350" height="200" rx="12"/>
        </clipPath>
      </defs>

      <!-- Säiliö -->
      <path d="M105 360 C220 374 465 374 660 360" class="sketch thin" opacity="0.28"/>
      <rect id="gasArea" x="136" y="145" width="350" height="200" rx="12" class="gas-fill"/>

      <path d="M125 145 C250 137 455 139 642 145" class="sketch"/>
      <path d="M125 345 C260 354 455 353 642 345" class="sketch"/>
      <path d="M125 145 C117 205 117 286 125 345" class="sketch"/>

      <!-- Vasemman seinän hatching -->
      <rect x="119" y="132" width="26" height="226" rx="7" fill="#FFFFFF" stroke="#222222" stroke-width="3"/>
      <rect x="123" y="138" width="18" height="214" rx="5" fill="url(#hatch)" opacity="0.7"/>

      <g id="particles" clip-path="url(#gasClip)"></g>

      <!-- Mäntä -->
      <g id="piston">
        <rect x="478" y="126" width="36" height="238" rx="8" fill="#FFFFFF" stroke="#222222" stroke-width="4"/>
        <rect x="483" y="132" width="26" height="226" rx="6" fill="url(#hatch)" opacity="0.75"/>
        <path d="M514 245 C555 244 594 246 633 245" class="sketch thin"/>
        <path d="M633 231 C648 239 648 253 633 261" class="sketch thin"/>
      </g>

      <!-- Lämpö: näkyy vain, kun lämpötilaa säädetään -->
      <g id="heat" opacity="0">
        <path id="heatWave1" d="M220 393 C208 374 238 366 222 347" fill="none" stroke="#F28C28" stroke-width="4" stroke-linecap="round"/>
        <path id="heatWave2" d="M330 395 C315 374 348 364 332 344" fill="none" stroke="#F28C28" stroke-width="4" stroke-linecap="round"/>
        <path id="heatWave3" d="M440 393 C425 374 456 365 442 346" fill="none" stroke="#F28C28" stroke-width="4" stroke-linecap="round"/>
        <path d="M185 410 C260 421 430 421 505 410" class="sketch thin" opacity="0.35"/>
      </g>

      <!-- Painemittari -->
      <g id="gauge">
        <text x="735" y="88">Paine</text>

        <circle cx="770" cy="180" r="72" fill="#FFFFFF" stroke="#222222" stroke-width="4"/>
        <circle cx="770" cy="180" r="58" fill="#FAFAFA" stroke="#222222" stroke-width="2" opacity="0.72"/>

        <path id="constantPressureMark" fill="none" stroke="#D84A62" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
        <path d="M720 221 C744 238 795 239 821 221" class="sketch thin" opacity="0.28"/>

        <g id="ticks"></g>
        <line id="needle" x1="770" y1="180" x2="770" y2="126" stroke="#D84A62" stroke-width="5" stroke-linecap="round"/>
        <circle cx="770" cy="180" r="7" fill="#222222"/>
      </g>

      <!-- V-T-kuvaaja -->
      <g id="graph">
        <path d="M690 415 L690 305" class="sketch thin"/>
        <path d="M690 415 L875 415" class="sketch thin"/>
        <text x="675" y="305" class="small">V</text>
        <text x="875" y="438" class="small">T</text>
        <path id="lineGraph" d="" fill="none" stroke="#2E86A6" stroke-width="4" stroke-linecap="round"/>
        <line id="graphT" x1="720" y1="415" x2="720" y2="360" stroke="#222222" stroke-width="2" stroke-dasharray="5 7" opacity="0.45"/>
        <line id="graphV" x1="690" y1="360" x2="720" y2="360" stroke="#222222" stroke-width="2" stroke-dasharray="5 7" opacity="0.45"/>
        <circle id="graphPoint" cx="720" cy="360" r="7" fill="#D84A62"/>
      </g>
    </svg>

    <section class="controls" aria-label="Säätimet">
      <label for="temperatureSlider">Lämpötila</label>
      <input id="temperatureSlider" type="range" min="200" max="600" step="10" value="300" aria-label="Lämpötila" />
      <span id="tReadout" class="value">T = 300 K</span>
      <span id="vReadout" class="value">V = 3,0 l</span>
      <span class="value">P = 100 kPa</span>
      <button id="resetButton" type="button">Nollaa</button>
    </section>
  </main>

<script>
  const slider = document.getElementById("temperatureSlider");
  const resetButton = document.getElementById("resetButton");
  const tReadout = document.getElementById("tReadout");
  const vReadout = document.getElementById("vReadout");

  const gasArea = document.getElementById("gasArea");
  const gasClipRect = document.getElementById("gasClipRect");
  const piston = document.getElementById("piston");
  const particlesGroup = document.getElementById("particles");

  const needle = document.getElementById("needle");
  const ticks = document.getElementById("ticks");
  const constantPressureMark = document.getElementById("constantPressureMark");

  const lineGraph = document.getElementById("lineGraph");
  const graphPoint = document.getElementById("graphPoint");
  const graphT = document.getElementById("graphT");
  const graphV = document.getElementById("graphV");

  const heat = document.getElementById("heat");
  const heatWave1 = document.getElementById("heatWave1");
  const heatWave2 = document.getElementById("heatWave2");
  const heatWave3 = document.getElementById("heatWave3");
  let heatHideTimeout = null;

  const T_MIN = 200;
  const T_MAX = 600;
  const T_DEFAULT = 300;

  const V_DEFAULT = 3.0;
  const P_CONSTANT = 100;

  const COOL_RGB = { r: 46, g: 134, b: 166 }; // #2E86A6
  const HOT_RGB  = { r: 216, g: 74,  b: 98  }; // #D84A62

  const chamber = {
    x0: 138,
    y0: 145,
    y1: 345,
    pistonMin: 350,
    pistonMax: 625
  };

  const graph = {
    x0: 690,
    y0: 415,
    w: 185,
    h: 110,
    vMin: V_DEFAULT * T_MIN / T_DEFAULT,
    vMax: V_DEFAULT * T_MAX / T_DEFAULT
  };

  const particles = [];
  const particleCount = 42;

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function map(value, inMin, inMax, outMin, outMax) {
    return outMin + (value - inMin) * (outMax - outMin) / (inMax - inMin);
  }

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function rgbToString(rgb) {
    return `rgb(${Math.round(rgb.r)}, ${Math.round(rgb.g)}, ${Math.round(rgb.b)})`;
  }

  function particleColorFromTemperature(temperature) {
    const t = clamp((temperature - T_MIN) / (T_MAX - T_MIN), 0, 1);
    return rgbToString({
      r: lerp(COOL_RGB.r, HOT_RGB.r, t),
      g: lerp(COOL_RGB.g, HOT_RGB.g, t),
      b: lerp(COOL_RGB.b, HOT_RGB.b, t)
    });
  }

  function formatFinnish(value, decimals = 1) {
    return value.toFixed(decimals).replace(".", ",");
  }

  function getTemperature() {
    return Number(slider.value);
  }

  // Isobaarinen muutos: kun paine ja ainemäärä pysyvät vakioina, V/T on vakio.
  function getVolume(temperature) {
    return V_DEFAULT * temperature / T_DEFAULT;
  }

  function getPistonX(temperature) {
    return map(temperature, T_MIN, T_MAX, chamber.pistonMin, chamber.pistonMax);
  }

  function showHeatFlow() {
    heat.setAttribute("opacity", "1");

    if (heatHideTimeout !== null) {
      clearTimeout(heatHideTimeout);
    }

    heatHideTimeout = setTimeout(() => {
      heat.setAttribute("opacity", "0");
      heatHideTimeout = null;
    }, 650);
  }

  function hideHeatFlow() {
    if (heatHideTimeout !== null) {
      clearTimeout(heatHideTimeout);
      heatHideTimeout = null;
    }

    heat.setAttribute("opacity", "0");
  }

  function polar(cx, cy, r, deg) {
    const rad = (deg - 90) * Math.PI / 180;
    return {
      x: cx + r * Math.cos(rad),
      y: cy + r * Math.sin(rad)
    };
  }

  function describeArc(cx, cy, r, startDeg, endDeg) {
    const start = polar(cx, cy, r, startDeg);
    const end = polar(cx, cy, r, endDeg);
    const largeArc = Math.abs(endDeg - startDeg) > 180 ? 1 : 0;
    return `M ${start.x.toFixed(1)} ${start.y.toFixed(1)} A ${r} ${r} 0 ${largeArc} 1 ${end.x.toFixed(1)} ${end.y.toFixed(1)}`;
  }

  function drawGaugeTicks() {
    ticks.innerHTML = "";

    for (let i = 0; i <= 8; i++) {
      const deg = map(i, 0, 8, -125, 125);
      const a = polar(770, 180, 52, deg);
      const b = polar(770, 180, i % 2 === 0 ? 63 : 59, deg);

      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", a.x);
      line.setAttribute("y1", a.y);
      line.setAttribute("x2", b.x);
      line.setAttribute("y2", b.y);
      line.setAttribute("stroke", "#222222");
      line.setAttribute("stroke-width", i % 2 === 0 ? "2.4" : "1.6");
      line.setAttribute("stroke-linecap", "round");
      line.setAttribute("opacity", "0.72");
      ticks.appendChild(line);
    }

    const pressureAngle = 0;
    const needleEnd = polar(770, 180, 54, pressureAngle);
    needle.setAttribute("x2", needleEnd.x);
    needle.setAttribute("y2", needleEnd.y);
    constantPressureMark.setAttribute("d", describeArc(770, 180, 58, -10, 10));
  }

  function graphX(temperature) {
    return map(temperature, T_MIN, T_MAX, graph.x0 + 22, graph.x0 + graph.w - 8);
  }

  function graphY(volume) {
    return map(volume, graph.vMin, graph.vMax, graph.y0 - 8, graph.y0 - graph.h);
  }

  function drawLineGraph() {
    const t1 = T_MIN;
    const t2 = T_MAX;
    const v1 = getVolume(t1);
    const v2 = getVolume(t2);

    lineGraph.setAttribute(
      "d",
      `M ${graphX(t1).toFixed(1)} ${graphY(v1).toFixed(1)} L ${graphX(t2).toFixed(1)} ${graphY(v2).toFixed(1)}`
    );
  }

  function makeParticles() {
    particlesGroup.innerHTML = "";
    particles.length = 0;

    const temperature = getTemperature();
    const particleColor = particleColorFromTemperature(temperature);
    const pistonX = getPistonX(temperature);

    for (let i = 0; i < particleCount; i++) {
      const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      const radius = 4 + Math.random() * 2.2;

      const particle = {
        node: circle,
        r: radius,
        x: chamber.x0 + 18 + Math.random() * Math.max(40, pistonX - chamber.x0 - 42),
        y: chamber.y0 + 18 + Math.random() * (chamber.y1 - chamber.y0 - 36),
        vx: (Math.random() < 0.5 ? -1 : 1) * (0.35 + Math.random() * 0.9),
        vy: (Math.random() < 0.5 ? -1 : 1) * (0.35 + Math.random() * 0.9)
      };

      circle.setAttribute("r", particle.r);
      circle.setAttribute("fill", particleColor);
      circle.setAttribute("opacity", "0.78");

      particlesGroup.appendChild(circle);
      particles.push(particle);
    }
  }

  function updateScene() {
    const temperature = getTemperature();
    const volume = getVolume(temperature);
    const pistonX = getPistonX(temperature);
    const gasWidth = pistonX - chamber.x0 - 8;
    const particleColor = particleColorFromTemperature(temperature);

    tReadout.textContent = `T = ${Math.round(temperature)} K`;
    vReadout.textContent = `V = ${formatFinnish(volume, 1)} l`;

    gasArea.setAttribute("width", gasWidth);
    gasClipRect.setAttribute("width", gasWidth);
    piston.setAttribute("transform", `translate(${pistonX - 496},0)`);

    const gx = graphX(temperature);
    const gy = graphY(volume);

    graphPoint.setAttribute("cx", gx);
    graphPoint.setAttribute("cy", gy);

    graphT.setAttribute("x1", gx);
    graphT.setAttribute("x2", gx);
    graphT.setAttribute("y1", graph.y0);
    graphT.setAttribute("y2", gy);

    graphV.setAttribute("x1", graph.x0);
    graphV.setAttribute("x2", gx);
    graphV.setAttribute("y1", gy);
    graphV.setAttribute("y2", gy);

    const heatOpacity = map(temperature, T_MIN, T_MAX, 0.18, 1);
    const heatLift = map(temperature, T_MIN, T_MAX, 0, -12);

    for (const wave of [heatWave1, heatWave2, heatWave3]) {
      wave.setAttribute("opacity", heatOpacity);
      wave.setAttribute("transform", `translate(0 ${heatLift})`);
    }

    for (const p of particles) {
      p.node.setAttribute("fill", particleColor);
      p.x = clamp(p.x, chamber.x0 + p.r + 4, pistonX - p.r - 16);
      p.y = clamp(p.y, chamber.y0 + p.r + 4, chamber.y1 - p.r - 4);
    }
  }

  function animate() {
    const temperature = getTemperature();
    const pistonX = getPistonX(temperature);

    const speedFactor = Math.sqrt(temperature / T_DEFAULT);
    const left = chamber.x0 + 8;
    const right = pistonX - 18;
    const top = chamber.y0 + 5;
    const bottom = chamber.y1 - 5;

    for (const p of particles) {
      p.x += p.vx * speedFactor;
      p.y += p.vy * speedFactor;

      if (p.x - p.r < left) {
        p.x = left + p.r;
        p.vx *= -1;
      }

      if (p.x + p.r > right) {
        p.x = right - p.r;
        p.vx *= -1;
      }

      if (p.y - p.r < top) {
        p.y = top + p.r;
        p.vy *= -1;
      }

      if (p.y + p.r > bottom) {
        p.y = bottom - p.r;
        p.vy *= -1;
      }

      p.node.setAttribute("cx", p.x);
      p.node.setAttribute("cy", p.y);
    }

    requestAnimationFrame(animate);
  }

  slider.addEventListener("input", () => {
    showHeatFlow();
    updateScene();
  });

  resetButton.addEventListener("click", () => {
    slider.value = T_DEFAULT;
    hideHeatFlow();
    updateScene();
  });

  drawGaugeTicks();
  drawLineGraph();
  makeParticles();
  updateScene();
  hideHeatFlow();
  animate();
</script>
</body>
</html>
