<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kaasu pallossa</title>
<link rel="stylesheet" href="simulaatio-theme.css" />
<style>
  :root{
    --bg:#ffffff;
    --ink:#3F3D39;
    --hatch:#d8d8d8;
    --cold:#2E86A6;
    --warm:#D84A62;
  }

  *{ box-sizing:border-box; }













  .sim-range{
    width:min(420px,48vw);
    accent-color:var(--ink);
  }





  .sketch{
    fill:none;
    stroke:var(--ink);
    stroke-width:3;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .thin{ stroke-width:1.8; }

  .hatch{
    stroke:var(--hatch);
    stroke-width:1.1;
    stroke-linecap:round;
  }

  .gasParticle{
    stroke:var(--ink);
    stroke-width:1.8;
  }

  .trail{
    fill:none;
    stroke-width:1.2;
    stroke-linecap:round;
    opacity:.35;
  }

  .energyRay{
    fill:none;
    stroke-width:4.8;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .arrowHead{
    stroke:none;
  }

  @media (max-width:760px){
  }
</style>
</head>
<body class="sim-body">
<div class="wrap sim-wrap">
  <svg viewBox="0 0 960 520" aria-label="Kaasu pallossa">
    <defs>
      <pattern id="diagHatch" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(22)">
        <line x1="0" y1="0" x2="0" y2="14" class="hatch"></line>
      </pattern>
      <clipPath id="balloonClip">
        <path id="balloonClipPath" d=""></path>
      </clipPath>
    </defs>

    <g id="rayGroup"></g>

    <g id="balloonGroup">
      <path id="balloonFill" d="" fill="#f7f7f7"></path>
      <path id="balloonHatch" d="" fill="url(#diagHatch)" opacity=".28"></path>

      <g clip-path="url(#balloonClip)">
        <g id="trailGroup"></g>
        <g id="particleGroup"></g>
      </g>

      <path id="balloonOutline" class="sketch" d=""></path>
      <path id="balloonHighlight" class="sketch thin" d=""></path>
      <path id="string" class="sketch thin" d=""></path>
    </g>
  </svg>

  <div class="controls sim-controls">
    <div class="sliderBox sim-sliderBox">
      <label for="temp">Lämpötila</label>
      <input id="temp" type="range" class="sim-range" min="0" max="100" step="1" value="50">
    </div>
    <button class="sim-btn" id="reset">Nollaa</button>
  </div>
</div>

<script>
(() => {
  const temp = document.getElementById("temp");
  const reset = document.getElementById("reset");

  const balloonFill = document.getElementById("balloonFill");
  const balloonHatch = document.getElementById("balloonHatch");
  const balloonOutline = document.getElementById("balloonOutline");
  const balloonHighlight = document.getElementById("balloonHighlight");
  const balloonClipPath = document.getElementById("balloonClipPath");
  const string = document.getElementById("string");

  const particleGroup = document.getElementById("particleGroup");
  const trailGroup = document.getElementById("trailGroup");
  const rayGroup = document.getElementById("rayGroup");

  const cx = 480;
  const cy = 205;
  const neutral = 50;
  const baseRx = 150;
  const baseRy = 128;

  let time = 0;
  let targetLevel = 50;
  let currentLevel = 50;
  let previousLevel = 50;

  let heatFlow = 0;
  let heatFlowTarget = 0;

  const particles = [];
  const rays = [];

  function mixColor(a, b, t) {
    const ah = a.replace("#", "");
    const bh = b.replace("#", "");
    const ar = parseInt(ah.slice(0,2), 16);
    const ag = parseInt(ah.slice(2,4), 16);
    const ab = parseInt(ah.slice(4,6), 16);
    const br = parseInt(bh.slice(0,2), 16);
    const bg = parseInt(bh.slice(2,4), 16);
    const bb = parseInt(bh.slice(4,6), 16);
    const rr = Math.round(ar + (br - ar) * t);
    const rg = Math.round(ag + (bg - ag) * t);
    const rb = Math.round(ab + (bb - ab) * t);
    return `rgb(${rr},${rg},${rb})`;
  }

  function createSvg(tag, attrs = {}) {
    const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }

  function balloonPath(cx, cy, rx, ry, wobble = 0) {
    const top = cy - ry + wobble;
    const left = cx - rx;
    const right = cx + rx;
    const shoulderY = cy + ry * 0.54;
    const lowerY = cy + ry * 0.93;
    const knotBaseY = cy + ry * 1.02;
    const knotTipY = cy + ry * 1.19;

    return `
      M ${cx} ${top}
      C ${cx - rx * 0.62} ${cy - ry * 0.98},
        ${left - rx * 0.10} ${cy - ry * 0.10},
        ${cx - rx * 0.83} ${shoulderY}
      C ${cx - rx * 0.56} ${lowerY},
        ${cx - rx * 0.22} ${cy + ry * 1.03},
        ${cx - 20} ${knotBaseY}
      L ${cx - 10} ${knotBaseY + 16}
      L ${cx} ${knotTipY}
      L ${cx + 10} ${knotBaseY + 16}
      L ${cx + 20} ${knotBaseY}
      C ${cx + rx * 0.22} ${cy + ry * 1.03},
        ${cx + rx * 0.56} ${lowerY},
        ${cx + rx * 0.83} ${shoulderY}
      C ${right + rx * 0.10} ${cy - ry * 0.10},
        ${cx + rx * 0.62} ${cy - ry * 0.98},
        ${cx} ${top}
      Z
    `;
  }

  function randomInsideBody(rx, ry) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.sqrt(Math.random()) * 0.78;
    return {
      x: cx + Math.cos(angle) * rx * r,
      y: cy + Math.sin(angle) * ry * r * 0.93
    };
  }

  function buildParticles() {
    for (let i = 0; i < 32; i++) {
      const start = randomInsideBody(baseRx, baseRy);
      const angle = Math.random() * Math.PI * 2;
      const speed = 0.8 + Math.random() * 1.1;

      const trail = createSvg("path", { class: "trail", d: "" });
      const node = createSvg("circle", {
        class: "gasParticle",
        cx: start.x,
        cy: start.y,
        r: 6,
        fill: "#ffffff"
      });

      trailGroup.appendChild(trail);
      particleGroup.appendChild(node);

      particles.push({
        x: start.x,
        y: start.y,
        oldX: start.x,
        oldY: start.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        node,
        trail
      });
    }
  }

  function buildRays() {
    const angles = [-155, -125, -95, -65, -25, 25, 65, 95, 125, 155];

    angles.forEach((deg, i) => {
      const group = createSvg("g");
      rayGroup.appendChild(group);

      const path = createSvg("path", { class: "energyRay", d: "" });
      const head = createSvg("path", { class: "arrowHead", d: "" });

      group.appendChild(path);
      group.appendChild(head);

      rays.push({
        path,
        head,
        angle: deg * Math.PI / 180,
        phase: i / angles.length
      });
    });
  }

  function updateBalloon(level, t) {
    const heat = Math.max(0, level - neutral) / neutral;
    const cold = Math.max(0, neutral - level) / neutral;

    const rx = baseRx * (1 + heat * 0.26 - cold * 0.12);
    const ry = baseRy * (1 + heat * 0.26 - cold * 0.10);
    const wobble = Math.sin(t * 0.025) * (0.6 + heat * 1.8);

    const d = balloonPath(cx, cy, rx, ry, wobble);
    const fill = mixColor("#edf8fb", "#fff0f2", level / 100);

    balloonFill.setAttribute("d", d);
    balloonFill.setAttribute("fill", fill);
    balloonHatch.setAttribute("d", d);
    balloonOutline.setAttribute("d", d);
    balloonClipPath.setAttribute("d", d);

    balloonHighlight.setAttribute(
      "d",
      `M ${cx - rx * 0.30} ${cy - ry * 0.58}
       C ${cx - rx * 0.47} ${cy - ry * 0.12},
         ${cx - rx * 0.40} ${cy + ry * 0.28},
         ${cx - rx * 0.12} ${cy + ry * 0.60}`
    );

    const knotY = cy + ry * 1.19;
    string.setAttribute(
      "d",
      `M ${cx} ${knotY}
       C ${cx - 10} ${knotY + 28},
         ${cx + 16} ${knotY + 54},
         ${cx + 2} ${knotY + 86}
       C ${cx - 10} ${knotY + 114},
         ${cx + 10} ${knotY + 142},
         ${cx - 2} ${knotY + 170}`
    );

    return {
      rx,
      ry,
      innerRx: rx * 0.74,
      innerRy: ry * 0.72,
      innerCy: cy - ry * 0.02
    };
  }

  function updateParticles(balloon, level) {
    const heatLevel = level / 100;
    const speedFactor = 0.45 + heatLevel * 1.55;
    const particleColor = mixColor("#2E86A6", "#D84A62", heatLevel);
    const trailColor = mixColor("#9fd8e8", "#f2a6b3", heatLevel);

    for (const p of particles) {
      p.oldX = p.x;
      p.oldY = p.y;

      p.x += p.vx * speedFactor;
      p.y += p.vy * speedFactor;

      const nx = (p.x - cx) / balloon.innerRx;
      const ny = (p.y - balloon.innerCy) / balloon.innerRy;
      const d = nx * nx + ny * ny;

      if (d > 1) {
        const len = Math.sqrt(d);
        const ex = nx / len;
        const ey = ny / len;

        p.x = cx + ex * balloon.innerRx * 0.985;
        p.y = balloon.innerCy + ey * balloon.innerRy * 0.985;

        const normalX = ex / balloon.innerRx;
        const normalY = ey / balloon.innerRy;
        const dot = p.vx * normalX + p.vy * normalY;
        const denom = normalX * normalX + normalY * normalY;

        p.vx -= 2 * dot * normalX / denom;
        p.vy -= 2 * dot * normalY / denom;
      }

      p.node.setAttribute("cx", p.x);
      p.node.setAttribute("cy", p.y);
      p.node.setAttribute("r", 5.5 + heatLevel * 1.7);
      p.node.setAttribute("fill", particleColor);

      p.trail.setAttribute("d", `M ${p.oldX} ${p.oldY} L ${p.x} ${p.y}`);
      p.trail.setAttribute("stroke", trailColor);
      p.trail.setAttribute("opacity", 0.14 + heatLevel * 0.32);
    }
  }

  function arrowPath(x, y, dirX, dirY, size) {
    const px = -dirY;
    const py = dirX;
    const backX = x - dirX * size;
    const backY = y - dirY * size;

    return `
      M ${x} ${y}
      L ${backX + px * size * 0.45} ${backY + py * size * 0.45}
      L ${backX - px * size * 0.45} ${backY - py * size * 0.45}
      Z
    `;
  }

  function updateRays(balloon, t) {
    heatFlow += (heatFlowTarget - heatFlow) * 0.035;

    const amount = Math.min(1, Math.abs(heatFlow));
    const warming = heatFlow > 0;
    const color = warming ? "#D84A62" : "#2E86A6";

    const speed = 0.0045;

    rays.forEach(ray => {
      const a = ray.angle;
      const ex = Math.cos(a);
      const ey = Math.sin(a);

      const edgeRadius = 1 / Math.sqrt(
        (ex * ex) / (balloon.rx * balloon.rx) +
        (ey * ey) / (balloon.ry * balloon.ry)
      );

      const edgeX = cx + ex * edgeRadius;
      const edgeY = cy + ey * edgeRadius;

      const gap = 20;
      const track = 88;
      const length = 44;

      const p = (t * speed + ray.phase) % 1;

      const centerDistance = warming
        ? gap + (1 - p) * track
        : gap + p * track;

      const startDistance = centerDistance - length / 2;
      const endDistance = centerDistance + length / 2;

      const x1 = edgeX + ex * startDistance;
      const y1 = edgeY + ey * startDistance;
      const x2 = edgeX + ex * endDistance;
      const y2 = edgeY + ey * endDistance;

      const bend = 8;
      const mx = (x1 + x2) / 2 + Math.sin(a) * bend;
      const my = (y1 + y2) / 2 - Math.cos(a) * bend;

      ray.path.setAttribute("d", `M ${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}`);
      ray.path.setAttribute("stroke", color);

      const tipX = warming ? x1 : x2;
      const tipY = warming ? y1 : y2;
      const dirX = warming ? -ex : ex;
      const dirY = warming ? -ey : ey;

      ray.head.setAttribute("d", arrowPath(tipX, tipY, dirX, dirY, 14));
      ray.head.setAttribute("fill", color);

      const opacity = amount < 0.03 ? 0 : 0.18 + amount * 0.62;
      ray.path.setAttribute("opacity", opacity);
      ray.head.setAttribute("opacity", opacity);
    });
  }

  function commitTemperature(value) {
    if (value === targetLevel) return;

    previousLevel = targetLevel;
    targetLevel = value;

    const delta = targetLevel - previousLevel;

    if (Math.abs(delta) < 1) {
      heatFlowTarget = 0;
    } else {
      heatFlowTarget = Math.max(-1, Math.min(1, delta / 35));
    }
  }

  function tick() {
    time += 1;

    currentLevel += (targetLevel - currentLevel) * 0.035;

    if (Math.abs(targetLevel - currentLevel) < 0.4) {
      currentLevel = targetLevel;
      heatFlowTarget *= 0.985;
    }

    const balloon = updateBalloon(currentLevel, time);
    updateParticles(balloon, currentLevel);
    updateRays(balloon, time);

    requestAnimationFrame(tick);
  }

  temp.addEventListener("pointerup", () => {
    commitTemperature(Number(temp.value));
  });

  temp.addEventListener("pointercancel", () => {
    commitTemperature(Number(temp.value));
  });

  temp.addEventListener("change", () => {
    commitTemperature(Number(temp.value));
  });

  reset.addEventListener("click", () => {
    temp.value = 50;
    commitTemperature(50);
  });

  buildParticles();
  buildRays();
  tick();
})();
</script>
</body>
</html>
