<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title></title>
<style>
  :root {
    --bg: #ffffff;
    --ink: #2d2d2a;
    --soft-ink: #5b5a55;
    --line: #3f3d39;
    --blue: #2e86a6;
    --blue-soft: #cfeaf3;
    --red: #d84a62;
    --red-soft: #f5c4cb;
    --orange: #f28c28;
    --orange-soft: #ffdca3;
    --purple: #7a62b7;
    --green: #4a8b5c;
    --pencil: #d9d9d9;
  }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: Arial, Helvetica, sans-serif;
  }

  body {
    display: grid;
    place-items: center;
  }

  svg {
    width: 100vw;
    height: 100vh;
    max-width: 100%;
    max-height: 100%;
    background: var(--bg);
  }

  button {
    position: fixed;
    left: 18px;
    bottom: 16px;
    width: 34px;
    height: 34px;
    padding: 0;
    border: 1.7px solid var(--ink);
    border-radius: 999px;
    background: #ffffff;
    cursor: pointer;
    display: grid;
    place-items: center;
  }

  button svg {
    width: 21px;
    height: 21px;
    fill: none;
    stroke: var(--ink);
    stroke-width: 1.9;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  button:active {
    transform: translateY(1px);
  }

  .label {
    fill: var(--ink);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.1px;
  }

  .small {
    fill: var(--soft-ink);
    font-size: 14px;
    font-weight: 600;
  }

  .outline {
    fill: #ffffff;
    stroke: var(--line);
    stroke-width: 2.3;
    stroke-linecap: round;
    stroke-linejoin: round;
    vector-effect: non-scaling-stroke;
  }

  .thin {
    fill: none;
    stroke: var(--line);
    stroke-width: 1.7;
    stroke-linecap: round;
    stroke-linejoin: round;
    vector-effect: non-scaling-stroke;
  }

  .hatch line,
  .hatch path {
    stroke: var(--pencil);
    stroke-width: 1.2;
    stroke-linecap: round;
    vector-effect: non-scaling-stroke;
  }

  .coil {
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-width: 8.5;
    opacity: 0.86;
    vector-effect: non-scaling-stroke;
  }

  .coil-sketch {
    fill: none;
    stroke: var(--line);
    stroke-width: 1.4;
    opacity: 0.42;
    stroke-linecap: round;
    stroke-linejoin: round;
    vector-effect: non-scaling-stroke;
  }

  .arrow {
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-width: 2.2;
    vector-effect: non-scaling-stroke;
  }

  .red-arrow {
    stroke-width: 2.2;
  }

  .particle {
    opacity: 1;
    stroke: var(--line);
    stroke-width: 1.15;
    vector-effect: non-scaling-stroke;
  }

  #compressor {
    transform-box: fill-box;
    transform-origin: center;
    animation: compressorPulse 0.34s ease-in-out infinite alternate;
  }

  #compressorRotor {
    transform-box: fill-box;
    transform-origin: center;
    animation: rotorTurn 1.05s linear infinite;
  }

  .vibe {
    fill: none;
    stroke: var(--line);
    stroke-width: 1.7;
    stroke-linecap: round;
    opacity: 0.58;
    vector-effect: non-scaling-stroke;
    animation: vibeBlink 0.48s ease-in-out infinite alternate;
  }

  .food-fill-red { fill: #f5c4cb; }
  .food-fill-green { fill: #dcefdc; }
  .food-fill-yellow { fill: #fff3b0; }
  .food-fill-blue { fill: #e7f4f5; }

  @keyframes compressorPulse {
    from { transform: translate(-1px, 0.4px) rotate(-0.45deg); }
    to   { transform: translate(1.2px, -0.4px) rotate(0.45deg); }
  }

  @keyframes rotorTurn {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  @keyframes vibeBlink {
    from { opacity: 0.22; transform: translateX(-1px); }
    to   { opacity: 0.72; transform: translateX(1px); }
  }
</style>
</head>
<body>

  <!-- höyrystin -->

  <g id="particles"></g>
</svg>

<script>
(() => {
  const svgNS = "http://www.w3.org/2000/svg";
  const particlesLayer = document.getElementById("particles");
  const resetButton = document.getElementById("reset");

  let phase = 0;
  let last = performance.now();

  resetButton.addEventListener("click", () => {
    phase = 0;
  });

  const route = [
    { x: 246, y: 260, c: "#f5a6b3" },
    { x: 246, y: 402, c: "#f5a6b3" },
    { x: 448, y: 402, c: "#ffdca3" },
    { x: 448, y: 438, c: "#ffdca3" },
    { x: 248, y: 438, c: "#ffdca3" },
    { x: 248, y: 420, c: "#ffdca3" },
    { x: 448, y: 420, c: "#ffdca3" },
    { x: 448, y: 258, c: "#ffdca3" },
    { x: 485, y: 258, c: "#70bfe0" },
    { x: 872, y: 258, c: "#70bfe0" },
    { x: 872, y: 153, c: "#70bfe0" },
    { x: 570, y: 153, c: "#70bfe0" },
    { x: 570, y: 116, c: "#70bfe0" },
    { x: 872, y: 116, c: "#70bfe0" },
    { x: 872, y: 189, c: "#70bfe0" },
    { x: 246, y: 189, c: "#70bfe0" },
    { x: 246, y: 246, c: "#70bfe0" },
    { x: 246, y: 260, c: "#f5a6b3" }
  ];

  const segments = [];
  let totalLength = 0;

  for (let i = 0; i < route.length - 1; i++) {
    const a = route[i];
    const b = route[i + 1];
    const length = Math.hypot(b.x - a.x, b.y - a.y);
    segments.push({ a, b, length, start: totalLength });
    totalLength += length;
  }

  function pointAt(distance) {
    const d = ((distance % totalLength) + totalLength) % totalLength;
    const segment = segments.find(s => d >= s.start && d <= s.start + s.length) || segments[0];
    const u = (d - segment.start) / segment.length;

    return {
      x: segment.a.x + (segment.b.x - segment.a.x) * u,
      y: segment.a.y + (segment.b.y - segment.a.y) * u,
      c: u > 0.82 ? segment.b.c : segment.a.c
    };
  }

  const particles = [];
  const count = 42;

  for (let i = 0; i < count; i++) {
    const dot = document.createElementNS(svgNS, "circle");
    dot.setAttribute("r", i % 5 === 0 ? 5.6 : 4.2);
    dot.setAttribute("class", "particle");
    particlesLayer.appendChild(dot);

    particles.push({
      node: dot,
      offset: (i / count) * totalLength,
      wobble: Math.random() * Math.PI * 2
    });
  }

  function animate(now) {
    const dt = Math.min(0.04, (now - last) / 1000);
    last = now;
    phase += dt * 78;

    particles.forEach(p => {
      const pos = pointAt(phase + p.offset);
      const wobble = Math.sin(now * 0.003 + p.wobble) * 0.55;

      p.node.setAttribute("cx", pos.x + wobble);
      p.node.setAttribute("cy", pos.y - wobble);
      p.node.setAttribute("fill", pos.c);
    });

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
