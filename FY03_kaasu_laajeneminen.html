<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaasu — ilmapallosimulaatio</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Caveat', cursive;
      background: #ffffff;
      color: #171717;
      min-height: 100vh;
    }
    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 12px 20px;
      gap: 14px;
    }
    .canvas-wrap {
      position: relative;
      width: 520px;
      height: 440px;
      background: #ffffff;
    }
    canvas { display: block; }
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 620px;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
    }
    .mode-tag {
      font-family: 'Caveat', cursive;
      font-size: 28px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 7px 10px 8px 9px;
      border: 3px solid #141414;
      white-space: nowrap;
      background: #ffffff;
      box-shadow: 2px 3px 0 rgba(0,0,0,0.08);
    }
    .mode-cold {
      color: #0d66a7;
      transform: rotate(-1.4deg);
      background-image: repeating-linear-gradient(-18deg, rgba(21,135,212,0.16) 0 2px, transparent 2px 7px);
    }
    .mode-hot {
      color: #c53226;
      transform: rotate(1.2deg);
      background-image: repeating-linear-gradient(18deg, rgba(226,68,51,0.16) 0 2px, transparent 2px 7px);
    }
    .temp-row { display: flex; align-items: center; gap: 10px; }
    .temp-label {
      font-family: 'Caveat', cursive;
      font-size: 30px;
      font-weight: 700;
      color: #444;
    }
    .temp-value {
      font-family: 'Caveat', cursive;
      font-size: 42px;
      font-weight: 700;
      min-width: 90px;
    }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      flex: 1; height: 10px; border-radius: 99px;
      background: #ffffff; border: 3px solid #171717;
      outline: none; cursor: pointer;
      box-shadow: inset 1px 1px 0 rgba(0,0,0,0.15);
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 30px; height: 30px; border-radius: 50%;
      background: #ffffff; cursor: pointer;
      border: 4px solid #171717;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.14);
    }
    input[type=range]::-moz-range-thumb {
      width: 30px; height: 30px; border-radius: 50%;
      background: #ffffff; cursor: pointer;
      border: 4px solid #171717;
    }
  </style>
</head>
<body>
<div class="scene">
  <div class="canvas-wrap">
    <canvas id="c" width="520" height="440"></canvas>
  </div>
  <div class="controls">
    <div class="slider-row">
      <span class="mode-tag mode-cold">❄️ Jäähdytä</span>
      <input type="range" min="-30" max="100" value="20" id="tempSlider" step="1">
      <span class="mode-tag mode-hot">🔥 Lämmitä</span>
    </div>
    <div class="temp-row">
      <span class="temp-label">Lämpötila:</span>
      <span class="temp-value" id="tempOut">20°C</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const slider = document.getElementById('tempSlider');
const tempOut = document.getElementById('tempOut');

const W = 520, H = 440;
const BCX = 184, BCY_BASE = 224;
const MCX = 372, MCY = 205, MR = 82;
const NMOL = 20;

let temp = 20;
let molecules = [];
let bWobble = [], mWobble = [], paperDots = [];

// ── Helpers ───────────────────────────────────────────────────────────────────
function rnd(a, b) { return a + Math.random()*(b-a); }
function hash(n)   { return ((Math.sin(n*127.1)*43758.5453)%1+1)%1; }
function j(n, amp) { return (hash(n)-0.5)*amp*2; }
function rgba(rgb, alpha) {
  if (rgb.startsWith('rgb(')) return rgb.replace('rgb','rgba').replace(')',','+alpha+')');
  if (rgb.startsWith('#')) {
    const n=parseInt(rgb.slice(1),16);
    return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${alpha})`;
  }
  return rgb;
}

// ── Init ──────────────────────────────────────────────────────────────────────
function initTexture() {
  paperDots = Array.from({length:115},()=>({
    x:rnd(0,W), y:rnd(0,H), r:rnd(0.25,0.9), a:rnd(0.03,0.075)
  }));
}
function initWobble() {
  bWobble = Array.from({length:52},()=>rnd(-1.8,1.8));
  mWobble = Array.from({length:54},()=>rnd(-1.4,1.4));
}

// ── Physics ───────────────────────────────────────────────────────────────────
function tempRatio(t) { return (t+30)/130; }
function balloonR(t)  { return 56 + tempRatio(t)*60; }
function getBCY(t)    { return BCY_BASE - balloonR(t)*0.12; }

function balloonCol(t) {
  const r=tempRatio(t);
  const R=Math.round(55 +r*195), G=Math.round(144-r*90), B=Math.round(225-r*185);
  return { pencil:`rgb(${R},${G},${B})`, pale:`rgba(${R},${G},${B},0.13)` };
}
function molCol(t) {
  const r=tempRatio(t);
  return `rgb(${Math.round(40+r*205)},${Math.round(125-r*90)},${Math.round(230-r*205)})`;
}
function getSpeed(t) { return 0.4 + tempRatio(t)*4.0; }

function initMolecules() {
  molecules = [];
  const r = balloonR(temp) * 0.55;
  const bcy = getBCY(temp);
  for (let i=0; i<NMOL; i++) {
    const a = Math.random()*Math.PI*2;
    const d = Math.sqrt(Math.random())*r;
    const s = getSpeed(temp);
    molecules.push({
      x: BCX + Math.cos(a)*d,
      y: bcy + Math.sin(a)*d*0.9,
      vx: Math.cos(Math.random()*Math.PI*2)*s,
      vy: Math.sin(Math.random()*Math.PI*2)*s,
      r: 5.5, seed: i*19.7
    });
  }
}

function updateMolecules() {
  const spd = getSpeed(temp);
  const r   = balloonR(temp);
  const bcy = getBCY(temp);
  const ry  = r * 1.18;
  molecules.forEach(m => {
    m.x += m.vx; m.y += m.vy;
    // Ellipse collision (stretch y axis to circle, reflect, unstretch)
    const dx = m.x - BCX, dy = (m.y - bcy) * (r/ry);
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist + m.r > r - 5) {
      const nx = dx/dist, ny = (dy/dist) * (r/ry);
      const nlen = Math.sqrt(nx*nx+ny*ny);
      const nxn = nx/nlen, nyn = ny/nlen;
      const dot = m.vx*nxn + m.vy*nyn;
      m.vx -= 2*dot*nxn; m.vy -= 2*dot*nyn;
      const ov = dist + m.r - (r-5);
      m.x -= (dx/dist)*ov; m.y -= (dy/dist)*(ry/r)*ov;
    }
    const cs = Math.sqrt(m.vx*m.vx+m.vy*m.vy);
    if (Math.abs(cs-spd)>0.4) { m.vx*=spd/(cs||1); m.vy*=spd/(cs||1); }
  });
}

// ── Drawing utilities ─────────────────────────────────────────────────────────
function roughLine(x1,y1,x2,y2,color='#141414',width=2.5,seed=1) {
  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle=color;
  for (let p=0;p<2;p++) {
    const k=seed+p*23, mx=(x1+x2)/2+j(k,6), my=(y1+y2)/2+j(k+1,6);
    ctx.beginPath();
    ctx.moveTo(x1+j(k+2,1.7),y1+j(k+3,1.7));
    ctx.quadraticCurveTo(mx,my,x2+j(k+4,1.7),y2+j(k+5,1.7));
    ctx.lineWidth=width-p*0.7; ctx.globalAlpha=p===0?1:0.62; ctx.stroke();
  }
  ctx.restore();
}
function roughStroke(drawPath,width=3,color='#141414',passes=2,alpha=1) {
  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
  for (let p=0;p<passes;p++) {
    ctx.save(); ctx.translate(j(p+width,0.45),j(p+width+9,0.45));
    drawPath();
    ctx.strokeStyle=rgba(color,alpha*(p===0?1:0.68));
    ctx.lineWidth=width-p*0.55; ctx.stroke(); ctx.restore();
  }
  ctx.restore();
}
function hatchRect(x,y,w,h,color,spacing=8,angle=-0.55,seed=100,alpha=0.75) {
  ctx.save(); ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
  ctx.translate(x+w/2,y+h/2); ctx.rotate(angle); ctx.translate(-x-w/2,-y-h/2);
  for (let yy=y-h;yy<y+h*2;yy+=spacing)
    roughLine(x-w*0.25,yy+j(yy+seed,3),x+w*1.25,yy+j(yy+seed+4,3),rgba(color,alpha),2.1,yy+seed);
  ctx.restore();
}
function hatchInEllipse(cx,cy,rx,ry,color,spacing=9,angle=-0.55,alpha=0.78,cross=false) {
  function doHatch(a,so) {
    ctx.save(); ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.clip();
    ctx.translate(cx,cy); ctx.rotate(a); ctx.translate(-cx,-cy);
    for (let y=cy-ry*1.65;y<=cy+ry*1.65;y+=spacing)
      roughLine(cx-rx*1.35,y+j(y+so,2.4),cx+rx*1.35,y+j(y+so+7,2.4),rgba(color,alpha),2.2,y+so);
    ctx.restore();
  }
  doHatch(angle,300); if (cross) doHatch(angle+1.42,900);
}
function wobblyEllipsePath(cx,cy,rx,ry,wobble,phase=0) {
  const n=wobble.length; ctx.beginPath();
  for (let i=0;i<=n;i++) {
    const angle=(i/n)*Math.PI*2, w=wobble[i%n]+j(i+phase,0.35);
    const x=cx+(rx+w)*Math.cos(angle), y=cy+(ry+w*0.82)*Math.sin(angle);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
}
function wobblyCirclePath(cx,cy,r,wobble,phase=0) {
  const n=wobble.length; ctx.beginPath();
  for (let i=0;i<=n;i++) {
    const angle=(i/n)*Math.PI*2, w=wobble[i%n]+j(i+phase,0.35);
    const x=cx+(r+w)*Math.cos(angle), y=cy+(r+w*0.75)*Math.sin(angle);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
}
function drawSketchDot(x,y,r,color,seed=1) {
  ctx.save();
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle='#ffffff'; ctx.fill();
  hatchInEllipse(x,y,r-1,r-1,color,4,-0.55,0.95,false);
  roughStroke(()=>{ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);},1.8,'#121212',2);
  ctx.restore();
}
function drawArrow(x1,y1,x2,y2,seed=1) {
  roughLine(x1,y1,x2,y2,'#121212',2.4,seed);
  const a=Math.atan2(y2-y1,x2-x1),len=10;
  roughLine(x2,y2,x2-Math.cos(a-0.62)*len,y2-Math.sin(a-0.62)*len,'#121212',2.2,seed+4);
  roughLine(x2,y2,x2-Math.cos(a+0.62)*len,y2-Math.sin(a+0.62)*len,'#121212',2.2,seed+7);
}

// ── Scene ─────────────────────────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
  ctx.save();
  paperDots.forEach(d=>{
    ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,0,0,${d.a})`; ctx.fill();
  });
  ctx.restore();
}

function drawBalloon(t) {
  const r   = balloonR(t);
  const bcy = getBCY(t);
  const ry  = r * 1.18;
  const col = balloonCol(t);

  // White base fill
  ctx.save();
  wobblyEllipsePath(BCX, bcy, r, ry, bWobble, 0);
  ctx.fillStyle = '#ffffff'; ctx.fill();

  // Pencil hatching
  hatchInEllipse(BCX, bcy, r-4, ry-4, col.pencil,
    Math.max(7, 13 - tempRatio(t)*5), -0.55, 0.70,
    temp > 55 || temp < -5);

  // Shine strokes top-left
  ctx.save();
  ctx.beginPath(); ctx.ellipse(BCX,bcy,r-6,ry-6,0,0,Math.PI*2); ctx.clip();
  for (let i=0;i<9;i++)
    roughLine(BCX-r*0.48+i*9, bcy-ry*0.72+i*1.6,
              BCX-r*0.16+i*8, bcy-ry*0.96+i*1.6, 'rgba(255,255,255,0.72)',2.2,520+i);
  ctx.restore();

  // Outline
  roughStroke(()=>wobblyEllipsePath(BCX,bcy,r,ry,bWobble,0), 3.6,'#121212',2);
  ctx.restore();

  // Knot
  const ky = bcy + ry + 9;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(BCX-9+j(1,1), bcy+ry*0.97);
  ctx.lineTo(BCX+9+j(2,1), bcy+ry*0.97);
  ctx.lineTo(BCX+6, ky); ctx.lineTo(BCX-6, ky+j(3,1));
  ctx.closePath();
  ctx.fillStyle='#ffffff'; ctx.fill();
  hatchRect(BCX-10, bcy+ry*0.94, 20, 22, col.pencil, 6,-0.65,141,0.8);
  roughStroke(()=>{
    ctx.beginPath();
    ctx.moveTo(BCX-9,bcy+ry*0.97); ctx.lineTo(BCX+9,bcy+ry*0.97);
    ctx.lineTo(BCX+6,ky); ctx.lineTo(BCX-6,ky); ctx.closePath();
  },2.5,'#121212',2);
  ctx.restore();

  // String
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(BCX,ky);
  ctx.bezierCurveTo(BCX+12,ky+25,BCX-9,ky+52,BCX+7,ky+80);
  ctx.strokeStyle='#121212'; ctx.lineWidth=2.3; ctx.lineCap='round'; ctx.stroke();
  ctx.restore();
}

function drawMoleculesInBalloon(t) {
  const r   = balloonR(t);
  const bcy = getBCY(t);
  const ry  = r * 1.18;
  ctx.save();
  ctx.beginPath(); ctx.ellipse(BCX,bcy,r-5,ry-5,0,0,Math.PI*2); ctx.clip();
  const mc=molCol(t), spd=getSpeed(t);
  molecules.forEach((m,i)=>{
    if (spd>1.8) {
      const len=Math.min(spd*3,14);
      roughLine(m.x,m.y,m.x-m.vx/spd*len,m.y-m.vy/spd*len,rgba(mc,0.28),2.6,700+i);
    }
    drawSketchDot(m.x,m.y,m.r,mc,m.seed);
  });
  ctx.restore();
}

function drawMagnifier(t) {
  const bcy = getBCY(t);
  const zoom = 2.2;

  ctx.save();
  const hx=MCX+MR*0.62, hy=MCY+MR*0.62;

  // Handle shadow
  roughLine(hx-3,hy-3,hx+48,hy+48,'rgba(0,0,0,0.12)',18,609);
  // Handle layers
  ctx.save();
  ctx.translate(hx,hy); ctx.rotate(Math.PI/4);
  ctx.beginPath(); ctx.roundRect(-10,-4,70,20,9);
  ctx.fillStyle='#ffffff'; ctx.fill(); ctx.clip();
  hatchRect(-10,-4,72,22,'#8a5a19',7,-0.35,655,0.9);
  ctx.restore();
  roughLine(hx-3,hy-3,hx+48,hy+48,'#121212',16,611);
  roughLine(hx-3,hy-3,hx+48,hy+48,'#9b671e',10,612);
  roughLine(hx-3,hy-3,hx+48,hy+48,'#121212',2.5,613);

  // Lens content
  ctx.save();
  wobblyCirclePath(MCX,MCY,MR-7,mWobble,4); ctx.clip();
  ctx.fillStyle='rgba(255,255,255,0.97)'; ctx.fillRect(MCX-MR,MCY-MR,MR*2,MR*2);
  hatchInEllipse(MCX,MCY,MR-10,MR-10,balloonCol(t).pencil,13,-0.6,0.17,false);

  const mc=molCol(t), spd=getSpeed(t);
  molecules.forEach((m,i)=>{
    const ox=(m.x-BCX)*zoom+MCX, oy=(m.y-bcy)*zoom+MCY;
    if (Math.hypot(ox-MCX,oy-MCY)<MR-18) {
      if (spd>1.8) {
        const len=Math.min(spd*4.5,22);
        roughLine(ox,oy,ox-m.vx/spd*len,oy-m.vy/spd*len,rgba(mc,0.28),3.5,880+i);
      }
      drawSketchDot(ox,oy,m.r*zoom*0.46,mc,900+i);
    }
  });
  ctx.restore();

  // Glass rim
  roughStroke(()=>wobblyCirclePath(MCX,MCY,MR,  mWobble,2),8.5,'#121212',2);
  roughStroke(()=>wobblyCirclePath(MCX,MCY,MR-3, mWobble,7),4.6,'#c79617',2,0.92);
  roughStroke(()=>wobblyCirclePath(MCX,MCY,MR-8, mWobble,10),1.8,'#121212',1,0.82);
  roughLine(MCX-43,MCY-54,MCX-8, MCY-68,'rgba(255,255,255,0.9)',4.5,711);
  roughLine(MCX-50,MCY-42,MCX-25,MCY-55,'rgba(255,255,255,0.75)',3,  712);
  roughLine(MCX+32,MCY+48,MCX+53,MCY+28,'rgba(120,165,205,0.25)',3,  713);
  ctx.restore();
}

function drawThermometer(t) {
  const ratio=tempRatio(t),bh=130,bw=17,bx=20,by=120;
  const R=Math.round(55+ratio*200),G=Math.round(145-ratio*90),B=Math.round(228-ratio*188);
  const fill=`rgb(${R},${G},${B})`;
  ctx.save();
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,8); ctx.fillStyle='#ffffff'; ctx.fill();
  roughStroke(()=>{ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);},3,'#121212',2);
  const fh=bh*ratio,fy=by+bh-fh;
  ctx.save();
  ctx.beginPath(); ctx.roundRect(bx+3,fy,bw-6,fh,6); ctx.clip();
  ctx.fillStyle=rgba(fill,0.12); ctx.fillRect(bx+2,fy,bw-4,fh);
  hatchRect(bx+2,fy,bw-4,fh,fill,5,-0.55,730,0.86);
  ctx.restore();
  ctx.beginPath(); ctx.arc(bx+bw/2,by+bh+10,14,0,Math.PI*2);
  ctx.fillStyle='#ffffff'; ctx.fill();
  hatchInEllipse(bx+bw/2,by+bh+10,12,12,fill,5,-0.55,0.88,true);
  roughStroke(()=>{ctx.beginPath();ctx.arc(bx+bw/2,by+bh+10,14,0,Math.PI*2);},3,'#121212',2);
  ctx.font='19px Caveat, cursive'; ctx.fillStyle='#444'; ctx.textAlign='left';
  [[-30,0],[0,0.23],[20,0.38],[60,0.69],[100,1]].forEach(([label,pos],i)=>{
    const ty=by+bh*(1-pos);
    roughLine(bx+bw,ty,bx+bw+7,ty,'#121212',1.5,770+i);
    ctx.fillText(label+'°',bx+bw+9+j(i,1),ty+5+j(i+4,1));
  });
  ctx.restore();
}

function drawLabels(t) {
  const r   = balloonR(t);
  const bcy = getBCY(t);
  const ry  = r * 1.18;
  const col = balloonCol(t);
  const state = t<0?'Jäätyminen!':t<15?'Kylmä':t<35?'Lämmin':t<65?'Kuuma!':'ERITTÄIN KUUMA!!';
  const sz = t<-15||t>60 ? 35 : 30;

  // State label above balloon
  ctx.save();
  ctx.font=`bold ${sz}px Caveat, cursive`;
  ctx.textAlign='center'; ctx.fillStyle=col.pencil;
  ctx.fillText(state, BCX+j(t,1.2), bcy-ry-18+j(t+1,1.2));
  roughLine(BCX-44,bcy-ry-12,BCX+44,bcy-ry-14,rgba(col.pencil,0.45),2,1001);
  ctx.restore();

  // "kaasu" → balloon
  const labelX = BCX + r + 22;
  ctx.save();
  ctx.font='bold 20px Caveat, cursive'; ctx.fillStyle='#121212'; ctx.textAlign='left';
  ctx.fillText('kaasu', labelX+j(10,1), bcy+j(11,1));
  drawArrow(labelX-2,bcy,BCX+r+4,bcy,1060);
  ctx.restore();

  // Expansion / contraction
  if (t > 40) {
    ctx.save();
    ctx.font='bold 17px Caveat, cursive'; ctx.fillStyle='#c53226'; ctx.textAlign='center';
    ctx.fillText('laajenee!', BCX, bcy+ry+32+j(20,1));
    drawArrow(BCX-28,bcy+ry+42,BCX-62,bcy+ry+42,1090);
    drawArrow(BCX+28,bcy+ry+42,BCX+62,bcy+ry+42,1092);
    ctx.restore();
  }
  if (t < -5) {
    ctx.save();
    ctx.font='bold 17px Caveat, cursive'; ctx.fillStyle='#0d66a7'; ctx.textAlign='center';
    ctx.fillText('supistuu!', BCX, bcy+ry+32+j(20,1));
    drawArrow(BCX-62,bcy+ry+42,BCX-28,bcy+ry+42,1094);
    drawArrow(BCX+62,bcy+ry+42,BCX+28,bcy+ry+42,1096);
    ctx.restore();
  }
}

function frame() {
  ctx.clearRect(0,0,W,H);
  updateMolecules();
  drawBackground();
  drawBalloon(temp);
  drawMoleculesInBalloon(temp);
  drawMagnifier(temp);
  drawThermometer(temp);
  drawLabels(temp);
  requestAnimationFrame(frame);
}

slider.addEventListener('input', () => {
  temp = parseInt(slider.value);
  const ratio=tempRatio(temp);
  const R=Math.round(55+ratio*200),G=Math.round(145-ratio*90),B=Math.round(228-ratio*188);
  tempOut.textContent = temp+'°C';
  tempOut.style.color=`rgb(${Math.max(0,R-30)},${Math.max(0,G-20)},${Math.max(0,B-40)})`;
  // Redistribute molecules inside the new balloon size
  const r   = balloonR(temp) * 0.55;
  const bcy = getBCY(temp);
  molecules.forEach(m => {
    const a=Math.random()*Math.PI*2, d=Math.sqrt(Math.random())*r;
    m.x = BCX + Math.cos(a)*d;
    m.y = bcy + Math.sin(a)*d*0.88;
    const s=getSpeed(temp), va=Math.random()*Math.PI*2;
    m.vx=Math.cos(va)*s; m.vy=Math.sin(va)*s;
  });
});

initTexture();
initWobble();
initMolecules();
document.fonts.ready.then(()=>{ frame(); });
</script>
</body>
