<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vuoristorata: Energia</title>
<link rel="stylesheet" href="simulaatio-theme.css" />
<style>
  :root{ --ink:#3F3D39; --blue:#2E86A6; --red:#D84A62; --orange:#F28C28; }
  .scene{ width:100%; height:100%; }
  .track{ fill:none; stroke:var(--ink); stroke-width:5; stroke-linecap:round; }
  .cartBody{ fill:#f8fbff; stroke:var(--ink); stroke-width:3; cursor:grab; }
  .cartTrim{ fill:#2E86A6; stroke:var(--ink); stroke-width:2; }
  .cartBar{ fill:#ffd95a; stroke:var(--ink); stroke-width:2; }
  .cart:active{ cursor:grabbing; }
  .energy{ position:absolute; left:34px; top:20px; background:#fff; border:2px solid #ddd7cc; border-radius:12px; padding:10px 14px; min-width:290px; font-size:14px; }
  .row{ display:grid; grid-template-columns:86px 1fr 66px; align-items:center; gap:8px; margin:4px 0; }
  .bar{ height:10px; border-radius:999px; background:#efeae3; overflow:hidden; }
  .fill{ height:100%; }
  .ke{ background:var(--blue); }
  .pe{ background:var(--red); }
  .wf{ background:var(--orange); }
</style>
</head>
<body class="sim-body">
<main class="sim-wrap" aria-label="Vuoristoradan energiasimulaatio">
  <svg class="scene" viewBox="0 0 960 540">
    <path id="track" class="track" d="" />
    <line x1="0" y1="500" x2="960" y2="500" stroke="#bfb7aa" stroke-width="2" stroke-dasharray="6 8"/>
    <g id="cartG" transform="translate(0,0)">
      <rect id="cart" class="cartBody" x="-20" y="-18" width="40" height="22" rx="8"></rect>
      <rect class="cartTrim" x="-16" y="-22" width="32" height="8" rx="3"></rect>
      <rect class="cartBar" x="-11" y="-9" width="22" height="5" rx="2"></rect>
      <circle r="5" cx="-11" cy="10" fill="#3F3D39"></circle>
      <circle r="5" cx="11" cy="10" fill="#3F3D39"></circle>
    </g>
  </svg>

  <section class="energy" aria-live="polite">
    <div><strong>Kokonaisenergia</strong> (mekaaninen + häviöt)</div>
    <div class="row"><span>Liike-energia</span><div class="bar"><div id="keBar" class="fill ke"></div></div><span id="keTxt"></span></div>
    <div class="row"><span>Potentiaalien.</span><div class="bar"><div id="peBar" class="fill pe"></div></div><span id="peTxt"></span></div>
    <div class="row"><span>Työ (kitka)</span><div class="bar"><div id="wfBar" class="fill wf"></div></div><span id="wfTxt"></span></div>
  </section>

  <div class="sim-controls">
    <button id="brakeBtn" class="sim-btn" type="button">Brake: OFF</button>
    <button id="resetBtn" class="sim-btn" type="button">Nollaa</button>
  </div>
</main>
<script>
(() => {
  const pts = [
    [60,210],[160,110],[280,220],[380,330],[510,150],[630,120],[760,260],[900,200]
  ];
  const samples = [];
  const track = document.getElementById('track');
  const cartG = document.getElementById('cartG');
  const brakeBtn = document.getElementById('brakeBtn');
  const resetBtn = document.getElementById('resetBtn');
  const keBar = document.getElementById('keBar');
  const peBar = document.getElementById('peBar');
  const wfBar = document.getElementById('wfBar');
  const keTxt = document.getElementById('keTxt');
  const peTxt = document.getElementById('peTxt');
  const wfTxt = document.getElementById('wfTxt');

  let brake = false, dragging = false;
  let s = 0.04;
  let dir = 1;
  let turning = false;
  const g = 1200, mass = 1;
  let E0 = 0, Wf = 0;

  function catmullRomPath(P){
    let d = `M ${P[0][0]} ${P[0][1]}`;
    for(let i=0;i<P.length-1;i++){
      const p0=P[Math.max(0,i-1)], p1=P[i], p2=P[i+1], p3=P[Math.min(P.length-1,i+2)];
      const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
      const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
      d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2[0]} ${p2[1]}`;
    }
    return d;
  }
  track.setAttribute('d', catmullRomPath(pts));

  function bezier(p0,p1,p2,p3,t){ const u=1-t; return [u*u*u*p0[0]+3*u*u*t*p1[0]+3*u*t*t*p2[0]+t*t*t*p3[0], u*u*u*p0[1]+3*u*u*t*p1[1]+3*u*t*t*p2[1]+t*t*t*p3[1]]; }
  function buildSamples(){
    const segs=[];
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[Math.max(0,i-1)], p1=pts[i], p2=pts[i+1], p3=pts[Math.min(pts.length-1,i+2)];
      segs.push([p1,[p1[0]+(p2[0]-p0[0])/6,p1[1]+(p2[1]-p0[1])/6],[p2[0]-(p3[0]-p1[0])/6,p2[1]-(p3[1]-p1[1])/6],p2]);
    }
    let len=0, prev=segs[0][0];
    samples.length=0;
    for(const seg of segs){
      for(let i=0;i<=60;i++){
        const t=i/60, p=bezier(seg[0],seg[1],seg[2],seg[3],t);
        if(samples.length){ len += Math.hypot(p[0]-prev[0],p[1]-prev[1]); }
        samples.push({x:p[0],y:p[1],s:len}); prev=p;
      }
    }
    for(const sm of samples) sm.s /= len;
  }
  buildSamples();

  function atS(val){
    val=Math.max(0,Math.min(1,val));
    let i=1; while(i<samples.length && samples[i].s<val) i++;
    const a=samples[i-1], b=samples[Math.min(samples.length-1,i)];
    const t=(val-a.s)/Math.max(1e-6,b.s-a.s);
    const dx=b.x-a.x, dy=b.y-a.y;
    const L=Math.max(1e-6,Math.hypot(dx,dy));
    return {x:a.x+(dx)*t, y:a.y+(dy)*t, dx, dy, tx:dx/L, ty:dy/L, segLen:L};
  }

  function setCart(){
    const p=atS(s); const ang=Math.atan2(p.dy,p.dx)*180/Math.PI;
    cartG.setAttribute('transform',`translate(${p.x},${p.y}) rotate(${ang})`);
  }

  function resetEnergy(){
    const p=atS(s);
    E0 = mass*g*(500-p.y);
    Wf = 0;
  }
  resetEnergy();

  function updateEnergy(){
    const p=atS(s);
    const PE = Math.max(0,mass*g*(500-p.y));
    const KE = Math.max(0,E0 - Wf - PE);
    const Etot = Math.max(E0,1);
    keBar.style.width = `${(KE/Etot)*100}%`; peBar.style.width = `${(PE/Etot)*100}%`; wfBar.style.width = `${(Wf/Etot)*100}%`;
    keTxt.textContent = `${KE.toFixed(0)} J`; peTxt.textContent = `${PE.toFixed(0)} J`; wfTxt.textContent = `${Wf.toFixed(0)} J`;
    return {KE,PE};
  }

  let last = performance.now();
  function tick(now){
    const dt = Math.min(0.033, (now-last)/1000 || 0.016);
    last = now;
    if(!dragging){
      const p=atS(s);
      const PE = Math.max(0,mass*g*(500-p.y));
      const KE = Math.max(0,E0 - Wf - PE);
      let speed = Math.sqrt(2*KE/mass);

      if(brake && KE>0){
        const loss = Math.min(KE, 420*dt);
        Wf += loss;
        speed = Math.sqrt(2*Math.max(0, KE-loss)/mass);
      }

      // Frictionless motion: cart moves along track.
      s += dir * (speed * dt) / 1500;
      if(s<=0 || s>=1){ s=Math.max(0,Math.min(1,s)); dir*=-1; }

      // Reverse direction once at turning points (KE ~ 0), prevents jitter/sticking.
      if(KE < 8 && !turning){
        dir *= -1;
        turning = true;
      }
      if(KE >= 8){
        turning = false;
      }
    }
    setCart();
    updateEnergy();
    requestAnimationFrame(tick);
  }

  function pointerToS(clientX, clientY){
    const r = document.querySelector('.scene').getBoundingClientRect();
    const x = (clientX-r.left) * 960/r.width;
    const y = (clientY-r.top) * 540/r.height;
    let best=0, d=1e9;
    for(let i=0;i<samples.length;i++){
      const dx=samples[i].x-x, dy=samples[i].y-y;
      const dd=dx*dx+dy*dy;
      if(dd<d){d=dd;best=i;}
    }
    return samples[best].s;
  }

  const cart = document.getElementById('cartG');
  cart.addEventListener('pointerdown', (e)=>{ dragging=true; turning=false; cart.setPointerCapture(e.pointerId); s=pointerToS(e.clientX,e.clientY); resetEnergy(); setCart(); updateEnergy(); });
  cart.addEventListener('pointermove', (e)=>{ if(!dragging) return; s=pointerToS(e.clientX,e.clientY); resetEnergy(); setCart(); updateEnergy(); });
  cart.addEventListener('pointerup', ()=>{ dragging=false; turning=false; const p=atS(s); dir = p.ty > 0 ? -1 : 1; resetEnergy(); });

  brakeBtn.addEventListener('click',()=>{ brake=!brake; brakeBtn.textContent=`Brake: ${brake?'ON':'OFF'}`; });
  resetBtn.addEventListener('click',()=>{ s=0.04; dir=1; turning=false; brake=false; brakeBtn.textContent='Brake: OFF'; resetEnergy(); setCart(); updateEnergy(); });

  setCart(); updateEnergy(); requestAnimationFrame(tick);
})();
</script>
</body>
</html>
