<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Isokoorinen muutos</title>
<style>
  :root {
    --text: #3F3D39;
    --line: #222222;
    --blue: #2E86A6;
    --red: #D84A62;
    --orange: #F28C28;
    --yellow: #FFD95A;
    --pale-blue: #E7F4F5;
  }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #FFFFFF;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
  }

  body {
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  .slide {
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
    aspect-ratio: 16 / 9;
    position: relative;
    background: #FFFFFF;
  }

  svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  text {
    fill: var(--text);
    font-size: 21px;
    font-weight: 520;
  }

  .small {
    font-size: 17px;
  }

  .sketch {
    stroke: var(--line);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }

  .thin {
    stroke-width: 2.4;
  }

  .gas-fill {
    fill: var(--pale-blue);
    opacity: 0.45;
  }

  #heat,
  #cooling {
    transition: opacity 220ms ease;
  }

  .controls {
    position: absolute;
    left: 74px;
    right: 74px;
    bottom: 22px;
    display: grid;
    grid-template-columns: auto 1fr auto auto auto auto;
    align-items: center;
    gap: 18px;
    color: var(--text);
    font-size: clamp(15px, 2.2vw, 22px);
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--line);
  }

  button {
    border: 2px solid var(--line);
    background: #FFFFFF;
    color: var(--text);
    border-radius: 999px;
    padding: 7px 16px;
    font: inherit;
    cursor: pointer;
  }

  button:active {
    transform: translateY(1px);
  }

  .value {
    min-width: 105px;
    font-weight: 620;
    white-space: nowrap;
  }

  @media (max-width: 760px) {
    .controls {
      left: 34px;
      right: 34px;
      gap: 10px;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: auto auto;
    }

    .value {
      min-width: auto;
      font-size: 15px;
    }

    button {
      padding: 6px 12px;
    }
  }
</style>
</head>
<body>
  <main class="slide" aria-label="Isokoorisen muutoksen simulaatio">
    <svg viewBox="0 0 960 540" role="img" aria-label="Suljettu kaasusäiliö, hiukkaset, painemittari ja paine-lämpötilakuvaaja">
      <defs>
        <pattern id="hatch" patternUnits="userSpaceOnUse" width="12" height="12" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="12" stroke="#222222" stroke-width="1.2" opacity="0.18"/>
        </pattern>

        <clipPath id="gasClip">
          <rect x="138" y="145" width="438" height="200" rx="12"/>
        </clipPath>
      </defs>

      <!-- Säiliö -->
      <path d="M105 360 C220 374 465 374 625 360" class="sketch thin" opacity="0.28"/>
      <rect x="136" y="145" width="440" height="200" rx="12" class="gas-fill"/>

      <path d="M125 145 C250 137 455 139 590 145" class="sketch"/>
      <path d="M125 345 C260 354 455 353 590 345" class="sketch"/>
      <path d="M125 145 C117 205 117 286 125 345" class="sketch"/>
      <path d="M590 145 C598 205 598 286 590 345" class="sketch"/>

      <!-- Kiinteät seinät -->
      <rect x="119" y="132" width="26" height="226" rx="7" fill="#FFFFFF" stroke="#222222" stroke-width="3"/>
      <rect x="570" y="132" width="26" height="226" rx="7" fill="#FFFFFF" stroke="#222222" stroke-width="3"/>
      <rect x="123" y="138" width="18" height="214" rx="5" fill="url(#hatch)" opacity="0.7"/>
      <rect x="574" y="138" width="18" height="214" rx="5" fill="url(#hatch)" opacity="0.7"/>

      <g id="particles" clip-path="url(#gasClip)"></g>

      <!-- Lämpö: näkyy vain, kun lämpötilaa nostetaan -->
      <g id="heat" opacity="0">
        <path id="heatWave1" d="M220 393 C208 374 238 366 222 347" fill="none" stroke="#F28C28" stroke-width="4" stroke-linecap="round"/>
        <path id="heatWave2" d="M330 395 C315 374 348 364 332 344" fill="none" stroke="#F28C28" stroke-width="4" stroke-linecap="round"/>
        <path id="heatWave3" d="M440 393 C425 374 456 365 442 346" fill="none" stroke="#F28C28" stroke-width="4" stroke-linecap="round"/>
        <path d="M185 410 C260 421 430 421 505 410" class="sketch thin" opacity="0.35"/>
      </g>

      <!-- Jäähdytys: näkyy vain, kun lämpötilaa lasketaan -->
      <g id="cooling" opacity="0">
        <path id="coolLine1" d="M220 348 C208 366 238 374 222 395" fill="none" stroke="#2E86A6" stroke-width="4" stroke-linecap="round"/>
        <path id="coolLine2" d="M330 346 C315 366 348 376 332 397" fill="none" stroke="#2E86A6" stroke-width="4" stroke-linecap="round"/>
        <path id="coolLine3" d="M440 348 C425 366 456 374 442 395" fill="none" stroke="#2E86A6" stroke-width="4" stroke-linecap="round"/>
        <rect x="190" y="407" width="64" height="28" rx="6" fill="#E7F4F5" stroke="#2E86A6" stroke-width="2.6" opacity="0.92"/>
        <path d="M204 413 L242 413 M205 426 L237 426" stroke="#2E86A6" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
        <rect x="256" y="404" width="60" height="31" rx="6" fill="#FFFFFF" stroke="#2E86A6" stroke-width="2.6" opacity="0.92"/>
        <path d="M267 411 L303 411 M269 425 L298 425" stroke="#2E86A6" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
        <g stroke="#2E86A6" stroke-width="2.2" stroke-linecap="round" opacity="0.92">
          <line x1="352" y1="405" x2="352" y2="435"/>
          <line x1="337" y1="420" x2="367" y2="420"/>
          <line x1="341" y1="409" x2="363" y2="431"/>
          <line x1="363" y1="409" x2="341" y2="431"/>
        </g>
      </g>

      <!-- Painemittari -->
      <g id="gauge">
        <text x="735" y="88">Paine</text>

        <circle cx="770" cy="180" r="72" fill="#FFFFFF" stroke="#222222" stroke-width="4"/>
        <circle cx="770" cy="180" r="58" fill="#FAFAFA" stroke="#222222" stroke-width="2" opacity="0.72"/>

        <path id="highPressureMark" fill="none" stroke="#D84A62" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
        <path d="M720 221 C744 238 795 239 821 221" class="sketch thin" opacity="0.28"/>

        <g id="ticks"></g>
        <line id="needle" x1="770" y1="180" x2="770" y2="126" stroke="#D84A62" stroke-width="5" stroke-linecap="round"/>
        <circle cx="770" cy="180" r="7" fill="#222222"/>
      </g>

      <!-- P-T-kuvaaja -->
      <g id="graph">
        <path d="M690 415 L690 305" class="sketch thin"/>
        <path d="M690 415 L875 415" class="sketch thin"/>
        <text x="675" y="305" class="small">P</text>
        <text x="875" y="438" class="small">T</text>
        <path id="lineGraph" d="" fill="none" stroke="#2E86A6" stroke-width="4" stroke-linecap="round"/>
        <line id="graphT" x1="720" y1="415" x2="720" y2="360" stroke="#222222" stroke-width="2" stroke-dasharray="5 7" opacity="0.45"/>
        <line id="graphP" x1="690" y1="360" x2="720" y2="360" stroke="#222222" stroke-width="2" stroke-dasharray="5 7" opacity="0.45"/>
        <circle id="graphPoint" cx="720" cy="360" r="7" fill="#D84A62"/>
      </g>
    </svg>

    <section class="controls" aria-label="Säätimet">
      <label for="temperatureSlider">Lämpötila</label>
      <input id="temperatureSlider" type="range" min="200" max="600" step="10" value="300" aria-label="Lämpötila" />
      <span id="tReadout" class="value">T = 300 K</span>
      <span id="pReadout" class="value">P = 100 kPa</span>
      <span class="value">V = 3,0 l</span>
      <button id="resetButton" type="button">Nollaa</button>
    </section>
  </main>

<script>
  const slider = document.getElementById("temperatureSlider");
  const resetButton = document.getElementById("resetButton");
  const tReadout = document.getElementById("tReadout");
  const pReadout = document.getElementById("pReadout");

  const particlesGroup = document.getElementById("particles");
  const needle = document.getElementById("needle");
  const ticks = document.getElementById("ticks");
  const highPressureMark = document.getElementById("highPressureMark");

  const lineGraph = document.getElementById("lineGraph");
  const graphPoint = document.getElementById("graphPoint");
  const graphT = document.getElementById("graphT");
  const graphP = document.getElementById("graphP");

  const heat = document.getElementById("heat");
  const cooling = document.getElementById("cooling");
  const heatWave1 = document.getElementById("heatWave1");
  const heatWave2 = document.getElementById("heatWave2");
  const heatWave3 = document.getElementById("heatWave3");
  const coolLine1 = document.getElementById("coolLine1");
  const coolLine2 = document.getElementById("coolLine2");
  const coolLine3 = document.getElementById("coolLine3");
  let energyFlowHideTimeout = null;
  let previousTemperature = getTemperature();

  const T_MIN = 200;
  const T_MAX = 600;
  const T_DEFAULT = 300;
  const P_DEFAULT = 100;

  const COOL_RGB = { r: 46, g: 134, b: 166 }; // #2E86A6
  const HOT_RGB  = { r: 216, g: 74,  b: 98  }; // #D84A62

  const chamber = {
    x0: 138,
    x1: 576,
    y0: 145,
    y1: 345
  };

  const graph = {
    x0: 690,
    y0: 415,
    w: 185,
    h: 110,
    pMin: P_DEFAULT * T_MIN / T_DEFAULT,
    pMax: P_DEFAULT * T_MAX / T_DEFAULT
  };

  const particles = [];
  const particleCount = 42;

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function map(value, inMin, inMax, outMin, outMax) {
    return outMin + (value - inMin) * (outMax - outMin) / (inMax - inMin);
  }

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function rgbToString(rgb) {
    return `rgb(${Math.round(rgb.r)}, ${Math.round(rgb.g)}, ${Math.round(rgb.b)})`;
  }

  function particleColorFromTemperature(temperature) {
    const t = clamp((temperature - T_MIN) / (T_MAX - T_MIN), 0, 1);
    return rgbToString({
      r: lerp(COOL_RGB.r, HOT_RGB.r, t),
      g: lerp(COOL_RGB.g, HOT_RGB.g, t),
      b: lerp(COOL_RGB.b, HOT_RGB.b, t)
    });
  }

  function getTemperature() {
    return Number(slider.value);
  }

  // Isokoorinen muutos: kun tilavuus ja ainemäärä pysyvät vakioina, P/T on vakio.
  function getPressure(temperature) {
    return P_DEFAULT * temperature / T_DEFAULT;
  }

  function showEnergyFlow(direction) {
    heat.setAttribute("opacity", direction === "heating" ? "1" : "0");
    cooling.setAttribute("opacity", direction === "cooling" ? "1" : "0");

    if (energyFlowHideTimeout !== null) {
      clearTimeout(energyFlowHideTimeout);
    }

    energyFlowHideTimeout = setTimeout(() => {
      hideEnergyFlow();
    }, 650);
  }

  function hideEnergyFlow() {
    if (energyFlowHideTimeout !== null) {
      clearTimeout(energyFlowHideTimeout);
      energyFlowHideTimeout = null;
    }

    heat.setAttribute("opacity", "0");
    cooling.setAttribute("opacity", "0");
  }

  function polar(cx, cy, r, deg) {
    const rad = (deg - 90) * Math.PI / 180;
    return {
      x: cx + r * Math.cos(rad),
      y: cy + r * Math.sin(rad)
    };
  }

  function pressureToGaugeAngle(pressure) {
    return map(pressure, graph.pMin, graph.pMax, -125, 125);
  }

  function describeArc(cx, cy, r, startDeg, endDeg) {
    const start = polar(cx, cy, r, startDeg);
    const end = polar(cx, cy, r, endDeg);
    const largeArc = Math.abs(endDeg - startDeg) > 180 ? 1 : 0;
    return `M ${start.x.toFixed(1)} ${start.y.toFixed(1)} A ${r} ${r} 0 ${largeArc} 1 ${end.x.toFixed(1)} ${end.y.toFixed(1)}`;
  }

  function drawGaugeTicks() {
    ticks.innerHTML = "";

    for (let i = 0; i <= 8; i++) {
      const deg = map(i, 0, 8, -125, 125);
      const a = polar(770, 180, 52, deg);
      const b = polar(770, 180, i % 2 === 0 ? 63 : 59, deg);

      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", a.x);
      line.setAttribute("y1", a.y);
      line.setAttribute("x2", b.x);
      line.setAttribute("y2", b.y);
      line.setAttribute("stroke", "#222222");
      line.setAttribute("stroke-width", i % 2 === 0 ? "2.4" : "1.6");
      line.setAttribute("stroke-linecap", "round");
      line.setAttribute("opacity", "0.72");
      ticks.appendChild(line);
    }

    highPressureMark.setAttribute("d", describeArc(770, 180, 58, 72, 125));
  }

  function graphX(temperature) {
    return map(temperature, T_MIN, T_MAX, graph.x0 + 22, graph.x0 + graph.w - 8);
  }

  function graphY(pressure) {
    return map(pressure, graph.pMin, graph.pMax, graph.y0 - 8, graph.y0 - graph.h);
  }

  function drawLineGraph() {
    const t1 = T_MIN;
    const t2 = T_MAX;
    const p1 = getPressure(t1);
    const p2 = getPressure(t2);

    lineGraph.setAttribute(
      "d",
      `M ${graphX(t1).toFixed(1)} ${graphY(p1).toFixed(1)} L ${graphX(t2).toFixed(1)} ${graphY(p2).toFixed(1)}`
    );
  }

  function makeParticles() {
    particlesGroup.innerHTML = "";
    particles.length = 0;

    const particleColor = particleColorFromTemperature(getTemperature());

    for (let i = 0; i < particleCount; i++) {
      const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      const radius = 4 + Math.random() * 2.2;

      const particle = {
        node: circle,
        r: radius,
        x: chamber.x0 + 18 + Math.random() * (chamber.x1 - chamber.x0 - 36),
        y: chamber.y0 + 18 + Math.random() * (chamber.y1 - chamber.y0 - 36),
        vx: (Math.random() < 0.5 ? -1 : 1) * (0.35 + Math.random() * 0.9),
        vy: (Math.random() < 0.5 ? -1 : 1) * (0.35 + Math.random() * 0.9)
      };

      circle.setAttribute("r", particle.r);
      circle.setAttribute("fill", particleColor);
      circle.setAttribute("opacity", "0.78");

      particlesGroup.appendChild(circle);
      particles.push(particle);
    }
  }

  function updateScene() {
    const temperature = getTemperature();
    const pressure = getPressure(temperature);
    const particleColor = particleColorFromTemperature(temperature);

    tReadout.textContent = `T = ${Math.round(temperature)} K`;
    pReadout.textContent = `P = ${Math.round(pressure)} kPa`;

    const angle = pressureToGaugeAngle(pressure);
    const needleEnd = polar(770, 180, 54, angle);
    needle.setAttribute("x2", needleEnd.x);
    needle.setAttribute("y2", needleEnd.y);

    const gx = graphX(temperature);
    const gy = graphY(pressure);

    graphPoint.setAttribute("cx", gx);
    graphPoint.setAttribute("cy", gy);

    graphT.setAttribute("x1", gx);
    graphT.setAttribute("x2", gx);
    graphT.setAttribute("y1", graph.y0);
    graphT.setAttribute("y2", gy);

    graphP.setAttribute("x1", graph.x0);
    graphP.setAttribute("x2", gx);
    graphP.setAttribute("y1", gy);
    graphP.setAttribute("y2", gy);

    const heatOpacity = map(temperature, T_MIN, T_MAX, 0.18, 1);
    const heatLift = map(temperature, T_MIN, T_MAX, 0, -12);

    for (const wave of [heatWave1, heatWave2, heatWave3]) {
      wave.setAttribute("opacity", heatOpacity);
      wave.setAttribute("transform", `translate(0 ${heatLift})`);
    }

    const coolingOpacity = map(temperature, T_MIN, T_MAX, 1, 0.25);
    const coolingDrop = map(temperature, T_MIN, T_MAX, -8, 4);

    for (const line of [coolLine1, coolLine2, coolLine3]) {
      line.setAttribute("opacity", coolingOpacity);
      line.setAttribute("transform", `translate(0 ${coolingDrop})`);
    }

    for (const p of particles) {
      p.node.setAttribute("fill", particleColor);
    }
  }

  function animate() {
    const temperature = getTemperature();
    const speedFactor = Math.sqrt(temperature / T_DEFAULT);

    const left = chamber.x0 + 6;
    const right = chamber.x1 - 6;
    const top = chamber.y0 + 5;
    const bottom = chamber.y1 - 5;

    for (const p of particles) {
      p.x += p.vx * speedFactor;
      p.y += p.vy * speedFactor;

      if (p.x - p.r < left) {
        p.x = left + p.r;
        p.vx *= -1;
      }

      if (p.x + p.r > right) {
        p.x = right - p.r;
        p.vx *= -1;
      }

      if (p.y - p.r < top) {
        p.y = top + p.r;
        p.vy *= -1;
      }

      if (p.y + p.r > bottom) {
        p.y = bottom - p.r;
        p.vy *= -1;
      }

      p.node.setAttribute("cx", p.x);
      p.node.setAttribute("cy", p.y);
    }

    requestAnimationFrame(animate);
  }

  slider.addEventListener("input", () => {
    const nextTemperature = getTemperature();

    if (nextTemperature > previousTemperature) {
      showEnergyFlow("heating");
    } else if (nextTemperature < previousTemperature) {
      showEnergyFlow("cooling");
    } else {
      hideEnergyFlow();
    }

    previousTemperature = nextTemperature;
    updateScene();
  });

  resetButton.addEventListener("click", () => {
    const currentTemperature = getTemperature();
    slider.value = T_DEFAULT;

    if (T_DEFAULT > currentTemperature) {
      showEnergyFlow("heating");
    } else if (T_DEFAULT < currentTemperature) {
      showEnergyFlow("cooling");
    } else {
      hideEnergyFlow();
    }

    previousTemperature = T_DEFAULT;
    updateScene();
  });

  drawGaugeTicks();
  drawLineGraph();
  makeParticles();
  updateScene();
  hideEnergyFlow();
  animate();
</script>
</body>
</html>
