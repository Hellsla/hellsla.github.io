<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ilmapallon lämpötilasimulaatio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #ffffff !important; color: #111; }
    .scene { display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem; gap: 1.5rem; }
    .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; max-width: 440px; }
    .temp-label { font-size: 14px; color: #666; }
    .temp-value { font-size: 18px; font-weight: 500; min-width: 80px; text-align: center; }
    .slider-row { display: flex; align-items: center; gap: 12px; width: 100%; }
    .mode-tag { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
    .mode-hot { background: #FAECE7; color: #993C1D; }
    .mode-cold { background: #E6F1FB; color: #185FA5; }
    .canvas-wrap { position: relative; width: 440px; height: 380px; }
    canvas { position: absolute; top: 0; left: 0; }
    .fact { font-size: 13px; color: #555; text-align: center; max-width: 380px; line-height: 1.6; padding: 8px 14px; border-radius: 8px; border: 1px solid #e0e0e0; background: #f9f9f9; }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 2px; background: #ddd; outline: none; flex: 1; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px; border-radius: 50%; background: #555; cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%; background: #555; cursor: pointer; border: none;
    }
  </style>
</head>
<body>
<div class="scene">
  <div class="canvas-wrap">
    <canvas id="c" width="440" height="380"></canvas>
  </div>
  <div class="controls">
    <div class="slider-row">
      <span class="mode-tag mode-cold">Jäähdytä</span>
      <input type="range" min="-30" max="100" value="20" id="tempSlider" step="1">
      <span class="mode-tag mode-hot">Lämmitä</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="temp-label">Lämpötila:</span>
      <span class="temp-value" id="tempOut">20°C</span>
    </div>
  </div>
  <div class="fact" id="factBox">Huoneenlämmössä kaasumolekyylit liikkuvat noin 500 m/s nopeudella ja pomppivat vapaasti, pitäen ilmapallon täytettynä.</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const slider = document.getElementById('tempSlider');
const tempOut = document.getElementById('tempOut');
const factBox = document.getElementById('factBox');

const W = 440, H = 380;
const BALLOON_CX = 190, BALLOON_BASE_Y = 230;
const MAG_CX = 330, MAG_CY = 200, MAG_R = 72;
const KNOT_Y_OFFSET = 10;

const facts = [
  { min: -30, max: -10, text: "Jäätyminen! Kaasumolekyylit menettävät energiaa, hidastuvat huomattavasti ja tiivistyvät — ilmapallo kutistuu dramaattisesti." },
  { min: -10, max: 15,  text: "Kylmä ilma — molekyylit liikkuvat hitaasti ja ilmapallo tyhjenee selvästi kaasun supistuessa." },
  { min: 15,  max: 30,  text: "Huoneenlämmössä kaasumolekyylit liikkuvat noin 500 m/s ja pomppivat vapaasti, pitäen ilmapallon täytettynä." },
  { min: 30,  max: 60,  text: "Lämpenee! Molekyylit saavat lisää energiaa, liikkuvat nopeammin ja törmäävät voimakkaammin seinämiin — ilmapallo laajenee." },
  { min: 60,  max: 101, text: "Kuuma! Molekyylit sinkoutuivat suurella nopeudella ja työntävät ulospäin voimakkaasti — maksimilaajeneminen!" }
];

let temp = 20;
let molecules = [];
const MOL_COUNT = 22;

function tempToRatio(t) { return (t + 30) / 130; }
function getBalloonRadius(t) { return 55 + tempToRatio(t) * 55; }
function getBalloonColor(t) {
  const r = tempToRatio(t);
  const R = Math.round(80  + r * 175);
  const G = Math.round(140 - r * 110);
  const B = Math.round(230 - r * 200);
  return {
    main:  `rgb(${R},${G},${B})`,
    light: `rgb(${Math.min(255,R+60)},${Math.min(255,G+60)},${Math.min(255,B+60)})`,
    dark:  `rgb(${Math.max(0,R-50)},${Math.max(0,G-30)},${Math.max(0,B-60)})`
  };
}
function getSpeed(t) { return 0.3 + tempToRatio(t) * 3.8; }

function initMolecules() {
  molecules = [];
  for (let i = 0; i < MOL_COUNT; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = getSpeed(temp);
    molecules.push({
      x: BALLOON_CX + (Math.random() - 0.5) * 60,
      y: BALLOON_BASE_Y - 60 + (Math.random() - 0.5) * 60,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      r: 3.5
    });
  }
}

function updateMolecules() {
  const spd = getSpeed(temp);
  const balloonR = getBalloonRadius(temp);
  const bcy = BALLOON_BASE_Y - balloonR * 0.15;
  molecules.forEach(m => {
    m.x += m.vx;
    m.y += m.vy;
    const dx = m.x - BALLOON_CX, dy = m.y - bcy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist + m.r > balloonR - 4) {
      const nx = dx/dist, ny = dy/dist;
      const dot = m.vx*nx + m.vy*ny;
      m.vx -= 2*dot*nx;
      m.vy -= 2*dot*ny;
      const overlap = dist + m.r - (balloonR - 4);
      m.x -= nx*overlap;
      m.y -= ny*overlap;
    }
    const curSpd = Math.sqrt(m.vx*m.vx + m.vy*m.vy);
    if (Math.abs(curSpd - spd) > 0.5) {
      const scale = spd / (curSpd || 1);
      m.vx *= scale;
      m.vy *= scale;
    }
  });
}

function drawBalloon(t) {
  const r = getBalloonRadius(t);
  const col = getBalloonColor(t);
  const bcy = BALLOON_BASE_Y - r * 0.15;
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(BALLOON_CX, bcy, r, r * 1.15, 0, 0, Math.PI * 2);
  ctx.fillStyle = col.main;
  ctx.fill();
  ctx.strokeStyle = col.dark;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(BALLOON_CX - r*0.25, bcy - r*0.3, r*0.22, r*0.14, -0.5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.fill();
  const knotY = bcy + r * 1.15 + KNOT_Y_OFFSET;
  ctx.beginPath();
  ctx.moveTo(BALLOON_CX - 6, bcy + r * 1.14);
  ctx.lineTo(BALLOON_CX + 6, bcy + r * 1.14);
  ctx.lineTo(BALLOON_CX + 4, knotY);
  ctx.lineTo(BALLOON_CX - 4, knotY);
  ctx.closePath();
  ctx.fillStyle = col.dark;
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(BALLOON_CX, knotY);
  ctx.bezierCurveTo(BALLOON_CX + 12, knotY + 30, BALLOON_CX - 8, knotY + 55, BALLOON_CX + 5, knotY + 80);
  ctx.strokeStyle = col.dark;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

function drawMolecules(t) {
  const r = getBalloonRadius(t);
  const bcy = BALLOON_BASE_Y - r * 0.15;
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(BALLOON_CX, bcy, r - 3, (r - 3) * 1.15, 0, 0, Math.PI * 2);
  ctx.clip();
  const spd = getSpeed(t);
  const ratio = tempToRatio(t);
  const mR = Math.round(200 + ratio * 55);
  const mG = Math.round(50  + ratio * 20);
  const mB = Math.round(255 - ratio * 230);
  molecules.forEach(m => {
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${mR},${mG},${mB})`;
    ctx.fill();
    ctx.strokeStyle = `rgba(${mR-40},${mG},${mB-40},0.7)`;
    ctx.lineWidth = 1;
    ctx.stroke();
    if (spd > 2) {
      const len = Math.min(spd * 2.5, 10);
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(m.x - m.vx/spd*len, m.y - m.vy/spd*len);
      ctx.strokeStyle = `rgba(${mR},${mG},${mB},0.35)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  });
  ctx.restore();
}

function drawMagnifier(t) {
  const r = getBalloonRadius(t);
  const bcy = BALLOON_BASE_Y - r * 0.15;

  // --- Handle shadow ---
  ctx.save();
  ctx.beginPath();
  const hx1 = MAG_CX + MAG_R * 0.62, hy1 = MAG_CY + MAG_R * 0.62;
  const hx2 = hx1 + 40, hy2 = hy1 + 40;
  ctx.moveTo(hx1, hy1); ctx.lineTo(hx2, hy2);
  ctx.strokeStyle = 'rgba(0,0,0,0.18)';
  ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.stroke();
  ctx.restore();

  // --- Handle ---
  ctx.save();
  ctx.beginPath();
  const hx1b = MAG_CX + MAG_R * 0.62, hy1b = MAG_CY + MAG_R * 0.62;
  ctx.moveTo(hx1b, hy1b); ctx.lineTo(hx1b + 40, hy1b + 40);
  ctx.strokeStyle = '#5a3a0a'; ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.stroke();
  ctx.strokeStyle = '#a0650f'; ctx.lineWidth = 9; ctx.stroke();
  ctx.strokeStyle = '#c8881e'; ctx.lineWidth = 6; ctx.stroke();
  // handle highlight streak
  ctx.beginPath();
  ctx.moveTo(hx1b + 2, hy1b - 2); ctx.lineTo(hx1b + 30, hy1b + 28);
  ctx.strokeStyle = 'rgba(255,210,120,0.45)'; ctx.lineWidth = 2; ctx.stroke();
  ctx.restore();

  // --- Molecules inside lens (clipped) ---
  ctx.save();
  ctx.beginPath();
  ctx.arc(MAG_CX, MAG_CY, MAG_R - 5, 0, Math.PI * 2);
  ctx.clip();
  // Pale glass base tint
  ctx.fillStyle = 'rgba(210,230,255,0.13)';
  ctx.fillRect(MAG_CX - MAG_R, MAG_CY - MAG_R, MAG_R * 2, MAG_R * 2);
  const zoom = 2.2;
  const ratio = tempToRatio(t);
  const mR = Math.round(200 + ratio * 55);
  const mG = Math.round(50  + ratio * 20);
  const mB = Math.round(255 - ratio * 230);
  const spd = getSpeed(t);
  molecules.slice(0, 14).forEach(m => {
    const ox = (m.x - BALLOON_CX) * zoom + MAG_CX;
    const oy = (m.y - bcy) * zoom + MAG_CY;
    if (ox > MAG_CX - MAG_R && ox < MAG_CX + MAG_R && oy > MAG_CY - MAG_R && oy < MAG_CY + MAG_R) {
      ctx.beginPath();
      ctx.arc(ox, oy, m.r * zoom, 0, Math.PI * 2);
      ctx.fillStyle = `rgb(${mR},${mG},${mB})`;
      ctx.fill();
      ctx.strokeStyle = `rgba(${mR-40},${mG},${mB-40},0.8)`;
      ctx.lineWidth = 1.5; ctx.stroke();
      if (spd > 1.5) {
        const len = Math.min(spd * 4, 18);
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(ox - m.vx/spd*len, oy - m.vy/spd*len);
        ctx.strokeStyle = `rgba(${mR},${mG},${mB},0.4)`;
        ctx.lineWidth = 2; ctx.stroke();
      }
    }
  });
  ctx.restore();

  // --- Glass edge darkening (Fresnel effect) ---
  ctx.save();
  ctx.beginPath();
  ctx.arc(MAG_CX, MAG_CY, MAG_R - 5, 0, Math.PI * 2);
  ctx.clip();
  const edgeGrad = ctx.createRadialGradient(MAG_CX, MAG_CY, MAG_R * 0.55, MAG_CX, MAG_CY, MAG_R - 5);
  edgeGrad.addColorStop(0,   'rgba(180,210,255,0.0)');
  edgeGrad.addColorStop(0.7, 'rgba(160,200,255,0.06)');
  edgeGrad.addColorStop(1.0, 'rgba(80,120,200,0.32)');
  ctx.fillStyle = edgeGrad;
  ctx.fillRect(MAG_CX - MAG_R, MAG_CY - MAG_R, MAG_R * 2, MAG_R * 2);
  ctx.restore();

  // --- Chrome rim (outer ring) ---
  ctx.save();
  ctx.beginPath();
  ctx.arc(MAG_CX, MAG_CY, MAG_R, 0, Math.PI * 2);
  // Dark base
  ctx.strokeStyle = '#555'; ctx.lineWidth = 10; ctx.stroke();
  // Mid chrome
  ctx.strokeStyle = '#bbb'; ctx.lineWidth = 7; ctx.stroke();
  // Bright highlight arc top-left
  ctx.beginPath();
  ctx.arc(MAG_CX, MAG_CY, MAG_R, Math.PI * 1.1, Math.PI * 1.7);
  ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 3; ctx.stroke();
  // Dim arc bottom-right
  ctx.beginPath();
  ctx.arc(MAG_CX, MAG_CY, MAG_R, Math.PI * 0.05, Math.PI * 0.75);
  ctx.strokeStyle = 'rgba(80,80,80,0.6)'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.restore();

  // --- Primary glare blob (top-left) ---
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(MAG_CX - MAG_R*0.32, MAG_CY - MAG_R*0.38, MAG_R*0.28, MAG_R*0.13, -0.6, 0, Math.PI*2);
  const glare1 = ctx.createRadialGradient(
    MAG_CX - MAG_R*0.32, MAG_CY - MAG_R*0.38, 0,
    MAG_CX - MAG_R*0.32, MAG_CY - MAG_R*0.38, MAG_R*0.28
  );
  glare1.addColorStop(0,   'rgba(255,255,255,0.72)');
  glare1.addColorStop(0.5, 'rgba(255,255,255,0.28)');
  glare1.addColorStop(1,   'rgba(255,255,255,0.0)');
  ctx.fillStyle = glare1; ctx.fill();
  ctx.restore();

  // --- Small secondary glare dot ---
  ctx.save();
  ctx.beginPath();
  ctx.arc(MAG_CX - MAG_R*0.5, MAG_CY - MAG_R*0.5, 5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.fill();
  ctx.restore();

  // --- Caustic crescent (bottom-right inner rim) ---
  ctx.save();
  ctx.beginPath();
  ctx.arc(MAG_CX, MAG_CY, MAG_R - 10, Math.PI * 0.15, Math.PI * 0.65);
  ctx.strokeStyle = 'rgba(200,230,255,0.28)'; ctx.lineWidth = 4; ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.font = '11px system-ui, sans-serif';
  ctx.fillStyle = 'rgba(120,90,20,0.85)';
  ctx.textAlign = 'center';
  ctx.fillText('suurennettu näkymä', MAG_CX, MAG_CY + MAG_R + 16);
  ctx.restore();
}

function drawTempIndicator(t) {
  const ratio = tempToRatio(t);
  const barH = 120, barW = 12;
  const barX = 22, barY = 130;
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW, barH, 6);
  ctx.fillStyle = 'rgba(180,180,180,0.18)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(120,120,120,0.3)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  const fillH = barH * ratio;
  const fillY = barY + barH - fillH;
  const R = Math.round(80  + ratio * 175);
  const G = Math.round(140 - ratio * 110);
  const B = Math.round(230 - ratio * 200);
  ctx.beginPath();
  ctx.roundRect(barX, fillY, barW, fillH, 5);
  ctx.fillStyle = `rgb(${R},${G},${B})`;
  ctx.fill();
  for (let i = 0; i <= 4; i++) {
    const ty = barY + barH * (1 - i/4);
    ctx.beginPath();
    ctx.moveTo(barX + barW, ty);
    ctx.lineTo(barX + barW + 5, ty);
    ctx.strokeStyle = 'rgba(120,120,120,0.5)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  ctx.restore();
}

function drawLabels(t) {
  const r = getBalloonRadius(t);
  const bcy = BALLOON_BASE_Y - r * 0.15;
  const stateText = t < 0 ? 'Jäätyminen' : t < 15 ? 'Kylmä' : t < 35 ? 'Lämmin' : t < 65 ? 'Kuuma' : 'Erittäin kuuma!';
  ctx.save();
  ctx.fillStyle = getBalloonColor(t).dark;
  ctx.font = '500 13px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(stateText, BALLOON_CX, bcy - r * 1.15 - 12);
  ctx.restore();
}

function getFact(t) {
  for (const f of facts) if (t >= f.min && t < f.max) return f.text;
  return facts[facts.length - 1].text;
}

function frame() {
  ctx.clearRect(0, 0, W, H);
  updateMolecules();
  drawBalloon(temp);
  drawMolecules(temp);
  drawMagnifier(temp);
  drawTempIndicator(temp);
  drawLabels(temp);
  requestAnimationFrame(frame);
}

slider.addEventListener('input', () => {
  temp = parseInt(slider.value);
  tempOut.textContent = temp + '°C';
  factBox.textContent = getFact(temp);
  const ratio = tempToRatio(temp);
  const R = Math.round(80  + ratio * 175);
  const G = Math.round(140 - ratio * 110);
  const B = Math.round(230 - ratio * 200);
  tempOut.style.color = `rgb(${R},${G},${B})`;
});

initMolecules();
frame();
</script>
</body>
</html>
