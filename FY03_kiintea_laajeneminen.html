<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiinteä aine — lämpötilasimulaatio</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Caveat', cursive;
      background: #ffffff;
      color: #171717;
      min-height: 100vh;
    }
    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 12px 20px;
      gap: 14px;
    }
    .canvas-wrap {
      position: relative;
      width: 520px;
      height: 440px;
      background: #ffffff;
    }
    canvas { display: block; }
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 620px;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
    }
    .mode-tag {
      font-family: 'Caveat', cursive;
      font-size: 28px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 7px 10px 8px 9px;
      border: 3px solid #141414;
      white-space: nowrap;
      background: #ffffff;
      box-shadow: 2px 3px 0 rgba(0,0,0,0.08);
    }
    .mode-cold {
      color: #0d66a7;
      transform: rotate(-1.4deg);
      background-image: repeating-linear-gradient(-18deg, rgba(21,135,212,0.16) 0 2px, transparent 2px 7px);
    }
    .mode-hot {
      color: #c53226;
      transform: rotate(1.2deg);
      background-image: repeating-linear-gradient(18deg, rgba(226,68,51,0.16) 0 2px, transparent 2px 7px);
    }
    .temp-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .temp-label {
      font-family: 'Caveat', cursive;
      font-size: 30px;
      font-weight: 700;
      color: #444;
    }
    .temp-value {
      font-family: 'Caveat', cursive;
      font-size: 42px;
      font-weight: 700;
      min-width: 90px;
    }
    .fact {
      font-family: 'Caveat', cursive;
      font-size: 26px;
      font-weight: 700;
      color: #171717;
      text-align: center;
      max-width: 620px;
      line-height: 1.45;
      padding: 10px 18px;
      background: #ffffff;
      border: 3px solid #141414;
      border-radius: 12px 9px 14px 10px;
      transform: rotate(-0.4deg);
      box-shadow: 3px 3px 0 rgba(0,0,0,0.12);
      background-image: repeating-linear-gradient(-12deg, rgba(245,202,46,0.22) 0 2px, transparent 2px 9px);
    }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      flex: 1; height: 10px; border-radius: 99px;
      background: #ffffff; border: 3px solid #171717;
      outline: none; cursor: pointer;
      box-shadow: inset 1px 1px 0 rgba(0,0,0,0.15);
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 30px; height: 30px; border-radius: 50%;
      background: #ffffff; cursor: pointer;
      border: 4px solid #171717;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.14);
    }
    input[type=range]::-moz-range-thumb {
      width: 30px; height: 30px; border-radius: 50%;
      background: #ffffff; cursor: pointer;
      border: 4px solid #171717;
    }
  </style>
</head>
<body>
<div class="scene">
  <div class="canvas-wrap">
    <canvas id="c" width="520" height="440"></canvas>
  </div>
  <div class="controls">
    <div class="slider-row">
      <span class="mode-tag mode-cold">❄️ Jäähdytä</span>
      <input type="range" min="-30" max="100" value="20" id="tempSlider" step="1">
      <span class="mode-tag mode-hot">🔥 Lämmitä</span>
    </div>
    <div class="temp-row">
      <span class="temp-label">Lämpötila:</span>
      <span class="temp-value" id="tempOut">20°C</span>
    </div>
  </div>
  <div class="fact" id="factBox" style="display:none"></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const slider = document.getElementById('tempSlider');
const tempOut = document.getElementById('tempOut');
const factBox = document.getElementById('factBox');

const W = 520, H = 440;
const BLOCK_CX = 185, BLOCK_CY = 218;
const MCX = 372, MCY = 210, MR = 82;
const COLS = 5, ROWS = 4;
const BASE_SX = 30, BASE_SY = 28;
const BLOCK_PAD = 20;
const MOL_R = 7.5;

const facts = [
  { min:-30, max:-10, text:"Jäätyminen! Atomit tuskin värisevät — aine supistuu ja kovettuu. 🥶" },
  { min:-10, max:15,  text:"Kylmässä atomit värisevät vain vähän ja pysyvät tiukasti kidehilassaan. ❄️" },
  { min:15,  max:30,  text:"Huoneenlämmössä atomit värisevät maltillisesti kidehilassaan — rakenne on vakaa. 😊" },
  { min:30,  max:60,  text:"Kuumassa atomit värisevät voimakkaasti — aine laajenee lämpölaajenemisen myötä! 🌡️" },
  { min:60,  max:101, text:"Erittäin kuumassa atomit värisevät rajusti — aine voi pian sulaa! 🔥🔥" }
];

let temp = 20;
let molecules = [];
let bWobble = [], mWobble = [], paperDots = [];
let startTime = performance.now();

function rnd(a, b) { return a + Math.random() * (b - a); }
function hash(n) { return ((Math.sin(n * 127.1) * 43758.5453) % 1 + 1) % 1; }
function j(n, amp) { return (hash(n) - 0.5) * amp * 2; }
function rgba(rgb, alpha) {
  if (rgb.startsWith('rgb(')) return rgb.replace('rgb', 'rgba').replace(')', ',' + alpha + ')');
  if (rgb.startsWith('#')) {
    const n = parseInt(rgb.slice(1), 16);
    return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${alpha})`;
  }
  return rgb;
}

function initTexture() {
  paperDots = Array.from({length:115}, (_, i) => ({
    x:rnd(0,W), y:rnd(0,H), r:rnd(0.25,0.9), a:rnd(0.03,0.075)
  }));
}
function initWobble() {
  bWobble = Array.from({length:48}, () => rnd(-1.4, 1.4));
  mWobble = Array.from({length:54}, () => rnd(-1.4, 1.4));
}

function tempRatio(t) { return (t + 30) / 130; }

function blockCol(t) {
  const r = tempRatio(t);
  const R = Math.round(55  + r * 195);
  const G = Math.round(144 - r * 90);
  const B = Math.round(225 - r * 185);
  return { pencil: `rgb(${R},${G},${B})`, pale: `rgba(${R},${G},${B},0.08)` };
}
function molCol(t) {
  const r = tempRatio(t);
  const R = Math.round(40  + r * 205);
  const G = Math.round(125 - r * 90);
  const B = Math.round(230 - r * 205);
  return `rgb(${R},${G},${B})`;
}

function getExpansion(t) { return 1 + tempRatio(t) * 0.18; }
function getSpacing(t)   { const e = getExpansion(t); return { sx: BASE_SX*e, sy: BASE_SY*e }; }
function getBlockDims(t) {
  const { sx, sy } = getSpacing(t);
  return { w: (COLS-1)*sx + BLOCK_PAD*2 + 14, h: (ROWS-1)*sy + BLOCK_PAD*2 + 10 };
}
function getMolBase(col, row, t) {
  const { sx, sy } = getSpacing(t);
  return {
    x: BLOCK_CX + (col - (COLS-1)/2) * sx,
    y: BLOCK_CY + (row - (ROWS-1)/2) * sy
  };
}

function getVibAmp(t) { return 0.4 + tempRatio(t) * 9.2; }

function initMolecules() {
  molecules = [];
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      molecules.push({
        col, row,
        phaseX: Math.random() * Math.PI * 2,
        phaseY: Math.random() * Math.PI * 2,
        freqX:  2.6 + Math.random() * 2.2,
        freqY:  2.2 + Math.random() * 2.2,
        seed:   (row * COLS + col) * 17.3,
        cx: 0, cy: 0
      });
    }
  }
}

function updateMolecules(time) {
  const amp = getVibAmp(temp);
  molecules.forEach(m => {
    const base = getMolBase(m.col, m.row, temp);
    m.cx = base.x + Math.sin(time * m.freqX + m.phaseX) * amp;
    m.cy = base.y + Math.cos(time * m.freqY + m.phaseY) * amp;
  });
}

// ── Drawing utilities (same as balloon) ──────────────────────────────────────

function roughLine(x1, y1, x2, y2, color='#141414', width=2.5, seed=1) {
  ctx.save();
  ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = color;
  for (let p = 0; p < 2; p++) {
    const k = seed + p*23;
    const mx = (x1+x2)/2 + j(k,6), my = (y1+y2)/2 + j(k+1,6);
    ctx.beginPath();
    ctx.moveTo(x1+j(k+2,1.7), y1+j(k+3,1.7));
    ctx.quadraticCurveTo(mx, my, x2+j(k+4,1.7), y2+j(k+5,1.7));
    ctx.lineWidth = width - p*0.7;
    ctx.globalAlpha = p===0 ? 1 : 0.62;
    ctx.stroke();
  }
  ctx.restore();
}

function roughStroke(drawPath, width=3, color='#141414', passes=2, alpha=1) {
  ctx.save();
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  for (let p = 0; p < passes; p++) {
    ctx.save();
    ctx.translate(j(p+width,0.45), j(p+width+9,0.45));
    drawPath();
    ctx.strokeStyle = rgba(color, alpha * (p===0 ? 1 : 0.68));
    ctx.lineWidth = width - p*0.55;
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

function hatchRect(x, y, w, h, color, spacing=8, angle=-0.55, seed=100, alpha=0.75) {
  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
  ctx.translate(x+w/2, y+h/2); ctx.rotate(angle); ctx.translate(-x-w/2, -y-h/2);
  for (let yy = y-h; yy < y+h*2; yy += spacing) {
    roughLine(x-w*0.25, yy+j(yy+seed,3), x+w*1.25, yy+j(yy+seed+4,3), rgba(color,alpha), 2.1, yy+seed);
  }
  ctx.restore();
}

function hatchInEllipse(cx, cy, rx, ry, color, spacing=9, angle=-0.55, alpha=0.78, cross=false) {
  function doHatch(a, so) {
    ctx.save();
    ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.clip();
    ctx.translate(cx,cy); ctx.rotate(a); ctx.translate(-cx,-cy);
    for (let y=cy-ry*1.65; y<=cy+ry*1.65; y+=spacing) {
      roughLine(cx-rx*1.35, y+j(y+so,2.4), cx+rx*1.35, y+j(y+so+7,2.4), rgba(color,alpha), 2.2, y+so);
    }
    ctx.restore();
  }
  doHatch(angle, 300);
  if (cross) doHatch(angle+1.42, 900);
}

function wobblyEllipsePath(cx, cy, rx, ry, wobble, phase=0) {
  const n = wobble.length;
  ctx.beginPath();
  for (let i=0; i<=n; i++) {
    const angle = (i/n)*Math.PI*2;
    const w = wobble[i%n] + j(i+phase, 0.35);
    const x = cx + (rx+w)*Math.cos(angle);
    const y = cy + (ry+w*0.75)*Math.sin(angle);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
}
function wobblyCirclePath(cx, cy, r, wobble, phase=0) {
  wobblyEllipsePath(cx, cy, r, r, wobble, phase);
}

// Wobbly rectangle path using stable hash-based jitter
function wobblyRectPath(x, y, w, h, seed=0) {
  const S = 10;
  ctx.beginPath();
  ctx.moveTo(x + j(seed, 2.5), y + j(seed+1, 2.5));
  for (let i=1; i<=S; i++) ctx.lineTo(x+w*(i/S)+j(seed+i*4,1.5),    y+j(seed+i*4+2,2.5));
  for (let i=1; i<=S; i++) ctx.lineTo(x+w+j(seed+100+i*4,2.5),       y+h*(i/S)+j(seed+100+i*4+2,1.5));
  for (let i=1; i<=S; i++) ctx.lineTo(x+w-w*(i/S)+j(seed+200+i*4,1.5), y+h+j(seed+200+i*4+2,2.5));
  for (let i=1; i<=S; i++) ctx.lineTo(x+j(seed+300+i*4,2.5),          y+h-h*(i/S)+j(seed+300+i*4+2,1.5));
  ctx.closePath();
}

function hatchInRect(x, y, w, h, color, spacing=9, angle=-0.55, alpha=0.78, cross=false) {
  function doHatch(a, so) {
    ctx.save();
    ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
    ctx.translate(x+w/2, y+h/2); ctx.rotate(a); ctx.translate(-x-w/2, -y-h/2);
    for (let yy=y-h; yy<=y+h*2; yy+=spacing) {
      roughLine(x-w*0.3, yy+j(yy+so,2.2), x+w*1.3, yy+j(yy+so+7,2.2), rgba(color,alpha), 2.2, yy+so);
    }
    ctx.restore();
  }
  doHatch(angle, 200);
  if (cross) doHatch(angle+1.42, 800);
}

function drawSketchDot(x, y, r, color, seed=1) {
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = '#ffffff'; ctx.fill();
  hatchInEllipse(x, y, r-1, r-1, color, 4, -0.55, 0.95, false);
  roughStroke(() => { ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); }, 1.8, '#121212', 2);
  ctx.restore();
}

function drawArrow(x1, y1, x2, y2, seed=1) {
  roughLine(x1, y1, x2, y2, '#121212', 2.4, seed);
  const a = Math.atan2(y2-y1, x2-x1), len=10;
  roughLine(x2, y2, x2-Math.cos(a-0.62)*len, y2-Math.sin(a-0.62)*len, '#121212', 2.2, seed+4);
  roughLine(x2, y2, x2-Math.cos(a+0.62)*len, y2-Math.sin(a+0.62)*len, '#121212', 2.2, seed+7);
}

// ── Scene drawing ─────────────────────────────────────────────────────────────

function drawBackground() {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
  ctx.save();
  paperDots.forEach(d => {
    ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,0,0,${d.a})`; ctx.fill();
  });
  ctx.restore();
}

function drawSolidBlock(t) {
  const { w, h } = getBlockDims(t);
  const col = blockCol(t);
  const x = BLOCK_CX - w/2, y = BLOCK_CY - h/2;
  const depth = 14; // 3-D side depth

  // ── Right side face ──
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x+w,     y);
  ctx.lineTo(x+w+depth, y-depth*0.55);
  ctx.lineTo(x+w+depth, y+h-depth*0.55);
  ctx.lineTo(x+w,     y+h);
  ctx.closePath();
  ctx.fillStyle = '#ffffff'; ctx.fill();
  hatchInRect(x+w, y-depth, depth+4, h+depth, col.pencil, 6, 0.8, 0.55, false);
  roughStroke(() => {
    ctx.beginPath();
    ctx.moveTo(x+w, y); ctx.lineTo(x+w+depth, y-depth*0.55);
    ctx.lineTo(x+w+depth, y+h-depth*0.55); ctx.lineTo(x+w, y+h);
  }, 2.5, '#121212', 2);
  ctx.restore();

  // ── Top face ──
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x,         y);
  ctx.lineTo(x+w,       y);
  ctx.lineTo(x+w+depth, y-depth*0.55);
  ctx.lineTo(x+depth,   y-depth*0.55);
  ctx.closePath();
  ctx.fillStyle = '#ffffff'; ctx.fill();
  hatchInRect(x, y-depth, w+depth, depth+4, col.pencil, 6, -0.3, 0.5, false);
  roughStroke(() => {
    ctx.beginPath();
    ctx.moveTo(x, y); ctx.lineTo(x+w, y);
    ctx.lineTo(x+w+depth, y-depth*0.55); ctx.lineTo(x+depth, y-depth*0.55); ctx.closePath();
  }, 2.5, '#121212', 2);
  ctx.restore();

  // ── Front face ──
  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, w, h);
  ctx.fillStyle = '#ffffff'; ctx.fill();
  hatchInRect(x, y, w, h, col.pencil, Math.max(7, 13 - tempRatio(t)*5), -0.55, 0.72, temp > 55 || temp < -5);

  // Shine strokes top-left area
  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
  for (let i=0; i<8; i++) {
    roughLine(x+i*9+4, y+4, x+i*9+22, y-4, 'rgba(255,255,255,0.72)', 2.2, 520+i);
  }
  ctx.restore();

  roughStroke(() => wobblyRectPath(x, y, w, h, 11), 3.6, '#121212', 2);
  ctx.restore();
}

function drawLatticeGridInBlock(t) {
  // Draw faint grid lines connecting base molecule positions (inside block clip)
  const { w, h } = getBlockDims(t);
  const x = BLOCK_CX - w/2, y = BLOCK_CY - h/2;
  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
  const col = blockCol(t);
  // Horizontal lines
  for (let row=0; row<ROWS; row++) {
    for (let col2=0; col2<COLS-1; col2++) {
      const a = getMolBase(col2,   row, t);
      const b = getMolBase(col2+1, row, t);
      roughLine(a.x, a.y, b.x, b.y, rgba(blockCol(t).pencil, 0.28), 1.4, 300+row*10+col2);
    }
  }
  // Vertical lines
  for (let col2=0; col2<COLS; col2++) {
    for (let row=0; row<ROWS-1; row++) {
      const a = getMolBase(col2, row,   t);
      const b = getMolBase(col2, row+1, t);
      roughLine(a.x, a.y, b.x, b.y, rgba(blockCol(t).pencil, 0.28), 1.4, 400+col2*10+row);
    }
  }
  ctx.restore();
}

function drawMoleculesInBlock(t) {
  const { w, h } = getBlockDims(t);
  const x = BLOCK_CX - w/2, y = BLOCK_CY - h/2;
  ctx.save();
  ctx.beginPath(); ctx.rect(x+2, y+2, w-4, h-4); ctx.clip();
  const mc = molCol(t);
  const spd = getVibAmp(t);
  molecules.forEach((m, i) => {
    if (spd > 3) {
      const base = getMolBase(m.col, m.row, t);
      roughLine(base.x, base.y, m.cx, m.cy, rgba(mc, 0.22), 2.5, 700+i);
    }
    drawSketchDot(m.cx, m.cy, MOL_R, mc, m.seed);
  });
  ctx.restore();
}

function drawMagnifier(t) {
  const lensWobble = mWobble;
  const zoom = 2.5;

  ctx.save();
  const hx = MCX + MR*0.62, hy = MCY + MR*0.62;

  // Handle
  ctx.save();
  ctx.translate(hx, hy); ctx.rotate(Math.PI/4);
  ctx.beginPath(); ctx.roundRect(-10, -4, 70, 20, 9);
  ctx.fillStyle = '#ffffff'; ctx.fill(); ctx.clip();
  hatchRect(-10, -4, 72, 22, '#8a5a19', 7, -0.35, 655, 0.9);
  ctx.restore();
  roughLine(hx-3, hy-3, hx+48, hy+48, '#121212', 16, 611);
  roughLine(hx-3, hy-3, hx+48, hy+48, '#9b671e', 10, 612);
  roughLine(hx-3, hy-3, hx+48, hy+48, '#121212', 2.5, 613);

  // Lens content
  ctx.save();
  wobblyCirclePath(MCX, MCY, MR-7, lensWobble, 4);
  ctx.clip();
  ctx.fillStyle = 'rgba(255,255,255,0.97)'; ctx.fillRect(MCX-MR, MCY-MR, MR*2, MR*2);
  hatchInEllipse(MCX, MCY, MR-10, MR-10, '#64b7eb', 12, -0.6, 0.20, false);

  // Bonds between adjacent molecules (zoomed)
  molecules.forEach((m1, i1) => {
    molecules.forEach((m2, i2) => {
      if (i1 >= i2) return;
      const dc = Math.abs(m1.col-m2.col), dr = Math.abs(m1.row-m2.row);
      if (!((dc===1&&dr===0)||(dc===0&&dr===1))) return;
      const ox1 = (m1.cx-BLOCK_CX)*zoom+MCX, oy1 = (m1.cy-BLOCK_CY)*zoom+MCY;
      const ox2 = (m2.cx-BLOCK_CX)*zoom+MCX, oy2 = (m2.cy-BLOCK_CY)*zoom+MCY;
      const d1 = Math.hypot(ox1-MCX, oy1-MCY), d2 = Math.hypot(ox2-MCX, oy2-MCY);
      if (d1 < MR-8 || d2 < MR-8) {
        // Color-code: stretched = warm, compressed = cool
        const bLen = Math.hypot(ox2-ox1, oy2-oy1);
        const restLen = BASE_SX * zoom * getExpansion(t);
        const ratio = bLen / restLen;
        const bc = ratio > 1.06 ? rgba(molCol(t), 0.7)
                 : ratio < 0.94 ? 'rgba(60,100,220,0.55)'
                 : 'rgba(100,100,110,0.55)';
        roughLine(ox1, oy1, ox2, oy2, bc, 3.2, 2000+i1*20+i2);
      }
    });
  });

  // Zoomed molecules
  const mc = molCol(t);
  const vibAmp = getVibAmp(t);
  molecules.forEach((m, i) => {
    const ox = (m.cx-BLOCK_CX)*zoom+MCX;
    const oy = (m.cy-BLOCK_CY)*zoom+MCY;
    if (Math.hypot(ox-MCX, oy-MCY) < MR-18) {
      if (vibAmp > 3) {
        const base = getMolBase(m.col, m.row, t);
        const box = (base.x-BLOCK_CX)*zoom+MCX, boy = (base.y-BLOCK_CY)*zoom+MCY;
        roughLine(box, boy, ox, oy, rgba(mc, 0.28), 3.5, 880+i);
      }
      drawSketchDot(ox, oy, MOL_R*zoom*0.46, mc, 900+i);
    }
  });
  ctx.restore();

  // Glass rim
  roughStroke(() => wobblyCirclePath(MCX, MCY, MR,   lensWobble, 2), 8.5, '#121212', 2);
  roughStroke(() => wobblyCirclePath(MCX, MCY, MR-3,  lensWobble, 7), 4.6, '#c79617', 2, 0.92);
  roughStroke(() => wobblyCirclePath(MCX, MCY, MR-8,  lensWobble, 10), 1.8, '#121212', 1, 0.82);

  // Glare
  roughLine(MCX-43, MCY-54, MCX-8,  MCY-68, 'rgba(255,255,255,0.9)', 4.5, 711);
  roughLine(MCX-50, MCY-42, MCX-25, MCY-55, 'rgba(255,255,255,0.75)', 3,   712);
  roughLine(MCX+32, MCY+48, MCX+53, MCY+28, 'rgba(120,165,205,0.25)', 3,   713);
  ctx.restore();
}

function drawThermometer(t) {
  const ratio = tempRatio(t);
  const bh=130, bw=17, bx=20, by=120;
  const R=Math.round(55+ratio*200), G=Math.round(145-ratio*90), B=Math.round(228-ratio*188);
  const fill = `rgb(${R},${G},${B})`;
  ctx.save();
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 8);
  ctx.fillStyle='#ffffff'; ctx.fill();
  roughStroke(()=>{ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,8);}, 3,'#121212',2);
  const fh=bh*ratio, fy=by+bh-fh;
  ctx.save();
  ctx.beginPath(); ctx.roundRect(bx+3,fy,bw-6,fh,6); ctx.clip();
  ctx.fillStyle=rgba(fill,0.12); ctx.fillRect(bx+2,fy,bw-4,fh);
  hatchRect(bx+2,fy,bw-4,fh,fill,5,-0.55,730,0.86);
  ctx.restore();
  ctx.beginPath(); ctx.arc(bx+bw/2,by+bh+10,14,0,Math.PI*2);
  ctx.fillStyle='#ffffff'; ctx.fill();
  hatchInEllipse(bx+bw/2,by+bh+10,12,12,fill,5,-0.55,0.88,true);
  roughStroke(()=>{ctx.beginPath(); ctx.arc(bx+bw/2,by+bh+10,14,0,Math.PI*2);},3,'#121212',2);
  ctx.strokeStyle='#121212'; ctx.lineWidth=1.7;
  ctx.font='19px Caveat, cursive'; ctx.fillStyle='#444'; ctx.textAlign='left';
  [[-30,0],[0,0.23],[20,0.38],[60,0.69],[100,1]].forEach(([label,pos],i)=>{
    const ty=by+bh*(1-pos);
    roughLine(bx+bw,ty,bx+bw+7,ty,'#121212',1.5,770+i);
    ctx.fillText(label+'°', bx+bw+9+j(i,1), ty+5+j(i+4,1));
  });
  ctx.restore();
}

function drawLabels(t) {
  const { w, h } = getBlockDims(t);
  const bx = BLOCK_CX - w/2, by = BLOCK_CY - h/2;
  const state = t < 0 ? 'Jäätyminen!' : t < 15 ? 'Kylmä' : t < 35 ? 'Lämmin' : t < 65 ? 'Kuuma!' : 'ERITTÄIN KUUMA!!';
  const sz = t < -15 || t > 60 ? 35 : 30;

  ctx.save();
  ctx.font = `bold ${sz}px Caveat, cursive`;
  ctx.textAlign = 'center';
  ctx.fillStyle = blockCol(t).pencil;
  ctx.fillText(state, BLOCK_CX+j(t,1.2), by-22+j(t+1,1.2));
  roughLine(BLOCK_CX-44, by-16, BLOCK_CX+44, by-18, rgba(blockCol(t).pencil, 0.45), 2, 1001);
  ctx.restore();

  // "kidehila" label pointing to block
  ctx.save();
  ctx.font = 'bold 20px Caveat, cursive';
  ctx.fillStyle = '#121212'; ctx.textAlign = 'left';
  ctx.fillText('kidehila', bx + w + 22 + j(10,1), BLOCK_CY + 6 + j(11,1));
  drawArrow(bx + w + 20, BLOCK_CY, bx + w + 3, BLOCK_CY, 1060);
  ctx.restore();

  // Expansion arrows when hot or cold
  if (t > 45) {
    ctx.save();
    ctx.font = 'bold 17px Caveat, cursive';
    ctx.fillStyle = '#c53226'; ctx.textAlign = 'center';
    ctx.fillText('laajenee!', BLOCK_CX, BLOCK_CY + h/2 + 26 + j(20,1));
    drawArrow(BLOCK_CX - 30, BLOCK_CY + h/2 + 36, BLOCK_CX - 60, BLOCK_CY + h/2 + 36, 1090);
    drawArrow(BLOCK_CX + 30, BLOCK_CY + h/2 + 36, BLOCK_CX + 60, BLOCK_CY + h/2 + 36, 1092);
    ctx.restore();
  }
  if (t < -5) {
    ctx.save();
    ctx.font = 'bold 17px Caveat, cursive';
    ctx.fillStyle = '#0d66a7'; ctx.textAlign = 'center';
    ctx.fillText('supistuu!', BLOCK_CX, BLOCK_CY + h/2 + 26 + j(20,1));
    drawArrow(BLOCK_CX - 60, BLOCK_CY + h/2 + 36, BLOCK_CX - 30, BLOCK_CY + h/2 + 36, 1094);
    drawArrow(BLOCK_CX + 60, BLOCK_CY + h/2 + 36, BLOCK_CX + 30, BLOCK_CY + h/2 + 36, 1096);
    ctx.restore();
  }
}

function getFact(t) {
  for (const f of facts) if (t >= f.min && t < f.max) return f.text;
  return facts[facts.length-1].text;
}

function frame() {
  const time = (performance.now() - startTime) / 1000;
  ctx.clearRect(0, 0, W, H);
  updateMolecules(time);
  drawBackground();
  drawSolidBlock(temp);
  drawLatticeGridInBlock(temp);
  drawMoleculesInBlock(temp);
  drawMagnifier(temp);
  drawThermometer(temp);
  drawLabels(temp);
  requestAnimationFrame(frame);
}

slider.addEventListener('input', () => {
  temp = parseInt(slider.value);
  const ratio = tempRatio(temp);
  const R=Math.round(55+ratio*200), G=Math.round(145-ratio*90), B=Math.round(228-ratio*188);
  tempOut.textContent = temp + '°C';
  tempOut.style.color = `rgb(${Math.max(0,R-30)},${Math.max(0,G-20)},${Math.max(0,B-40)})`;
  factBox.textContent = getFact(temp);
});

initTexture();
initWobble();
initMolecules();
document.fonts.ready.then(() => { frame(); });
</script>
</body>
</html>
