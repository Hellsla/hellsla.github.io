<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neste — lämpötilasimulaatio</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Caveat', cursive;
      background: #ffffff;
      color: #171717;
      min-height: 100vh;
    }
    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 12px 20px;
      gap: 14px;
    }
    .canvas-wrap {
      position: relative;
      width: 520px;
      height: 440px;
      background: #ffffff;
    }
    canvas { display: block; }
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 620px;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
    }
    .mode-tag {
      font-family: 'Caveat', cursive;
      font-size: 28px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 7px 10px 8px 9px;
      border: 3px solid #141414;
      white-space: nowrap;
      background: #ffffff;
      box-shadow: 2px 3px 0 rgba(0,0,0,0.08);
    }
    .mode-cold {
      color: #0d66a7;
      transform: rotate(-1.4deg);
      background-image: repeating-linear-gradient(-18deg, rgba(21,135,212,0.16) 0 2px, transparent 2px 7px);
    }
    .mode-hot {
      color: #c53226;
      transform: rotate(1.2deg);
      background-image: repeating-linear-gradient(18deg, rgba(226,68,51,0.16) 0 2px, transparent 2px 7px);
    }
    .temp-row { display: flex; align-items: center; gap: 10px; }
    .temp-label {
      font-family: 'Caveat', cursive;
      font-size: 30px;
      font-weight: 700;
      color: #444;
    }
    .temp-value {
      font-family: 'Caveat', cursive;
      font-size: 42px;
      font-weight: 700;
      min-width: 90px;
    }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      flex: 1; height: 10px; border-radius: 99px;
      background: #ffffff; border: 3px solid #171717;
      outline: none; cursor: pointer;
      box-shadow: inset 1px 1px 0 rgba(0,0,0,0.15);
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 30px; height: 30px; border-radius: 50%;
      background: #ffffff; cursor: pointer;
      border: 4px solid #171717;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.14);
    }
    input[type=range]::-moz-range-thumb {
      width: 30px; height: 30px; border-radius: 50%;
      background: #ffffff; cursor: pointer;
      border: 4px solid #171717;
    }
  </style>
</head>
<body>
<div class="scene">
  <div class="canvas-wrap">
    <canvas id="c" width="520" height="440"></canvas>
  </div>
  <div class="controls">
    <div class="slider-row">
      <span class="mode-tag mode-cold">❄️ Jäähdytä</span>
      <input type="range" min="-30" max="100" value="20" id="tempSlider" step="1">
      <span class="mode-tag mode-hot">🔥 Lämmitä</span>
    </div>
    <div class="temp-row">
      <span class="temp-label">Lämpötila:</span>
      <span class="temp-value" id="tempOut">20°C</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const slider = document.getElementById('tempSlider');
const tempOut = document.getElementById('tempOut');

const W = 520, H = 440;
const BEAKER_CX = 185, BEAKER_BOTTOM = 328;
const BEAKER_IW = 120, BEAKER_IH = 155, BEAKER_WALL = 8;
const MCX = 372, MCY = 210, MR = 82;
const NMOL = 24;
const GRAVITY = 0.004;

let temp = 20;
let molecules = [];
let mWobble = [], paperDots = [];
let startTime = performance.now();

// ── Helpers ───────────────────────────────────────────────────────────────────
function rnd(a, b) { return a + Math.random()*(b-a); }
function hash(n)   { return ((Math.sin(n*127.1)*43758.5453)%1+1)%1; }
function j(n, amp) { return (hash(n)-0.5)*amp*2; }
function rgba(rgb, alpha) {
  if (rgb.startsWith('rgb(')) return rgb.replace('rgb','rgba').replace(')',','+alpha+')');
  if (rgb.startsWith('#')) {
    const n=parseInt(rgb.slice(1),16);
    return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${alpha})`;
  }
  return rgb;
}

// ── Init ──────────────────────────────────────────────────────────────────────
function initTexture() {
  paperDots = Array.from({length:115},()=>({
    x:rnd(0,W), y:rnd(0,H), r:rnd(0.25,0.9), a:rnd(0.03,0.075)
  }));
}
function initWobble() {
  mWobble = Array.from({length:54},()=>rnd(-1.4,1.4));
}

// ── Physics ───────────────────────────────────────────────────────────────────
function tempRatio(t) { return (t+30)/130; }
function getLiquidFill(t) { return 0.58 + tempRatio(t)*0.24; }
function getLiquidTop(t)  { return BEAKER_BOTTOM - BEAKER_WALL - BEAKER_IH*getLiquidFill(t); }
function getMolBounds(t) {
  return {
    top:    getLiquidTop(t) + 5,
    bottom: BEAKER_BOTTOM   - BEAKER_WALL - 3,
    left:   BEAKER_CX - BEAKER_IW/2 + 5,
    right:  BEAKER_CX + BEAKER_IW/2 - 5
  };
}
function liquidCol(t) {
  const r = tempRatio(t);
  const R=Math.round(55 +r*195), G=Math.round(144-r*90), B=Math.round(225-r*185);
  return { pencil:`rgb(${R},${G},${B})`, pale:`rgba(${R},${G},${B},0.16)` };
}
function molCol(t) {
  const r=tempRatio(t);
  return `rgb(${Math.round(40+r*205)},${Math.round(125-r*90)},${Math.round(230-r*205)})`;
}
function getSpeed(t) { return 0.28 + tempRatio(t)*3.9; }

function surfaceWave(x, lft, rgt, time, t) {
  const pos = (x-lft)/(rgt-lft);
  const turb = 1.0 + tempRatio(t)*6.5;
  return Math.sin(time*2.2+pos*Math.PI*3.1)*turb*0.38
       + Math.sin(time*1.5+pos*Math.PI*5.6)*turb*0.22
       + Math.sin(time*3.5+pos*Math.PI*1.8)*turb*0.18;
}

function initMolecules() {
  molecules = [];
  const b = getMolBounds(temp);
  for (let i=0; i<NMOL; i++) {
    const a = Math.random()*Math.PI*2, s = getSpeed(temp);
    molecules.push({
      x: b.left+8+Math.random()*(b.right-b.left-16),
      y: b.top +8+Math.random()*(b.bottom-b.top-16),
      vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      r: 6.2, seed: i*19.7
    });
  }
}

function updateMolecules() {
  const spd = getSpeed(temp);
  const b = getMolBounds(temp);
  molecules.forEach(m => {
    // Brownian motion — simulates collisions we don't model explicitly
    m.vx += (Math.random()-0.5)*0.22;
    m.vy += (Math.random()-0.5)*0.22;
    m.vy += GRAVITY;
    m.x += m.vx; m.y += m.vy;
    if (m.x-m.r < b.left)   { m.x=b.left  +m.r; m.vx= Math.abs(m.vx)*0.72; }
    if (m.x+m.r > b.right)  { m.x=b.right -m.r; m.vx=-Math.abs(m.vx)*0.72; }
    if (m.y-m.r < b.top)    { m.y=b.top   +m.r; m.vy= Math.abs(m.vy)*0.55; }
    if (m.y+m.r > b.bottom) { m.y=b.bottom-m.r; m.vy=-Math.abs(m.vy)*0.82; }
    const cs = Math.sqrt(m.vx*m.vx+m.vy*m.vy);
    if (Math.abs(cs-spd)>0.38) { m.vx*=spd/(cs||1); m.vy*=spd/(cs||1); }
  });
}

// ── Drawing utilities (identical to solid/balloon) ────────────────────────────
function roughLine(x1,y1,x2,y2,color='#141414',width=2.5,seed=1) {
  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle=color;
  for (let p=0;p<2;p++) {
    const k=seed+p*23, mx=(x1+x2)/2+j(k,6), my=(y1+y2)/2+j(k+1,6);
    ctx.beginPath();
    ctx.moveTo(x1+j(k+2,1.7),y1+j(k+3,1.7));
    ctx.quadraticCurveTo(mx,my,x2+j(k+4,1.7),y2+j(k+5,1.7));
    ctx.lineWidth=width-p*0.7; ctx.globalAlpha=p===0?1:0.62; ctx.stroke();
  }
  ctx.restore();
}
function roughStroke(drawPath,width=3,color='#141414',passes=2,alpha=1) {
  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
  for (let p=0;p<passes;p++) {
    ctx.save(); ctx.translate(j(p+width,0.45),j(p+width+9,0.45));
    drawPath();
    ctx.strokeStyle=rgba(color,alpha*(p===0?1:0.68));
    ctx.lineWidth=width-p*0.55; ctx.stroke(); ctx.restore();
  }
  ctx.restore();
}
function hatchRect(x,y,w,h,color,spacing=8,angle=-0.55,seed=100,alpha=0.75) {
  ctx.save(); ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
  ctx.translate(x+w/2,y+h/2); ctx.rotate(angle); ctx.translate(-x-w/2,-y-h/2);
  for (let yy=y-h;yy<y+h*2;yy+=spacing)
    roughLine(x-w*0.25,yy+j(yy+seed,3),x+w*1.25,yy+j(yy+seed+4,3),rgba(color,alpha),2.1,yy+seed);
  ctx.restore();
}
function hatchInEllipse(cx,cy,rx,ry,color,spacing=9,angle=-0.55,alpha=0.78,cross=false) {
  function doHatch(a,so) {
    ctx.save(); ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.clip();
    ctx.translate(cx,cy); ctx.rotate(a); ctx.translate(-cx,-cy);
    for (let y=cy-ry*1.65;y<=cy+ry*1.65;y+=spacing)
      roughLine(cx-rx*1.35,y+j(y+so,2.4),cx+rx*1.35,y+j(y+so+7,2.4),rgba(color,alpha),2.2,y+so);
    ctx.restore();
  }
  doHatch(angle,300); if (cross) doHatch(angle+1.42,900);
}
function wobblyCirclePath(cx,cy,r,wobble,phase=0) {
  const n=wobble.length; ctx.beginPath();
  for (let i=0;i<=n;i++) {
    const angle=(i/n)*Math.PI*2, w=wobble[i%n]+j(i+phase,0.35);
    const x=cx+(r+w)*Math.cos(angle), y=cy+(r+w*0.75)*Math.sin(angle);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
}
function drawSketchDot(x,y,r,color,seed=1) {
  ctx.save();
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle='#ffffff'; ctx.fill();
  hatchInEllipse(x,y,r-1,r-1,color,4,-0.55,0.95,false);
  roughStroke(()=>{ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);},1.8,'#121212',2);
  ctx.restore();
}
function drawArrow(x1,y1,x2,y2,seed=1) {
  roughLine(x1,y1,x2,y2,'#121212',2.4,seed);
  const a=Math.atan2(y2-y1,x2-x1),len=10;
  roughLine(x2,y2,x2-Math.cos(a-0.62)*len,y2-Math.sin(a-0.62)*len,'#121212',2.2,seed+4);
  roughLine(x2,y2,x2-Math.cos(a+0.62)*len,y2-Math.sin(a+0.62)*len,'#121212',2.2,seed+7);
}

// ── Scene ─────────────────────────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
  ctx.save();
  paperDots.forEach(d=>{
    ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,0,0,${d.a})`; ctx.fill();
  });
  ctx.restore();
}

function drawBeaker(t, time) {
  const liqTop = getLiquidTop(t);
  const lft  = BEAKER_CX - BEAKER_IW/2;
  const rgt  = BEAKER_CX + BEAKER_IW/2;
  const bot  = BEAKER_BOTTOM;
  const wall = BEAKER_WALL;
  const olft = lft - wall, orgt = rgt + wall;
  const top  = bot - BEAKER_IH - wall;
  const col  = liquidCol(t);
  const SURF = 14;

  // ── Liquid fill with wavy surface (clipped to beaker interior) ──
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(lft, liqTop + surfaceWave(lft, lft, rgt, time, t));
  for (let i=1; i<=SURF; i++) {
    const x = lft + BEAKER_IW*(i/SURF);
    ctx.lineTo(x, liqTop + surfaceWave(x, lft, rgt, time, t));
  }
  ctx.lineTo(rgt, bot-wall);
  ctx.lineTo(lft, bot-wall);
  ctx.closePath();
  ctx.fillStyle = col.pale; ctx.fill();

  // Hatch inside liquid region
  ctx.beginPath();
  ctx.moveTo(lft, liqTop + surfaceWave(lft, lft, rgt, time, t));
  for (let i=1; i<=SURF; i++) {
    const x = lft + BEAKER_IW*(i/SURF);
    ctx.lineTo(x, liqTop + surfaceWave(x, lft, rgt, time, t));
  }
  ctx.lineTo(rgt, bot-wall); ctx.lineTo(lft, bot-wall); ctx.closePath(); ctx.clip();
  hatchRect(lft, liqTop-6, BEAKER_IW, bot-wall-liqTop+6, col.pencil,
    Math.max(8, 14-tempRatio(t)*5), -0.55, 200, 0.6);
  ctx.restore();

  // ── Wavy liquid surface line ──
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(lft, liqTop + surfaceWave(lft, lft, rgt, time, t));
  for (let i=1; i<=SURF; i++) {
    const x = lft + BEAKER_IW*(i/SURF);
    ctx.lineTo(x, liqTop + surfaceWave(x, lft, rgt, time, t));
  }
  ctx.strokeStyle=col.pencil; ctx.lineWidth=2.8; ctx.lineCap='round'; ctx.stroke();
  ctx.restore();

  // ── Steam when very hot ──
  if (t > 62) {
    const intensity = Math.min(1, (t-62)/38);
    ctx.save();
    for (let i=0; i<5; i++) {
      const sx = lft + 14 + i*22;
      const phase = i*1.4 + (performance.now()-startTime)/1000*1.6;
      const sh = 18 + intensity*28;
      ctx.beginPath();
      ctx.moveTo(sx, liqTop - 2);
      for (let s=1; s<=9; s++) {
        const py = liqTop - 2 - (s/9)*sh;
        const px = sx + Math.sin(phase + s*0.9)*5*intensity;
        ctx.lineTo(px, py);
      }
      ctx.strokeStyle=`rgba(160,170,200,${0.13+intensity*0.18})`;
      ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.stroke();
    }
    ctx.restore();
  }

  // ── Glass beaker walls ──
  // Outer shell — thick coloured + dark outline
  roughLine(olft, top, olft, bot, col.pencil, 10, 801);
  roughLine(olft, top, olft, bot, '#121212',   6, 802);
  roughLine(orgt, top, orgt, bot, col.pencil, 10, 811);
  roughLine(orgt, top, orgt, bot, '#121212',   6, 812);
  roughLine(olft, bot, orgt, bot, col.pencil, 10, 821);
  roughLine(olft, bot, orgt, bot, '#121212',   6, 822);
  // Inner thin lines (glass thickness)
  roughLine(lft, top, lft, bot-wall, '#121212', 2.2, 831);
  roughLine(rgt, top, rgt, bot-wall, '#121212', 2.2, 841);
  roughLine(lft, bot-wall, rgt, bot-wall, '#121212', 2.2, 851);

  // Rim at top
  roughLine(olft-6, top, lft+2,   top, '#121212', 9, 861);
  roughLine(rgt-2,  top, orgt+6,  top, '#121212', 9, 871);
  roughLine(olft-6, top, lft+2,   top, col.pencil, 6, 862);
  roughLine(rgt-2,  top, orgt+6,  top, col.pencil, 6, 872);

  // Glass sheen highlights
  for (let i=0; i<4; i++) {
    roughLine(olft+3+i*2.2, top+8, olft+3+i*2.2, top+55,
      'rgba(255,255,255,0.72)', 2.2, 880+i);
  }
}

function drawMoleculesInLiquid(t) {
  const lft = BEAKER_CX - BEAKER_IW/2;
  const rgt = BEAKER_CX + BEAKER_IW/2;
  const bot = BEAKER_BOTTOM - BEAKER_WALL;
  const liqTop = getLiquidTop(t);
  ctx.save();
  ctx.beginPath(); ctx.rect(lft+1, liqTop-4, BEAKER_IW-2, bot-liqTop+4); ctx.clip();
  const mc = molCol(t), spd = getSpeed(t);
  molecules.forEach((m,i) => {
    if (spd > 1.8) {
      roughLine(m.x,m.y, m.x-m.vx/spd*10, m.y-m.vy/spd*10, rgba(mc,0.22), 2.5, 700+i);
    }
    drawSketchDot(m.x, m.y, m.r, mc, m.seed);
  });
  ctx.restore();
}

function drawMagnifier(t) {
  const liqMid = getLiquidTop(t) + (BEAKER_BOTTOM - BEAKER_WALL - getLiquidTop(t)) * 0.52;
  const zoom = 2.0;

  ctx.save();
  const hx = MCX+MR*0.62, hy = MCY+MR*0.62;

  // Handle shadow
  ctx.save();
  roughLine(hx-3,hy-3,hx+48,hy+48,'rgba(0,0,0,0.12)',18,609); ctx.restore();
  // Handle
  ctx.save();
  ctx.translate(hx,hy); ctx.rotate(Math.PI/4);
  ctx.beginPath(); ctx.roundRect(-10,-4,70,20,9);
  ctx.fillStyle='#ffffff'; ctx.fill(); ctx.clip();
  hatchRect(-10,-4,72,22,'#8a5a19',7,-0.35,655,0.9);
  ctx.restore();
  roughLine(hx-3,hy-3,hx+48,hy+48,'#121212',16,611);
  roughLine(hx-3,hy-3,hx+48,hy+48,'#9b671e',10,612);
  roughLine(hx-3,hy-3,hx+48,hy+48,'#121212',2.5,613);

  // Lens content
  ctx.save();
  wobblyCirclePath(MCX,MCY,MR-7,mWobble,4); ctx.clip();
  ctx.fillStyle='rgba(255,255,255,0.97)'; ctx.fillRect(MCX-MR,MCY-MR,MR*2,MR*2);
  // Subtle liquid tint in lens
  hatchInEllipse(MCX,MCY,MR-10,MR-10,liquidCol(t).pencil,13,-0.6,0.18,false);

  // Zoomed molecules — no bonds (liquid has no fixed bonds)
  const mc = molCol(t), spd = getSpeed(t);
  molecules.forEach((m,i) => {
    const ox = (m.x - BEAKER_CX)*zoom + MCX;
    const oy = (m.y - liqMid)   *zoom + MCY;
    if (Math.hypot(ox-MCX, oy-MCY) < MR-18) {
      if (spd > 1.8) {
        roughLine(ox, oy,
          ox - m.vx/spd*Math.min(spd*4,20),
          oy - m.vy/spd*Math.min(spd*4,20),
          rgba(mc,0.28), 3.5, 880+i);
      }
      drawSketchDot(ox, oy, m.r*zoom*0.45, mc, 900+i);
    }
  });
  ctx.restore();

  // Glass rim
  roughStroke(()=>wobblyCirclePath(MCX,MCY,MR,  mWobble,2),8.5,'#121212',2);
  roughStroke(()=>wobblyCirclePath(MCX,MCY,MR-3, mWobble,7),4.6,'#c79617',2,0.92);
  roughStroke(()=>wobblyCirclePath(MCX,MCY,MR-8, mWobble,10),1.8,'#121212',1,0.82);
  // Glare
  roughLine(MCX-43,MCY-54,MCX-8, MCY-68,'rgba(255,255,255,0.9)',4.5,711);
  roughLine(MCX-50,MCY-42,MCX-25,MCY-55,'rgba(255,255,255,0.75)',3,  712);
  roughLine(MCX+32,MCY+48,MCX+53,MCY+28,'rgba(120,165,205,0.25)',3,  713);
  ctx.restore();
}

function drawThermometer(t) {
  const ratio=tempRatio(t), bh=130,bw=17,bx=20,by=120;
  const R=Math.round(55+ratio*200),G=Math.round(145-ratio*90),B=Math.round(228-ratio*188);
  const fill=`rgb(${R},${G},${B})`;
  ctx.save();
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,8); ctx.fillStyle='#ffffff'; ctx.fill();
  roughStroke(()=>{ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);},3,'#121212',2);
  const fh=bh*ratio,fy=by+bh-fh;
  ctx.save();
  ctx.beginPath(); ctx.roundRect(bx+3,fy,bw-6,fh,6); ctx.clip();
  ctx.fillStyle=rgba(fill,0.12); ctx.fillRect(bx+2,fy,bw-4,fh);
  hatchRect(bx+2,fy,bw-4,fh,fill,5,-0.55,730,0.86);
  ctx.restore();
  ctx.beginPath(); ctx.arc(bx+bw/2,by+bh+10,14,0,Math.PI*2);
  ctx.fillStyle='#ffffff'; ctx.fill();
  hatchInEllipse(bx+bw/2,by+bh+10,12,12,fill,5,-0.55,0.88,true);
  roughStroke(()=>{ctx.beginPath();ctx.arc(bx+bw/2,by+bh+10,14,0,Math.PI*2);},3,'#121212',2);
  ctx.font='19px Caveat, cursive'; ctx.fillStyle='#444'; ctx.textAlign='left';
  [[-30,0],[0,0.23],[20,0.38],[60,0.69],[100,1]].forEach(([label,pos],i)=>{
    const ty=by+bh*(1-pos);
    roughLine(bx+bw,ty,bx+bw+7,ty,'#121212',1.5,770+i);
    ctx.fillText(label+'°',bx+bw+9+j(i,1),ty+5+j(i+4,1));
  });
  ctx.restore();
}

function drawLabels(t) {
  const liqTop = getLiquidTop(t);
  const lft = BEAKER_CX - BEAKER_IW/2 - BEAKER_WALL;
  const rgt = BEAKER_CX + BEAKER_IW/2 + BEAKER_WALL;
  const liqH = BEAKER_BOTTOM - BEAKER_WALL - liqTop;
  const state = t<0?'Jäätymässä!':t<15?'Kylmä':t<35?'Lämmin':t<65?'Kuuma!':'KIEHUU!!';
  const sz = t<-15||t>60 ? 35 : 30;

  // State label above beaker
  ctx.save();
  ctx.font=`bold ${sz}px Caveat, cursive`;
  ctx.textAlign='center'; ctx.fillStyle=liquidCol(t).pencil;
  ctx.fillText(state, BEAKER_CX+j(t,1.2), liqTop-32+j(t+1,1.2));
  roughLine(BEAKER_CX-44, liqTop-26, BEAKER_CX+44, liqTop-28,
    rgba(liquidCol(t).pencil,0.45), 2, 1001);
  ctx.restore();

  // "neste" label → beaker
  ctx.save();
  ctx.font='bold 20px Caveat, cursive'; ctx.fillStyle='#121212'; ctx.textAlign='left';
  ctx.fillText('neste', rgt+22+j(10,1), BEAKER_CY_MID(t)+j(11,1));
  drawArrow(rgt+20, BEAKER_CY_MID(t), rgt+3, BEAKER_CY_MID(t), 1060);
  ctx.restore();

  // Expansion / contraction arrows
  if (t > 45) {
    ctx.save();
    ctx.font='bold 17px Caveat, cursive'; ctx.fillStyle='#c53226'; ctx.textAlign='center';
    ctx.fillText('laajenee!', BEAKER_CX, BEAKER_BOTTOM+28+j(20,1));
    drawArrow(BEAKER_CX-28,BEAKER_BOTTOM+38,BEAKER_CX-58,BEAKER_BOTTOM+38,1090);
    drawArrow(BEAKER_CX+28,BEAKER_BOTTOM+38,BEAKER_CX+58,BEAKER_BOTTOM+38,1092);
    ctx.restore();
  }
  if (t < -5) {
    ctx.save();
    ctx.font='bold 17px Caveat, cursive'; ctx.fillStyle='#0d66a7'; ctx.textAlign='center';
    ctx.fillText('supistuu!', BEAKER_CX, BEAKER_BOTTOM+28+j(20,1));
    drawArrow(BEAKER_CX-58,BEAKER_BOTTOM+38,BEAKER_CX-28,BEAKER_BOTTOM+38,1094);
    drawArrow(BEAKER_CX+58,BEAKER_BOTTOM+38,BEAKER_CX+28,BEAKER_BOTTOM+38,1096);
    ctx.restore();
  }

  // Liquid level tick mark on outside of beaker
  const tickX = lft - 7;
  roughLine(tickX-8, liqTop, tickX, liqTop, '#121212', 2.2, 1100);
  ctx.save();
  ctx.font='15px Caveat, cursive'; ctx.fillStyle='#555'; ctx.textAlign='right';
  ctx.fillText('pinta', tickX-10+j(20,1), liqTop+5+j(21,1));
  ctx.restore();
}

function BEAKER_CY_MID(t) {
  return getLiquidTop(t) + (BEAKER_BOTTOM - BEAKER_WALL - getLiquidTop(t)) * 0.5;
}

function frame() {
  const time = (performance.now()-startTime)/1000;
  ctx.clearRect(0,0,W,H);
  updateMolecules();
  drawBackground();
  drawBeaker(temp, time);
  drawMoleculesInLiquid(temp);
  drawMagnifier(temp);
  drawThermometer(temp);
  drawLabels(temp);
  requestAnimationFrame(frame);
}

slider.addEventListener('input', () => {
  temp = parseInt(slider.value);
  const ratio=tempRatio(temp);
  const R=Math.round(55+ratio*200),G=Math.round(145-ratio*90),B=Math.round(228-ratio*188);
  tempOut.textContent = temp+'°C';
  tempOut.style.color = `rgb(${Math.max(0,R-30)},${Math.max(0,G-20)},${Math.max(0,B-40)})`;
  // Relocate molecules into the new liquid region with updated speeds
  const b = getMolBounds(temp);
  molecules.forEach(m => {
    m.x = b.left+8+Math.random()*(b.right-b.left-16);
    m.y = b.top +8+Math.random()*(b.bottom-b.top-16);
    const a = Math.random()*Math.PI*2, s = getSpeed(temp);
    m.vx = Math.cos(a)*s; m.vy = Math.sin(a)*s;
  });
});

initTexture();
initWobble();
initMolecules();
document.fonts.ready.then(() => { frame(); });
</script>
</body>
