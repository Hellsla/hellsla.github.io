<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neste</title>
<style>
  :root{
    --bg:#ffffff;
    --ink:#3F3D39;
    --hatch:#d8d8d8;
    --cold:#2E86A6;
    --coldSoft:#BFE9F5;
    --warm:#D84A62;
    --warm2:#F28C28;
    --warmSoft:#FFD95A;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:#ffffff;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--ink);
  }

  .wrap{
    width:100vw;
    height:100vh;
    min-height:360px;
    display:grid;
    grid-template-rows:1fr auto;
    overflow:hidden;
    background:#fff;
  }

  svg{
    width:100%;
    height:100%;
    display:block;
    background:#fff;
  }

  .controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:clamp(14px,3vw,34px);
    flex-wrap:wrap;
    padding:10px 18px 18px;
  }

  .sliderBox{
    display:flex;
    align-items:center;
    gap:12px;
  }

  .sliderBox label{
    font-size:clamp(15px,1.6vw,20px);
  }

  input[type="range"]{
    width:min(390px,54vw);
    accent-color:var(--ink);
  }

  button{
    font:inherit;
    font-size:clamp(14px,1.5vw,18px);
    background:#fff;
    color:var(--ink);
    border:2px solid var(--ink);
    border-radius:999px;
    padding:6px 16px;
    cursor:pointer;
  }

  button:active{ transform:translateY(1px); }

  .sketch{
    fill:none;
    stroke:var(--ink);
    stroke-width:3;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .thin{ stroke-width:1.8; }

  .hatch{
    stroke:var(--hatch);
    stroke-width:1.1;
    stroke-linecap:round;
  }

  .liquidParticle{
    stroke:var(--ink);
    stroke-width:1.8;
  }

  .trail{
    fill:none;
    stroke-width:1.1;
    stroke-linecap:round;
    opacity:.24;
  }

  .energyRay{
    fill:none;
    stroke-width:3.9;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .heatLine{
    fill:none;
    stroke:var(--warm);
    stroke-width:2.0;
    stroke-linecap:round;
  }

  .flameOuter{
    fill:var(--warmSoft);
    stroke:var(--ink);
    stroke-width:2.1;
  }

  .flameInner{
    fill:var(--warm2);
    stroke:var(--ink);
    stroke-width:1.7;
  }

  .iceShape{
    fill:var(--coldSoft);
    stroke:var(--ink);
    stroke-width:2.0;
    stroke-linejoin:round;
  }

  .iceLine{
    fill:none;
    stroke:var(--cold);
    stroke-width:1.9;
    stroke-linecap:round;
  }

  @media (max-width:700px){
    input[type="range"]{ width:58vw; }
  }
</style>
</head>
<body>
<div class="wrap">
  <svg viewBox="0 0 960 520" aria-label="Nesteen lämpölaajeneminen">
    <defs>
      <pattern id="diagHatch" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(22)">
        <line x1="0" y1="0" x2="0" y2="14" class="hatch"></line>
      </pattern>

      <clipPath id="liquidClip">
        <path id="liquidClipPath" d=""></path>
      </clipPath>
    </defs>

    <g id="beakerGroup">
      <path id="liquidFill" d="" fill="#dff3f8"></path>
      <path id="liquidHatch" d="" fill="url(#diagHatch)" opacity=".17"></path>

      <g clip-path="url(#liquidClip)">
        <g id="trailGroup"></g>
        <g id="particleGroup"></g>
      </g>

      <path id="surfaceLine" class="sketch thin" d=""></path>

      <path id="leftWall" class="sketch" d=""></path>
      <path id="rightWall" class="sketch" d=""></path>
      <path id="bottomWall" class="sketch" d=""></path>
      <path id="topRim" class="sketch thin" d=""></path>
      <path id="glassSketch" class="sketch thin" d=""></path>
    </g>

    <g id="rayGroup"></g>

    <g id="iceGroup">
      <path class="iceShape" d="M428 427 L455 400 L496 404 L524 431 L509 468 L466 480 L431 459 Z"></path>
      <path class="iceLine" d="M456 416 L497 458"></path>
      <path class="iceLine" d="M500 417 L456 461"></path>
      <path class="iceLine" d="M477 405 L477 474"></path>
      <path class="iceLine" d="M439 442 L516 442"></path>
    </g>

    <g id="heatGroup">
      <path class="heatLine" d="M406 430 C394 409,420 400,407 378"></path>
      <path class="heatLine" d="M480 432 C466 408,495 400,481 377"></path>
      <path class="heatLine" d="M554 430 C542 409,568 400,555 378"></path>
      <path class="flameOuter" d="M448 468 C408 452,420 413,441 396 C442 419,470 420,462 381 C501 407,518 454,478 469 C470 473,457 473,448 468 Z"></path>
      <path class="flameInner" d="M461 467 C440 456,447 430,459 417 C461 433,478 435,475 411 C493 433,494 458,473 468 C469 470,465 470,461 467 Z"></path>
    </g>
  </svg>

  <div class="controls">
    <div class="sliderBox">
      <label for="temp">Lämpötila</label>
      <input id="temp" type="range" min="0" max="100" step="1" value="50">
    </div>
    <button id="reset">Nollaa</button>
  </div>
</div>

<script>
(() => {
  const temp = document.getElementById("temp");
  const reset = document.getElementById("reset");

  const liquidFill = document.getElementById("liquidFill");
  const liquidHatch = document.getElementById("liquidHatch");
  const liquidClipPath = document.getElementById("liquidClipPath");
  const surfaceLine = document.getElementById("surfaceLine");

  const leftWall = document.getElementById("leftWall");
  const rightWall = document.getElementById("rightWall");
  const bottomWall = document.getElementById("bottomWall");
  const topRim = document.getElementById("topRim");
  const glassSketch = document.getElementById("glassSketch");

  const particleGroup = document.getElementById("particleGroup");
  const trailGroup = document.getElementById("trailGroup");
  const rayGroup = document.getElementById("rayGroup");

  const heatGroup = document.getElementById("heatGroup");
  const iceGroup = document.getElementById("iceGroup");

  const neutral = 50;

  const vessel = {
    cx: 480,
    top: 88,
    bottom: 358,
    topLeft: 332,
    topRight: 628,
    bottomLeft: 372,
    bottomRight: 588
  };

  let time = 0;
  let targetLevel = 50;
  let currentLevel = 50;

  const particles = [];
  const rays = [];

  function createSvg(tag, attrs = {}) {
    const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }

  function mixColor(a, b, t) {
    const ah = a.replace("#", "");
    const bh = b.replace("#", "");
    const ar = parseInt(ah.slice(0,2), 16);
    const ag = parseInt(ah.slice(2,4), 16);
    const ab = parseInt(ah.slice(4,6), 16);
    const br = parseInt(bh.slice(0,2), 16);
    const bg = parseInt(bh.slice(2,4), 16);
    const bb = parseInt(bh.slice(4,6), 16);
    const rr = Math.round(ar + (br - ar) * t);
    const rg = Math.round(ag + (bg - ag) * t);
    const rb = Math.round(ab + (bb - ab) * t);
    return `rgb(${rr},${rg},${rb})`;
  }

  function leftAt(y) {
    const t = (y - vessel.top) / (vessel.bottom - vessel.top);
    return vessel.topLeft + (vessel.bottomLeft - vessel.topLeft) * t;
  }

  function rightAt(y) {
    const t = (y - vessel.top) / (vessel.bottom - vessel.top);
    return vessel.topRight + (vessel.bottomRight - vessel.topRight) * t;
  }

  function buildVessel() {
    leftWall.setAttribute(
      "d",
      `M ${vessel.topLeft} ${vessel.top}
       C ${vessel.topLeft - 8} ${vessel.top + 78},
         ${vessel.bottomLeft - 12} ${vessel.bottom - 62},
         ${vessel.bottomLeft} ${vessel.bottom}`
    );

    rightWall.setAttribute(
      "d",
      `M ${vessel.topRight} ${vessel.top}
       C ${vessel.topRight + 8} ${vessel.top + 78},
         ${vessel.bottomRight + 12} ${vessel.bottom - 62},
         ${vessel.bottomRight} ${vessel.bottom}`
    );

    bottomWall.setAttribute(
      "d",
      `M ${vessel.bottomLeft} ${vessel.bottom}
       C ${vessel.bottomLeft + 58} ${vessel.bottom + 12},
         ${vessel.bottomRight - 58} ${vessel.bottom + 12},
         ${vessel.bottomRight} ${vessel.bottom}`
    );

    topRim.setAttribute(
      "d",
      `M ${vessel.topLeft - 22} ${vessel.top}
       C ${vessel.topLeft + 64} ${vessel.top - 6},
         ${vessel.topRight - 64} ${vessel.top - 6},
         ${vessel.topRight + 22} ${vessel.top}`
    );

    glassSketch.setAttribute(
      "d",
      `M ${vessel.topLeft + 18} ${vessel.top + 20}
       C ${vessel.topLeft + 6} ${vessel.top + 92},
         ${vessel.bottomLeft + 6} ${vessel.bottom - 44},
         ${vessel.bottomLeft + 18} ${vessel.bottom - 8}
       M ${vessel.topRight - 18} ${vessel.top + 20}
       C ${vessel.topRight - 6} ${vessel.top + 92},
         ${vessel.bottomRight - 6} ${vessel.bottom - 44},
         ${vessel.bottomRight - 18} ${vessel.bottom - 8}`
    );
  }

  function liquidShape(surfaceY, wobble) {
    const leftS = leftAt(surfaceY) + 12;
    const rightS = rightAt(surfaceY) - 12;
    const leftB = vessel.bottomLeft + 8;
    const rightB = vessel.bottomRight - 8;
    const bottom = vessel.bottom - 2;

    return `
      M ${leftS} ${surfaceY}
      C ${leftS + 56} ${surfaceY - 4 + wobble},
        ${leftS + 108} ${surfaceY + 4 - wobble},
        ${leftS + 164} ${surfaceY}
      S ${rightS - 56} ${surfaceY - 4 + wobble},
        ${rightS} ${surfaceY}
      L ${rightB} ${bottom}
      C ${rightB - 54} ${bottom + 8},
        ${leftB + 54} ${bottom + 8},
        ${leftB} ${bottom}
      Z
    `;
  }

  function surfaceShape(surfaceY, wobble) {
    const leftS = leftAt(surfaceY) + 12;
    const rightS = rightAt(surfaceY) - 12;

    return `
      M ${leftS} ${surfaceY}
      C ${leftS + 56} ${surfaceY - 4 + wobble},
        ${leftS + 108} ${surfaceY + 4 - wobble},
        ${leftS + 164} ${surfaceY}
      S ${rightS - 56} ${surfaceY - 4 + wobble},
        ${rightS} ${surfaceY}
    `;
  }

  function buildParticles() {
    for (let i = 0; i < 42; i++) {
      const trail = createSvg("path", { class:"trail", d:"" });
      const node = createSvg("circle", {
        class:"liquidParticle",
        r:7,
        fill:"#ffffff"
      });

      trailGroup.appendChild(trail);
      particleGroup.appendChild(node);

      particles.push({
        x:0,
        y:0,
        oldX:0,
        oldY:0,
        vx:(Math.random() - 0.5) * 1.8,
        vy:(Math.random() - 0.5) * 1.8,
        phase:Math.random() * Math.PI * 2,
        seeded:false,
        node,
        trail
      });
    }
  }

  function buildRays() {
    const xs = [438, 480, 522];

    xs.forEach(x => {
      const segs = [];
      for (let i = 0; i < 3; i++) {
        const path = createSvg("path", { class:"energyRay", d:"" });
        rayGroup.appendChild(path);
        segs.push(path);
      }
      rays.push({ x, phase:Math.random(), segs });
    });
  }

  function seedParticle(p, liquid) {
    const top = liquid.surfaceY + 18;
    const bottom = vessel.bottom - 18;
    const y = top + Math.random() * (bottom - top);
    const x = leftAt(y) + 24 + Math.random() * (rightAt(y) - leftAt(y) - 48);

    p.x = x;
    p.y = y;
    p.oldX = x;
    p.oldY = y;
    p.seeded = true;
  }

  function updateLiquid(level, t) {
    const heat = Math.max(0, level - neutral) / neutral;
    const cold = Math.max(0, neutral - level) / neutral;

    const baseHeight = 172;
    const liquidHeight = baseHeight * (1 + heat * 0.23 - cold * 0.08);
    const surfaceY = vessel.bottom - liquidHeight;
    const wobble = Math.sin(t * 0.04) * (1.2 + heat * 1.1);

    const d = liquidShape(surfaceY, wobble);
    const fill = mixColor("#dff3f8", "#ffe3e8", level / 100);

    liquidFill.setAttribute("d", d);
    liquidFill.setAttribute("fill", fill);
    liquidHatch.setAttribute("d", d);
    liquidClipPath.setAttribute("d", d);
    surfaceLine.setAttribute("d", surfaceShape(surfaceY, wobble));

    return { surfaceY, heat, cold };
  }

  function updateParticles(liquid, level, t) {
    const heatLevel = level / 100;
    const color = mixColor("#2E86A6", "#D84A62", heatLevel);
    const trailColor = mixColor("#9fd8e8", "#f2a6b3", heatLevel);

    const speedScale = 0.26 + heatLevel * 1.0;
    const randomKick = 0.055 + heatLevel * 0.12;

    particles.forEach(p => {
      if (!p.seeded) seedParticle(p, liquid);

      p.oldX = p.x;
      p.oldY = p.y;

      p.vx += (Math.random() - 0.5) * randomKick;
      p.vy += (Math.random() - 0.5) * randomKick;

      const maxVel = 0.75 + heatLevel * 1.9;
      p.vx = Math.max(-maxVel, Math.min(maxVel, p.vx));
      p.vy = Math.max(-maxVel, Math.min(maxVel, p.vy));

      p.x += p.vx * speedScale + Math.sin(t * 0.018 + p.phase) * 0.10;
      p.y += p.vy * speedScale + Math.cos(t * 0.021 + p.phase) * 0.10;

      const topLimit = liquid.surfaceY + 16;
      const bottomLimit = vessel.bottom - 15;

      if (p.y < topLimit) {
        p.y = topLimit;
        p.vy = Math.abs(p.vy) + 0.04;
      }

      if (p.y > bottomLimit) {
        p.y = bottomLimit;
        p.vy = -Math.abs(p.vy) - 0.04;
      }

      const leftLimit = leftAt(p.y) + 17;
      const rightLimit = rightAt(p.y) - 17;

      if (p.x < leftLimit) {
        p.x = leftLimit;
        p.vx = Math.abs(p.vx) + 0.04;
      }

      if (p.x > rightLimit) {
        p.x = rightLimit;
        p.vx = -Math.abs(p.vx) - 0.04;
      }

      p.node.setAttribute("cx", p.x);
      p.node.setAttribute("cy", p.y);
      p.node.setAttribute("r", 6.8 + heatLevel * 1.1 + Math.sin(t * 0.03 + p.phase) * 0.16);
      p.node.setAttribute("fill", color);

      p.trail.setAttribute("d", `M ${p.oldX} ${p.oldY} L ${p.x} ${p.y}`);
      p.trail.setAttribute("stroke", trailColor);
      p.trail.setAttribute("opacity", 0.08 + heatLevel * 0.22);
    });
  }

  function updateSource(liquid) {
    heatGroup.style.opacity = Math.max(0, liquid.heat * 1.25);
    iceGroup.style.opacity = Math.max(0, liquid.cold * 1.25);

    heatGroup.setAttribute("transform", `translate(0 ${liquid.heat * -2})`);
    iceGroup.setAttribute("transform", `translate(0 ${liquid.cold * 2})`);
  }

  function updateRays(liquid, t) {
    const amount = Math.max(liquid.heat, liquid.cold);
    const warming = liquid.heat >= liquid.cold;
    const color = warming ? "#D84A62" : "#2E86A6";

    const topY = vessel.bottom + 8;
    const bottomY = 424;
    const travel = bottomY - topY;
    const speed = 0.018 + amount * 0.04;
    const segLen = 18 + amount * 12;

    rays.forEach(lane => {
      lane.segs.forEach((seg, j) => {
        const p = (t * speed + lane.phase + j * 0.34) % 1;

        const centerY = warming
          ? bottomY - p * travel
          : topY + p * travel;

        const y1 = centerY - segLen / 2;
        const y2 = centerY + segLen / 2;
        const bend = j % 2 === 0 ? 5 : -5;

        seg.setAttribute(
          "d",
          `M ${lane.x} ${y1}
           Q ${lane.x + bend} ${(y1 + y2) / 2}
             ${lane.x} ${y2}`
        );
        seg.setAttribute("stroke", color);
        seg.setAttribute("opacity", amount < 0.03 ? 0.06 : 0.30 + amount * 0.60);
      });
    });
  }

  function tick() {
    time += 1;
    currentLevel += (targetLevel - currentLevel) * 0.08;

    const liquid = updateLiquid(currentLevel, time);
    updateParticles(liquid, currentLevel, time);
    updateSource(liquid);
    updateRays(liquid, time);

    requestAnimationFrame(tick);
  }

  temp.addEventListener("input", () => {
    targetLevel = Number(temp.value);
  });

  reset.addEventListener("click", () => {
    temp.value = 50;
    targetLevel = 50;
  });

  buildVessel();
  buildParticles();
  buildRays();
  tick();
})();
</script>
</body>
</html>
