<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Putken lämpölaajeneminen</title>
<link rel="stylesheet" href="simulaatio-theme.css" />
<style>
  .layout{display:grid;grid-template-columns:1.1fr .9fr;gap:20px;align-items:start}
  .panel{background:#fff;border:1px solid #ddd2c2;border-radius:12px;padding:14px}
  .controlsGrid{display:grid;grid-template-columns:repeat(2,minmax(180px,1fr));gap:10px}
  .sim-btn{margin-top:8px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  svg{width:100%;height:auto}
  #tableWrap{max-height:240px;overflow:auto;border:1px solid #e7ded1;border-radius:8px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:6px 8px;border-bottom:1px solid #efe6d8;text-align:right}
  th:first-child,td:first-child{text-align:center}
  canvas{width:100%;height:280px;background:#fffdf7;border:1px solid #e3d8c7;border-radius:8px}
  .eq{font-weight:600;color:#5a4a3d}
  @media (max-width:860px){.layout{grid-template-columns:1fr}.controlsGrid{grid-template-columns:1fr}}
</style>
</head>
<body class="sim-body">
<div class="wrap sim-wrap">
  <h1 style="margin:0 0 12px 0">Lämpölaajeneminen: putki</h1>
  <div class="layout">
    <div class="panel">
      <div class="controlsGrid">
        <label>Materiaali
          <select id="material">
            <option value="copper">Kupari</option>
            <option value="steel">Teräs</option>
            <option value="aluminium">Alumiini</option>
          </select>
        </label>
        <label>Alkupituus L₀ (m)
          <input id="L0" type="number" min="0.2" max="5" step="0.1" value="1.0">
        </label>
        <label>Alkulämpötila (°C)
          <input id="tStart" type="number" min="0" max="100" value="24">
        </label>
        <label>Loppulämpötila (°C)
          <input id="tEnd" type="number" min="10" max="250" value="60">
        </label>
      </div>
      <div class="row">
        <button class="sim-btn" id="run">Käynnistä mittaus</button>
        <button class="sim-btn" id="clear">Tyhjennä</button>
      </div>
      <svg viewBox="0 0 820 180" aria-label="Putki ja lämmitys">
        <rect x="60" y="88" width="700" height="24" rx="10" fill="#dbb79f" stroke="#5f4332" stroke-width="2"/>
        <rect id="heat" x="60" y="88" width="0" height="24" rx="10" fill="#f27d5f" opacity="0.85"/>
        <line x1="60" y1="60" x2="760" y2="60" stroke="#d63f3f" stroke-width="3"/>
        <polygon points="60,60 75,54 75,66" fill="#d63f3f"/>
        <polygon points="760,60 745,54 745,66" fill="#d63f3f"/>
        <text x="395" y="48" text-anchor="middle" font-size="28" fill="#cf2f2f" id="lenText">1.000 m</text>
      </svg>
      <p id="status">Valmis mittaukseen.</p>
    </div>

    <div class="panel">
      <canvas id="plot" width="560" height="320"></canvas>
      <p class="eq" id="fit">Sovitus: y = mx + b</p>
      <div id="tableWrap">
        <table>
          <thead><tr><th>#</th><th>T (°C)</th><th>ΔL (mm)</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script>
(() => {
  const alpha = { copper: 16.7e-6, steel: 12e-6, aluminium: 23e-6 };
  const labels = { copper: 'Kupari', steel: 'Teräs', aluminium: 'Alumiini' };
  const material = document.getElementById('material');
  const L0 = document.getElementById('L0');
  const tStart = document.getElementById('tStart');
  const tEnd = document.getElementById('tEnd');
  const run = document.getElementById('run');
  const clear = document.getElementById('clear');
  const tbody = document.getElementById('tbody');
  const fit = document.getElementById('fit');
  const status = document.getElementById('status');
  const heat = document.getElementById('heat');
  const lenText = document.getElementById('lenText');
  const canvas = document.getElementById('plot');
  const ctx = canvas.getContext('2d');

  let data = [];

  const randn = () => {
    let u = 0, v = 0;
    while (!u) u = Math.random();
    while (!v) v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  };

  function lineFit(points) {
    const n = points.length;
    const sx = points.reduce((a,p) => a + p.T, 0);
    const sy = points.reduce((a,p) => a + p.dL, 0);
    const sxx = points.reduce((a,p) => a + p.T * p.T, 0);
    const sxy = points.reduce((a,p) => a + p.T * p.dL, 0);
    const m = (n * sxy - sx * sy) / (n * sxx - sx * sx);
    const b = (sy - m * sx) / n;
    return { m, b };
  }

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const pad = {l:55,r:20,t:20,b:40};
    const w = canvas.width - pad.l - pad.r;
    const h = canvas.height - pad.t - pad.b;
    ctx.strokeStyle = '#9f8c78';
    ctx.strokeRect(pad.l,pad.t,w,h);
    if (!data.length) return;
    const Tmin = Math.min(...data.map(p=>p.T));
    const Tmax = Math.max(...data.map(p=>p.T));
    const ymin = Math.min(0,...data.map(p=>p.dL));
    const ymax = Math.max(...data.map(p=>p.dL))*1.1;
    const x = T => pad.l + (T-Tmin)/(Tmax-Tmin||1)*w;
    const y = v => pad.t + h - (v-ymin)/(ymax-ymin||1)*h;

    ctx.fillStyle='#5a493b';
    ctx.font='14px sans-serif';
    ctx.fillText('Lämpötila (°C)', pad.l + w/2 - 45, canvas.height-10);
    ctx.save();ctx.translate(16,pad.t+h/2);ctx.rotate(-Math.PI/2);ctx.fillText('ΔL (mm)',0,0);ctx.restore();

    ctx.fillStyle='#e6552d';
    for (const p of data) {
      ctx.beginPath(); ctx.arc(x(p.T), y(p.dL), 4, 0, Math.PI*2); ctx.fill();
    }
    if (data.length >= 2) {
      const {m,b} = lineFit(data);
      const y1 = m*Tmin + b, y2 = m*Tmax + b;
      ctx.strokeStyle='#f0a088'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(x(Tmin), y(y1)); ctx.lineTo(x(Tmax), y(y2)); ctx.stroke();
      fit.textContent = `Sovitus (${labels[material.value]}): ΔL = ${m.toFixed(4)}·T + ${b.toFixed(4)} mm`;
    }
  }

  function renderTable() {
    tbody.innerHTML = data.map((p,i)=>`<tr><td>${i+1}</td><td>${p.T.toFixed(1)}</td><td>${p.dL.toFixed(3)}</td></tr>`).join('');
  }

  function runSimulation() {
    data = [];
    const mat = material.value;
    const L = Number(L0.value);
    const t0 = Number(tStart.value);
    const t1 = Number(tEnd.value);
    const steps = 12;
    if (t1 <= t0) { status.textContent = 'Loppulämpötilan pitää olla suurempi kuin alkulämpötila.'; return; }
    for (let i=0;i<steps;i++) {
      const T = t0 + (i/(steps-1))*(t1-t0);
      const trueDLmm = alpha[mat] * L * (T - t0) * 1000;
      const measurementError = randn() * 0.012;
      data.push({ T: T + randn()*0.15, dL: trueDLmm + measurementError });
    }
    renderTable(); draw();
    const finalLen = L + (alpha[mat]*L*(t1-t0));
    lenText.textContent = `${finalLen.toFixed(3)} m`;
    heat.setAttribute('width', String(700));
    status.textContent = `Mittaus valmis: ${labels[mat]}, α=${(alpha[mat]*1e6).toFixed(1)}×10⁻⁶ 1/°C.`;
  }

  run.addEventListener('click', runSimulation);
  clear.addEventListener('click', () => {
    data = []; tbody.innerHTML=''; draw(); heat.setAttribute('width','0');
    fit.textContent = 'Sovitus: y = mx + b'; status.textContent='Tyhjennetty.';
    lenText.textContent = `${Number(L0.value).toFixed(3)} m`;
  });
  L0.addEventListener('input', () => { lenText.textContent = `${Number(L0.value).toFixed(3)} m`; });
  draw();
})();
</script>
</body>
</html>
