<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boylen laki</title>
<style>
  :root {
    --text: #3F3D39;
    --line: #222222;
    --blue: #2E86A6;
    --red: #D84A62;
    --green: #4A8B5C;
    --yellow: #FFF3B0;
    --yellow-border: #D9B536;
    --gray: #F4F4F4;
  }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #FFFFFF;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
  }

  body {
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  .slide {
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
    aspect-ratio: 16 / 9;
    position: relative;
    background: #FFFFFF;
  }

  svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  text {
    fill: var(--text);
    font-size: 21px;
    font-weight: 520;
  }

  .small {
    font-size: 17px;
  }

  .readout {
    font-size: 22px;
    font-weight: 620;
  }

  .sketch {
    stroke: var(--line);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }

  .thin {
    stroke-width: 2.4;
  }

  .gas-fill {
    fill: #E7F4F5;
    opacity: 0.45;
  }

  .controls {
    position: absolute;
    left: 74px;
    right: 74px;
    bottom: 22px;
    display: grid;
    grid-template-columns: auto 1fr auto auto auto;
    align-items: center;
    gap: 18px;
    color: var(--text);
    font-size: clamp(15px, 2.2vw, 22px);
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--line);
  }

  button {
    border: 2px solid var(--line);
    background: #FFFFFF;
    color: var(--text);
    border-radius: 999px;
    padding: 7px 16px;
    font: inherit;
    cursor: pointer;
  }

  button:active {
    transform: translateY(1px);
  }

  .value {
    min-width: 105px;
    font-weight: 620;
    white-space: nowrap;
  }

  @media (max-width: 760px) {
    .controls {
      left: 34px;
      right: 34px;
      gap: 10px;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: auto auto;
    }

    .value {
      min-width: auto;
      font-size: 15px;
    }

    button {
      padding: 6px 12px;
    }
  }
</style>
</head>
<body>
  <main class="slide" aria-label="Boylen lain simulaatio">
    <svg viewBox="0 0 960 540" role="img" aria-label="Liikkuva mäntä, kaasupartikkelit, painemittari ja paine-tilavuuskuvaaja">
      <defs>
        <pattern id="hatch" patternUnits="userSpaceOnUse" width="12" height="12" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="12" stroke="#222222" stroke-width="1.2" opacity="0.18"/>
        </pattern>

        <clipPath id="gasClip">
          <rect id="gasClipRect" x="140" y="150" width="360" height="190" rx="4"/>
        </clipPath>
      </defs>

      <path d="M105 360 C210 374 455 374 650 360" class="sketch thin" opacity="0.28"/>

      <rect id="gasArea" x="136" y="145" width="370" height="200" rx="12" class="gas-fill"/>

      <path d="M125 145 C250 137 470 140 642 145" class="sketch"/>
      <path d="M125 345 C270 354 482 352 642 345" class="sketch"/>
      <path d="M125 145 C117 205 117 286 125 345" class="sketch"/>
      <path d="M642 145 C649 205 649 286 642 345" class="sketch thin" opacity="0.35"/>

      <g id="particles" clip-path="url(#gasClip)"></g>

      <g id="piston">
        <rect x="492" y="126" width="36" height="238" rx="8" fill="#FFFFFF" stroke="#222222" stroke-width="4"/>
        <rect x="497" y="132" width="26" height="226" rx="6" fill="url(#hatch)" opacity="0.75"/>
        <path d="M528 245 C570 244 598 246 633 245" class="sketch thin"/>
        <path d="M633 231 C648 239 648 253 633 261" class="sketch thin"/>
      </g>

      <g id="gauge">
        <text x="735" y="88">Paine</text>

        <circle cx="770" cy="180" r="72" fill="#FFFFFF" stroke="#222222" stroke-width="4"/>
        <circle cx="770" cy="180" r="58" fill="#FAFAFA" stroke="#222222" stroke-width="2" opacity="0.72"/>

        <!-- Punainen merkintä korkealle paineelle -->
        <path
          d="M 819.7 208.9 A 58 58 0 0 1 804.3 228.0"
          fill="none"
          stroke="#D84A62"
          stroke-width="8"
          stroke-linecap="round"
          opacity="0.9"
        />

        <path d="M720 221 C744 238 795 239 821 221" class="sketch thin" opacity="0.28"/>
        <g id="ticks"></g>
        <line id="needle" x1="770" y1="180" x2="770" y2="126" stroke="#D84A62" stroke-width="5" stroke-linecap="round"/>
        <circle cx="770" cy="180" r="7" fill="#222222"/>
      </g>

      <g id="graph">
        <path d="M690 415 L690 305" class="sketch thin"/>
        <path d="M690 415 L875 415" class="sketch thin"/>
        <text x="675" y="305" class="small">P</text>
        <text x="875" y="438" class="small">V</text>
        <path id="curve" d="" fill="none" stroke="#2E86A6" stroke-width="4" stroke-linecap="round"/>
        <line id="graphV" x1="720" y1="415" x2="720" y2="360" stroke="#222222" stroke-width="2" stroke-dasharray="5 7" opacity="0.45"/>
        <line id="graphP" x1="690" y1="360" x2="720" y2="360" stroke="#222222" stroke-width="2" stroke-dasharray="5 7" opacity="0.45"/>
        <circle id="graphPoint" cx="720" cy="360" r="7" fill="#D84A62"/>
      </g>
    </svg>

    <section class="controls" aria-label="Säätimet">
      <label for="volumeSlider">Tilavuus</label>
      <input id="volumeSlider" type="range" min="1.2" max="5.0" step="0.1" value="3.0" aria-label="Tilavuus" />
      <span id="vReadout" class="value">V = 3,0 l</span>
      <span id="pReadout" class="value">P = 100 kPa</span>
      <button id="resetButton" type="button">Nollaa</button>
    </section>
  </main>

<script>
  const slider = document.getElementById("volumeSlider");
  const resetButton = document.getElementById("resetButton");
  const vReadout = document.getElementById("vReadout");
  const pReadout = document.getElementById("pReadout");

  const gasArea = document.getElementById("gasArea");
  const gasClipRect = document.getElementById("gasClipRect");
  const piston = document.getElementById("piston");
  const particlesGroup = document.getElementById("particles");
  const needle = document.getElementById("needle");
  const ticks = document.getElementById("ticks");
  const curve = document.getElementById("curve");
  const graphPoint = document.getElementById("graphPoint");
  const graphV = document.getElementById("graphV");
  const graphP = document.getElementById("graphP");

  const V_MIN = 1.2;
  const V_MAX = 5.0;
  const V_DEFAULT = 3.0;

  const PV_CONSTANT = 300; // kPa*l

  const chamber = {
    x0: 138,
    y0: 150,
    y1: 340,
    pistonMin: 275,
    pistonMax: 625
  };

  const graph = {
    x0: 690,
    y0: 415,
    w: 185,
    h: 110,
    pMin: PV_CONSTANT / V_MAX,
    pMax: PV_CONSTANT / V_MIN
  };

  const particles = [];
  const particleCount = 42;

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function map(value, inMin, inMax, outMin, outMax) {
    return outMin + (value - inMin) * (outMax - outMin) / (inMax - inMin);
  }

  function formatFinnish(value, decimals = 1) {
    return value.toFixed(decimals).replace(".", ",");
  }

  function getVolume() {
    return Number(slider.value);
  }

  function getPressure(volume) {
    return PV_CONSTANT / volume;
  }

  function getPistonX(volume) {
    return map(volume, V_MIN, V_MAX, chamber.pistonMin, chamber.pistonMax);
  }

  function pressureToGaugeAngle(pressure) {
    return map(pressure, graph.pMin, graph.pMax, -125, 125);
  }

  function polar(cx, cy, r, deg) {
    const rad = (deg - 90) * Math.PI / 180;
    return {
      x: cx + r * Math.cos(rad),
      y: cy + r * Math.sin(rad)
    };
  }

  function drawGaugeTicks() {
    ticks.innerHTML = "";
    for (let i = 0; i <= 8; i++) {
      const deg = map(i, 0, 8, -125, 125);
      const a = polar(770, 180, 52, deg);
      const b = polar(770, 180, i % 2 === 0 ? 63 : 59, deg);
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", a.x);
      line.setAttribute("y1", a.y);
      line.setAttribute("x2", b.x);
      line.setAttribute("y2", b.y);
      line.setAttribute("stroke", "#222222");
      line.setAttribute("stroke-width", i % 2 === 0 ? "2.4" : "1.6");
      line.setAttribute("stroke-linecap", "round");
      line.setAttribute("opacity", "0.72");
      ticks.appendChild(line);
    }
  }

  function graphX(volume) {
    return map(volume, V_MIN, V_MAX, graph.x0 + 22, graph.x0 + graph.w - 8);
  }

  function graphY(pressure) {
    return map(pressure, graph.pMin, graph.pMax, graph.y0 - 8, graph.y0 - graph.h);
  }

  function drawCurve() {
    const points = [];
    for (let i = 0; i <= 80; i++) {
      const v = V_MIN + (V_MAX - V_MIN) * i / 80;
      const p = getPressure(v);
      points.push(`${i === 0 ? "M" : "L"} ${graphX(v).toFixed(1)} ${graphY(p).toFixed(1)}`);
    }
    curve.setAttribute("d", points.join(" "));
  }

  function makeParticles() {
    particlesGroup.innerHTML = "";
    particles.length = 0;

    const volume = getVolume();
    const pistonX = getPistonX(volume);
    const x1 = pistonX - 18;

    for (let i = 0; i < particleCount; i++) {
      const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      const radius = 4 + Math.random() * 2.2;
      const particle = {
        node: circle,
        r: radius,
        x: chamber.x0 + 18 + Math.random() * Math.max(40, x1 - chamber.x0 - 42),
        y: chamber.y0 + 18 + Math.random() * (chamber.y1 - chamber.y0 - 36),
        vx: (Math.random() < 0.5 ? -1 : 1) * (0.38 + Math.random() * 0.82),
        vy: (Math.random() < 0.5 ? -1 : 1) * (0.38 + Math.random() * 0.82)
      };

      circle.setAttribute("r", particle.r);
      circle.setAttribute("fill", "#222222");
      circle.setAttribute("opacity", "0.72");
      particlesGroup.appendChild(circle);
      particles.push(particle);
    }
  }

  function updateScene() {
    const volume = getVolume();
    const pressure = getPressure(volume);
    const pistonX = getPistonX(volume);
    const gasWidth = pistonX - chamber.x0 - 8;

    gasArea.setAttribute("width", gasWidth);
    gasClipRect.setAttribute("width", gasWidth);
    piston.setAttribute("transform", `translate(${pistonX - 510},0)`);

    vReadout.textContent = `V = ${formatFinnish(volume, 1)} l`;
    pReadout.textContent = `P = ${Math.round(pressure)} kPa`;

    const angle = pressureToGaugeAngle(pressure);
    const needleEnd = polar(770, 180, 54, angle);
    needle.setAttribute("x2", needleEnd.x);
    needle.setAttribute("y2", needleEnd.y);

    const gx = graphX(volume);
    const gy = graphY(pressure);
    graphPoint.setAttribute("cx", gx);
    graphPoint.setAttribute("cy", gy);
    graphV.setAttribute("x1", gx);
    graphV.setAttribute("x2", gx);
    graphV.setAttribute("y1", graph.y0);
    graphV.setAttribute("y2", gy);
    graphP.setAttribute("x1", graph.x0);
    graphP.setAttribute("x2", gx);
    graphP.setAttribute("y1", gy);
    graphP.setAttribute("y2", gy);

    for (const p of particles) {
      p.x = clamp(p.x, chamber.x0 + p.r + 4, pistonX - p.r - 16);
      p.y = clamp(p.y, chamber.y0 + p.r + 4, chamber.y1 - p.r - 4);
    }
  }

  function animate() {
    const volume = getVolume();
    const pressure = getPressure(volume);
    const speedFactor = Math.sqrt(pressure / 100);
    const pistonX = getPistonX(volume);
    const left = chamber.x0 + 8;
    const right = pistonX - 18;
    const top = chamber.y0 + 5;
    const bottom = chamber.y1 - 5;

    for (const p of particles) {
      p.x += p.vx * speedFactor;
      p.y += p.vy * speedFactor;

      if (p.x - p.r < left) {
        p.x = left + p.r;
        p.vx *= -1;
      }

      if (p.x + p.r > right) {
        p.x = right - p.r;
        p.vx *= -1;
      }

      if (p.y - p.r < top) {
        p.y = top + p.r;
        p.vy *= -1;
      }

      if (p.y + p.r > bottom) {
        p.y = bottom - p.r;
        p.vy *= -1;
      }

      p.node.setAttribute("cx", p.x);
      p.node.setAttribute("cy", p.y);
    }

    requestAnimationFrame(animate);
  }

  slider.addEventListener("input", updateScene);

  resetButton.addEventListener("click", () => {
    slider.value = V_DEFAULT;
    updateScene();
  });

  drawGaugeTicks();
  drawCurve();
  makeParticles();
  updateScene();
  animate();
</script>
</body>
</html>
