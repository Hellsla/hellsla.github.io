<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lämpölaajeneminen</title>
<style>
  :root{
    --bg:#ffffff;
    --ink:#3F3D39;
    --muted:#8f8b84;
    --hatch:#d8d8d8;
    --cold:#2E86A6;
    --coldSoft:#BFE9F5;
    --warm:#D84A62;
    --warm2:#F28C28;
    --warmSoft:#FFD95A;
    --bond:#bdb9b2;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:var(--bg);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--ink);
  }

  .wrap{
    width:100vw;
    height:100vh;
    min-height:360px;
    display:grid;
    grid-template-rows:1fr auto;
    background:#fff;
    overflow:hidden;
  }

  svg{
    width:100%;
    height:100%;
    display:block;
    background:#fff;
  }

  .controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:clamp(14px,3vw,34px);
    flex-wrap:wrap;
    padding:10px 18px 18px;
  }

  .sliderBox{
    display:flex;
    align-items:center;
    gap:12px;
  }

  .sliderBox label{
    font-size:clamp(15px,1.6vw,20px);
  }

  input[type="range"]{
    width:min(390px,54vw);
    accent-color:var(--ink);
  }

  button{
    font:inherit;
    font-size:clamp(14px,1.5vw,18px);
    background:#fff;
    color:var(--ink);
    border:2px solid var(--ink);
    border-radius:999px;
    padding:6px 16px;
    cursor:pointer;
  }

  button:active{ transform:translateY(1px); }

  .sketch{
    fill:none;
    stroke:var(--ink);
    stroke-width:3;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .thin{ stroke-width:1.8; }

  .hatch{
    stroke:var(--hatch);
    stroke-width:1.1;
    stroke-linecap:round;
  }

  .bond{
    fill:none;
    stroke:var(--bond);
    stroke-width:1.5;
    stroke-linecap:round;
    opacity:.95;
  }

  .anchor{
    fill:none;
    stroke:#c3c0ba;
    stroke-width:1.1;
    stroke-dasharray:3 6;
  }

  .vibe{
    fill:none;
    stroke-width:1.4;
    stroke-dasharray:4 5;
    opacity:.9;
  }

  .atom{
    stroke:var(--ink);
    stroke-width:2.2;
  }

  .flow{
    fill:none;
    stroke-width:3;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:9 11;
    opacity:.9;
  }

  .heatLine{
    fill:none;
    stroke:var(--warm);
    stroke-width:2.1;
    stroke-linecap:round;
  }

  .flameOuter{
    fill:var(--warmSoft);
    stroke:var(--ink);
    stroke-width:2.2;
  }

  .flameInner{
    fill:var(--warm2);
    stroke:var(--ink);
    stroke-width:1.8;
  }

  .iceShape{
    fill:var(--coldSoft);
    stroke:var(--ink);
    stroke-width:2.1;
    stroke-linejoin:round;
  }

  .iceLine{
    fill:none;
    stroke:var(--cold);
    stroke-width:2;
    stroke-linecap:round;
  }

  @media (max-width:700px){
    input[type="range"]{ width:58vw; }
  }
</style>
</head>
<body>
<div class="wrap">
  <svg viewBox="0 0 960 520" aria-label="Lämpölaajeneminen mikrotasolla">
    <defs>
      <pattern id="diagHatch" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(22)">
        <line x1="0" y1="0" x2="0" y2="14" class="hatch"></line>
      </pattern>
    </defs>

    <g id="sampleGroup">
      <rect id="sampleFill" x="210" y="78" width="540" height="304" rx="26" ry="26" fill="url(#diagHatch)"></rect>
      <rect id="sampleRect" x="210" y="78" width="540" height="304" rx="26" ry="26" class="sketch"></rect>
      <path id="sampleTop" class="sketch thin" d="M222 91 C340 84,476 90,618 86 S716 88,738 93"></path>
      <path id="sampleBottom" class="sketch thin" d="M220 368 C346 376,512 370,642 374 S718 374,740 367"></path>
    </g>

    <g id="bondGroup"></g>
    <g id="anchorGroup"></g>
    <g id="vibeGroup"></g>
    <g id="atomGroup"></g>

    <g id="flowGroup">
      <path id="flow1" class="flow" d=""></path>
      <path id="flow2" class="flow" d=""></path>
      <path id="flow3" class="flow" d=""></path>
    </g>

    <g id="iceGroup">
      <path class="iceShape" d="M427 438 L454 407 L496 411 L525 441 L510 479 L466 490 L431 470 Z"></path>
      <path class="iceLine" d="M455 423 L498 468"></path>
      <path class="iceLine" d="M502 424 L456 471"></path>
      <path class="iceLine" d="M477 411 L477 486"></path>
      <path class="iceLine" d="M438 451 L517 451"></path>
    </g>

    <g id="heatGroup">
      <path class="heatLine" d="M405 450 C392 428,420 418,406 394"></path>
      <path class="heatLine" d="M480 452 C466 427,495 418,481 393"></path>
      <path class="heatLine" d="M555 450 C541 427,570 418,556 394"></path>
      <path class="flameOuter" d="M448 483 C406 466,418 425,441 407 C442 431,472 431,463 390 C503 417,521 468,479 484 C471 488,457 488,448 483 Z"></path>
      <path class="flameInner" d="M461 482 C439 470,446 442,459 428 C461 445,479 446,476 421 C495 445,496 472,474 483 C470 485,465 485,461 482 Z"></path>
    </g>
  </svg>

  <div class="controls">
    <div class="sliderBox">
      <label for="temp">Lämpötila</label>
      <input id="temp" type="range" min="0" max="100" step="1" value="50">
    </div>
    <button id="reset">Nollaa</button>
  </div>
</div>

<script>
(() => {
  const svgNS = "http://www.w3.org/2000/svg";

  const temp = document.getElementById("temp");
  const reset = document.getElementById("reset");

  const sampleRect = document.getElementById("sampleRect");
  const sampleFill = document.getElementById("sampleFill");
  const sampleTop = document.getElementById("sampleTop");
  const sampleBottom = document.getElementById("sampleBottom");

  const bondGroup = document.getElementById("bondGroup");
  const anchorGroup = document.getElementById("anchorGroup");
  const vibeGroup = document.getElementById("vibeGroup");
  const atomGroup = document.getElementById("atomGroup");

  const flow1 = document.getElementById("flow1");
  const flow2 = document.getElementById("flow2");
  const flow3 = document.getElementById("flow3");

  const heatGroup = document.getElementById("heatGroup");
  const iceGroup = document.getElementById("iceGroup");

  const cols = 7;
  const rows = 5;
  const neutral = 50;

  const baseRect = { x:210, y:78, w:540, h:304 };
  const centerX = baseRect.x + baseRect.w / 2;
  const centerY = baseRect.y + baseRect.h / 2;

  const atoms = [];
  const bonds = [];

  let time = 0;
  let targetLevel = 50;
  let currentLevel = 50;

  function createNode(name, attrs = {}) {
    const el = document.createElementNS(svgNS, name);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }

  function mixColor(a, b, t) {
    const ah = a.replace("#", "");
    const bh = b.replace("#", "");
    const ar = parseInt(ah.slice(0,2), 16);
    const ag = parseInt(ah.slice(2,4), 16);
    const ab = parseInt(ah.slice(4,6), 16);
    const br = parseInt(bh.slice(0,2), 16);
    const bg = parseInt(bh.slice(2,4), 16);
    const bb = parseInt(bh.slice(4,6), 16);
    const rr = Math.round(ar + (br - ar) * t);
    const rg = Math.round(ag + (bg - ag) * t);
    const rb = Math.round(ab + (bb - ab) * t);
    return `rgb(${rr},${rg},${rb})`;
  }

  function buildLattice() {
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const anchor = createNode("circle", { class:"anchor", r:3 });
        const vibe = createNode("ellipse", { class:"vibe", rx:12, ry:9 });
        const atom = createNode("circle", { class:"atom", r:10, fill:"#ffffff" });

        anchorGroup.appendChild(anchor);
        vibeGroup.appendChild(vibe);
        atomGroup.appendChild(atom);

        atoms.push({
          row:r,
          col:c,
          anchor,
          vibe,
          atom,
          phaseX:Math.random() * Math.PI * 2,
          phaseY:Math.random() * Math.PI * 2,
          phaseR:Math.random() * Math.PI * 2,
          x:0,
          y:0
        });

        if (c < cols - 1) {
          const line = createNode("line", { class:"bond" });
          bondGroup.appendChild(line);
          bonds.push({ type:"h", r, c, line });
        }

        if (r < rows - 1) {
          const line = createNode("line", { class:"bond" });
          bondGroup.appendChild(line);
          bonds.push({ type:"v", r, c, line });
        }
      }
    }
  }

  function getAtom(row, col) {
    return atoms[row * cols + col];
  }

  function getNodePoint(rect, row, col) {
    const spacingX = rect.w / (cols + 1);
    const spacingY = rect.h / (rows + 1);
    return {
      x: rect.x + spacingX * (col + 1),
      y: rect.y + spacingY * (row + 1)
    };
  }

  function updateSampleBox(level) {
    const heat = Math.max(0, level - neutral) / neutral;
    const cold = Math.max(0, neutral - level) / neutral;

    const scaleX = 1 + heat * 0.14 - cold * 0.05;
    const scaleY = 1 + heat * 0.11 - cold * 0.04;

    const w = baseRect.w * scaleX;
    const h = baseRect.h * scaleY;
    const x = centerX - w / 2;
    const y = centerY - h / 2;
    const right = x + w;
    const bottom = y + h;

    sampleRect.setAttribute("x", x);
    sampleRect.setAttribute("y", y);
    sampleRect.setAttribute("width", w);
    sampleRect.setAttribute("height", h);

    sampleFill.setAttribute("x", x);
    sampleFill.setAttribute("y", y);
    sampleFill.setAttribute("width", w);
    sampleFill.setAttribute("height", h);

    sampleTop.setAttribute(
      "d",
      `M${x+12} ${y+13} C${x+118} ${y+5},${x+258} ${y+11},${x+396} ${y+7} S${right-35} ${y+9},${right-12} ${y+14}`
    );

    sampleBottom.setAttribute(
      "d",
      `M${x+10} ${bottom-14} C${x+130} ${bottom-6},${x+296} ${bottom-12},${x+426} ${bottom-8} S${right-30} ${bottom-8},${right-10} ${bottom-15}`
    );

    return { x, y, w, h, heat, cold, bottom };
  }

  function updateAtoms(rect, level, t) {
    const heatLevel = level / 100;
    const ampX = 1.6 + heatLevel * 11.5;
    const ampY = 1.4 + heatLevel * 9.5;
    const vibeRX = 10 + heatLevel * 22;
    const vibeRY = 8 + heatLevel * 17;

    const atomColor = mixColor("#2E86A6", "#D84A62", heatLevel);
    const vibeColor = mixColor("#9fd8e8", "#f2a6b3", heatLevel);

    for (const item of atoms) {
      const base = getNodePoint(rect, item.row, item.col);

      item.anchor.setAttribute("cx", base.x);
      item.anchor.setAttribute("cy", base.y);

      item.vibe.setAttribute("cx", base.x);
      item.vibe.setAttribute("cy", base.y);
      item.vibe.setAttribute("rx", vibeRX);
      item.vibe.setAttribute("ry", vibeRY);
      item.vibe.setAttribute("stroke", vibeColor);

      const x = base.x + Math.sin(t * (0.035 + heatLevel * 0.06) + item.phaseX) * ampX;
      const y = base.y + Math.cos(t * (0.04 + heatLevel * 0.055) + item.phaseY) * ampY;

      item.x = x;
      item.y = y;

      item.atom.setAttribute("cx", x);
      item.atom.setAttribute("cy", y);
      item.atom.setAttribute("fill", atomColor);
      item.atom.setAttribute("r", 9.6 + 0.25 * Math.sin(t * 0.05 + item.phaseR));
    }
  }

  function updateBonds() {
    for (const b of bonds) {
      const a1 = getAtom(b.r, b.c);
      const a2 = b.type === "h"
        ? getAtom(b.r, b.c + 1)
        : getAtom(b.r + 1, b.c);

      b.line.setAttribute("x1", a1.x);
      b.line.setAttribute("y1", a1.y);
      b.line.setAttribute("x2", a2.x);
      b.line.setAttribute("y2", a2.y);
    }
  }

  function updateFlow(rect, level, t) {
    const heat = Math.max(0, level - neutral) / neutral;
    const cold = Math.max(0, neutral - level) / neutral;
    const flowAmount = Math.max(heat, cold);

    flow1.setAttribute("d", `M422 408 C430 376,432 347,436 ${rect.bottom - 6}`);
    flow2.setAttribute("d", `M480 404 C480 372,480 344,480 ${rect.bottom - 6}`);
    flow3.setAttribute("d", `M538 408 C530 376,528 347,524 ${rect.bottom - 6}`);

    const color = heat >= cold ? "#D84A62" : "#2E86A6";
    const dashShift = (heat >= cold ? -1 : 1) * t * (0.45 + flowAmount * 0.75);

    [flow1, flow2, flow3].forEach((f, i) => {
      f.setAttribute("stroke", color);
      f.setAttribute("opacity", 0.12 + flowAmount * 0.88);
      f.style.strokeDashoffset = String(dashShift - i * 9);
    });
  }

  function updateIcons(rect) {
    heatGroup.style.opacity = Math.max(0, rect.heat * 1.2);
    iceGroup.style.opacity = Math.max(0, rect.cold * 1.2);

    heatGroup.setAttribute("transform", `translate(0 ${rect.heat * -5})`);
    iceGroup.setAttribute("transform", `translate(0 ${rect.cold * -4})`);
  }

  function tick() {
    time += 1;
    currentLevel += (targetLevel - currentLevel) * 0.08;

    const rect = updateSampleBox(currentLevel);
    updateAtoms(rect, currentLevel, time);
    updateBonds();
    updateFlow(rect, currentLevel, time);
    updateIcons(rect);

    requestAnimationFrame(tick);
  }

  temp.addEventListener("input", () => {
    targetLevel = Number(temp.value);
  });

  reset.addEventListener("click", () => {
    temp.value = 50;
    targetLevel = 50;
  });

  buildLattice();
  tick();
})();
</script>
</body>
</html>
